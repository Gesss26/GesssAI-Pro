<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<title>GesssAI-Pro - Football Trader</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
<style>
  /* ... (stili identici a quelli precedenti, li ometto per brevità ma vanno inclusi) ... */
  :root {
    --bg: #0f1419;
    --surface: #1a2028;
    --card: #232b36;
    --banner: #2c3642;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --accent: #f39c12;
    --accent2: #e67e22;
    --border: #30363d;
    --win: #2ecc71;
    --draw: #f1c40f;
    --lose: #e74c3c;
    --tab-active: #f39c12;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }
  body { background: var(--bg); color: var(--text); min-height: 100vh; }
  
  .header { 
    background: var(--banner); 
    padding: 16px 24px; 
    border-bottom: 2px solid var(--accent); 
    display: flex; 
    align-items: center; 
    justify-content: center;
    gap: 16px; 
    position: relative;
  }
  .header .header-left {
    position: absolute;
    left: 24px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .header .header-center {
    text-align: center;
  }
  .header .header-center .app-name {
    font-size: 28px;
    font-weight: bold;
    letter-spacing: 2px;
  }
  .header .header-center .app-name span {
    display: inline-block;
  }
  .header .header-center .subtitle {
    font-size: 12px;
    color: var(--text-muted);
  }
  
  .clock {
    position: absolute;
    right: 24px;
    background: var(--surface);
    padding: 8px 16px;
    border-radius: 8px;
    border: 1px solid var(--border);
    font-family: 'Courier New', monospace;
    font-size: 14px;
    font-weight: bold;
    color: var(--accent);
    min-width: 200px;
    text-align: right;
  }
  .clock-date { font-size: 12px; color: var(--text-muted); }
  .clock-time { font-size: 16px; color: var(--accent); }
  
  .tabs-nav { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); overflow-x: auto; }
  .tabs-nav button {
    flex: 1; min-width: 120px; padding: 14px 12px; background: transparent;
    color: var(--text-muted); border: none; cursor: pointer; font-size: 14px;
    border-bottom: 3px solid transparent; transition: all 0.2s;
    font-weight: 600; white-space: nowrap;
  }
  .tabs-nav button:hover { color: var(--text); background: var(--card); }
  .tabs-nav button.active { color: var(--accent); border-bottom-color: var(--tab-active); background: var(--card); }
  
  .container { padding: 20px; max-width: 1400px; margin: 0 auto; }
  
  .card {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    padding: 18px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }
  
  .matches-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 18px;
    justify-content: flex-start;
  }
  
  .match-tab {
    background: var(--card);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 0;
    border: 1px solid var(--border);
    border-left-width: 6px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.4);
    flex: 1;
    min-width: 340px;
    max-width: 420px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    position: relative;
  }
  .match-tab:hover {
    transform: translateY(-3px);
    box-shadow: 0 6px 16px rgba(0,0,0,0.6);
  }
  .match-tab .score-badge {
    position: absolute;
    top: 10px;
    right: 12px;
    background: var(--accent);
    color: #000;
    font-weight: bold;
    font-size: 18px;
    padding: 2px 10px;
    border-radius: 20px;
    border: 2px solid var(--accent2);
  }
  
  .schedina-controls {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: center;
    margin-bottom: 16px;
  }
  .schedina-controls .left-group {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .schedina-controls .left-group select {
    padding: 8px 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    min-width: 150px;
  }
  .schedina-controls .num-buttons {
    display: flex;
    gap: 6px;
  }
  .schedina-controls .num-buttons button {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-weight: bold;
    cursor: pointer;
    transition: all 0.2s;
  }
  .schedina-controls .num-buttons button.active {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
  }
  .schedina-controls .num-buttons button:hover {
    border-color: var(--accent);
  }
  .schedina-controls .right-group {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-left: auto;
  }
  .schedina-controls .right-group select {
    padding: 8px 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    min-width: 160px;
  }
  .schedina-controls .btn-generate {
    background: var(--accent);
    color: #000;
    border: none;
    padding: 8px 20px;
    border-radius: 6px;
    font-weight: bold;
    cursor: pointer;
  }
  .schedina-controls .btn-generate:hover {
    background: var(--accent2);
  }
  .schedina-controls .btn-reset-cards {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 8px 16px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
  }
  .schedina-controls .btn-reset-cards:hover {
    border-color: var(--accent);
    background: var(--card);
  }
  
  .schedina-match-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-left-width: 6px;
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 12px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.4);
    transition: transform 0.15s, box-shadow 0.15s;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
  }
  .schedina-match-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 16px rgba(0,0,0,0.6);
  }
  .schedina-match-card .match-info {
    flex: 1;
    min-width: 150px;
  }
  .schedina-match-card .match-info .teams {
    font-weight: bold;
    font-size: 16px;
  }
  .schedina-match-card .match-info .details {
    font-size: 12px;
    color: var(--text-muted);
  }
  .schedina-match-card .giocate {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .schedina-match-card .giocate .giocata-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 12px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    color: var(--text);
  }
  .schedina-match-card .giocate .giocata-btn:hover {
    border-color: var(--accent);
    background: var(--card);
  }
  .schedina-match-card .giocate .giocata-btn.disabled {
    opacity: 0.4;
    cursor: not-allowed;
    background: #3a3f4a;
    border-color: #3a3f4a;
    color: #888;
  }
  .schedina-match-card .giocate .giocata-btn.disabled:hover {
    border-color: #3a3f4a;
    background: #3a3f4a;
  }
  
  .schedina-actions {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 16px;
  }
  .schedina-actions button {
    padding: 6px 16px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--surface);
    color: var(--text);
    cursor: pointer;
    transition: all 0.2s;
    font-size: 13px;
  }
  .schedina-actions button:hover {
    border-color: var(--accent);
    background: var(--card);
  }
  .schedina-actions .btn-reset {
    border-color: var(--lose);
    color: var(--lose);
  }
  .schedina-actions .btn-reset:hover {
    background: var(--lose);
    color: #fff;
  }
  .schedina-actions .btn-save {
    border-color: var(--win);
    color: var(--win);
  }
  .schedina-actions .btn-save:hover {
    background: var(--win);
    color: #000;
  }
  
  .schedina-list {
    margin-top: 16px;
    background: var(--surface);
    padding: 12px;
    border-radius: 8px;
    border-left: 4px solid var(--accent);
  }
  .schedina-list .entry {
    padding: 4px 0;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
    display: flex;
    justify-content: space-between;
  }
  .schedina-list .entry:last-child {
    border-bottom: none;
  }
  .schedina-list .entry .remove-btn {
    color: var(--lose);
    cursor: pointer;
    margin-left: 8px;
  }
  
  .tab-header { 
    padding: 4px 12px; 
    border-radius: 6px; 
    margin-bottom: 6px; 
    text-align: center; 
    color: #fff; 
    font-weight: bold; 
    font-size: 13px; 
    display: inline-block;
  }
  
  .match-info { 
    text-align: center; 
    color: var(--text-muted); 
    font-size: 12px; 
    margin-bottom: 6px; 
  }
  
  .teams-row { 
    display: flex; 
    justify-content: space-around; 
    align-items: center; 
    padding: 8px 0; 
  }
  
  .team { 
    display: flex; 
    flex-direction: column; 
    align-items: center; 
    gap: 4px; 
    flex: 1;
  }
  
  .team-name { 
    font-weight: bold; 
    font-size: 20px;
    text-align: center;
  }
  
  .vs { 
    font-size: 18px; 
    color: var(--accent); 
    font-weight: bold; 
    padding: 0 8px;
  }
  
  .form-row-compact {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 10px;
    margin-bottom: 6px;
  }
  
  .form-block-compact { 
    text-align: center;
    padding: 8px 6px;
    background: var(--surface);
    border-radius: 6px;
  }
  
  .form-block-compact .form-label { 
    font-size: 10px; 
    color: var(--text-muted); 
    margin-bottom: 4px;
    text-transform: uppercase;
    font-weight: 600;
  }
  
  .form-squares {
    display: flex;
    justify-content: center;
    gap: 3px;
    margin-bottom: 4px;
    min-height: 20px;
  }
  
  .form-square {
    width: 22px;
    height: 22px;
    border-radius: 3px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    font-size: 12px;
    color: #000;
  }
  
  .form-square-V { background: var(--win); }
  .form-square-P { background: var(--draw); }
  .form-square-S { background: var(--lose); }
  
  .form-pct-compact {
    font-size: 22px;
    font-weight: bold;
    color: var(--accent);
    line-height: 1;
  }
  
  .form-bar { 
    height: 6px; 
    background: var(--card); 
    border-radius: 3px; 
    overflow: hidden; 
    margin-top: 4px;
  }
  
  .form-bar-fill { 
    height: 100%; 
    background: linear-gradient(90deg, var(--win), var(--accent)); 
    transition: width 0.3s; 
  }
  
  .form-diff {
    text-align: center;
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 4px;
  }
  .form-diff span {
    font-weight: bold;
    color: var(--accent);
  }
  
  .bet-row {
    display: flex;
    justify-content: space-around;
    gap: 6px;
    margin-top: 8px;
    flex-wrap: wrap;
  }
  .bet-item {
    background: var(--surface);
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 12px;
    border: 1px solid var(--border);
    text-align: center;
    flex: 1;
    min-width: 70px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .bet-item:hover {
    background: var(--card);
  }
  .bet-item .bet-label {
    color: var(--text-muted);
    font-size: 10px;
    text-transform: uppercase;
  }
  .bet-item .bet-value {
    font-weight: bold;
    color: var(--accent);
    font-size: 14px;
  }
  
  .match-tab-history {
    background: var(--card);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 0;
    border: 1px solid var(--border);
    border-left-width: 6px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.4);
    flex: 1;
    min-width: 340px;
    max-width: 420px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .match-tab-history:hover {
    transform: translateY(-3px);
    box-shadow: 0 6px 16px rgba(0,0,0,0.6);
  }
  .match-tab-history .teams-row {
    display: flex;
    justify-content: space-around;
    align-items: center;
    padding: 4px 0;
  }
  .match-tab-history .score {
    font-size: 24px;
    font-weight: bold;
    padding: 0 12px;
  }
  .match-tab-history .score-win { color: var(--win); }
  .match-tab-history .score-draw { color: var(--draw); }
  .match-tab-history .score-loss { color: var(--lose); }
  
  .standings-table-wrap {
    overflow-x: auto;
  }
  .standings-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  .standings-table th {
    background: var(--surface);
    color: var(--text-muted);
    padding: 8px 6px;
    text-align: left;
    border-bottom: 2px solid var(--border);
    font-weight: 600;
    text-transform: uppercase;
    font-size: 11px;
    white-space: nowrap;
  }
  .standings-table td {
    padding: 6px 6px;
    border-bottom: 1px solid var(--border);
  }
  .standings-table tr.highlighted td {
    background: var(--accent) !important;
    color: #000 !important;
    font-weight: bold;
  }
  .standings-table tr:hover td {
    background: var(--card);
  }
  .standings-table .pos {
    font-weight: bold;
    color: var(--accent);
    text-align: center;
  }
  .standings-table .team-name {
    font-weight: bold;
  }
  .standings-table .num {
    text-align: center;
  }
  .standings-table .points {
    font-weight: bold;
    color: var(--accent);
    text-align: center;
  }
  
  .sub-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .sub-tabs button {
    padding: 8px 16px;
    background: var(--surface);
    color: var(--text-muted);
    border: 1px solid var(--border);
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
  }
  .sub-tabs button.active {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
  }
  
  .detail-section {
    margin-bottom: 20px;
  }
  .detail-section h4 {
    color: var(--accent);
    margin-bottom: 10px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 6px;
    font-size: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  
  .detail-stat-box {
    padding: 12px 8px;
    border-radius: 8px;
    text-align: center;
    border: 1px solid var(--border);
    background: var(--surface);
    color: #fff;
    transition: background 0.2s, transform 0.1s;
    min-width: 60px;
    flex: 1;
    cursor: pointer;
  }
  .detail-stat-box:hover {
    transform: scale(1.02);
  }
  .detail-stat-box .label {
    display: block;
    font-size: 20px;
    font-weight: 600;
    color: #fff;
    margin-bottom: 2px;
  }
  .detail-stat-box .value {
    display: block;
    font-size: 20px;
    font-weight: bold;
    color: #fff;
  }
  .detail-stat-box .bomb-icon {
    display: inline-block;
    font-size: 20px;
    animation: bomb-bounce 0.8s infinite ease-in-out;
    transform-origin: center;
    margin-left: 4px;
  }
  .detail-stat-box.flag-red { background: var(--lose); }
  .detail-stat-box.flag-neutral { background: #6c757d; }
  .detail-stat-box.flag-green { background: var(--win); }
  .detail-stat-box.flag-gold { background: var(--accent); color: #000; }
  .detail-stat-box.flag-gold .label,
  .detail-stat-box.flag-gold .value { color: #000; }
  .detail-stat-box.flag-bomb { 
    background: var(--accent); 
    color: #000;
    animation: bomb-glow 1s infinite alternate;
  }
  .detail-stat-box.flag-bomb .label,
  .detail-stat-box.flag-bomb .value { color: #000; }
  
  @keyframes bomb-bounce {
    0% { transform: scale(1) rotate(0deg); }
    50% { transform: scale(1.3) rotate(10deg); }
    100% { transform: scale(1) rotate(0deg); }
  }
  @keyframes bomb-glow {
    0% { box-shadow: 0 0 8px var(--accent); }
    100% { box-shadow: 0 0 30px #ffaa00; }
  }
  
  .detail-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 6px;
  }
  .detail-row .detail-stat-box {
    flex: 1;
    min-width: 60px;
  }
  
  .opponents-row {
    display: flex;
    flex-wrap: wrap;
    justify-content: space-between;
    gap: 12px;
    margin: 8px 0;
  }
  .opponents-col {
    flex: 1;
    min-width: 120px;
    background: var(--surface);
    padding: 8px;
    border-radius: 6px;
  }
  .opponents-col .opp-item {
    font-size: 12px;
    padding: 2px 0;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .opponents-col .opp-item:last-child {
    border-bottom: none;
  }
  .opp-result-indicator {
    display: inline-block;
    width: 14px;
    height: 14px;
    border-radius: 3px;
    margin-right: 4px;
    vertical-align: middle;
  }
  .opp-result-indicator.win { background: var(--win); }
  .opp-result-indicator.draw { background: var(--draw); }
  .opp-result-indicator.loss { background: var(--lose); }
  
  .opp-form-pct {
    font-size: 24px;
    font-weight: bold;
    color: var(--accent);
    text-align: center;
    margin-top: 6px;
  }
  .opp-form-bar {
    height: 8px;
    background: var(--card);
    border-radius: 4px;
    overflow: hidden;
    margin-top: 4px;
  }
  .opp-form-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--win), var(--accent));
    transition: width 0.3s;
  }
  
  .stats-two-col {
    display: grid;
    grid-template-columns: 1fr 1.2fr;
    gap: 20px;
  }
  @media (max-width: 768px) {
    .stats-two-col {
      grid-template-columns: 1fr;
    }
  }
  
  .stats-placeholder {
    text-align: center;
    padding: 40px;
    color: var(--text-muted);
    font-size: 16px;
  }
  
  .ai-analysis-box {
    background: var(--surface);
    padding: 14px 16px;
    border-radius: 8px;
    margin-top: 16px;
    border-left: 4px solid var(--accent);
  }
  .ai-analysis-box h4 {
    color: var(--accent);
    margin: 8px 0 4px;
    font-size: 14px;
  }
  .ai-analysis-box p {
    font-size: 13px;
    line-height: 1.5;
    margin-bottom: 6px;
  }
  .ai-analysis-box .pronostico-mini {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    background: var(--card);
    padding: 10px;
    border-radius: 6px;
    margin-top: 6px;
  }
  .ai-analysis-box .pronostico-mini .item {
    flex: 1;
    min-width: 70px;
    text-align: center;
  }
  .ai-analysis-box .pronostico-mini .item .label {
    font-size: 10px;
    color: var(--text-muted);
    text-transform: uppercase;
  }
  .ai-analysis-box .pronostico-mini .item .value {
    font-size: 18px;
    font-weight: bold;
    color: var(--accent);
  }
  .ai-analysis-box .consigli-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    margin-top: 6px;
  }
  @media (max-width: 768px) {
    .ai-analysis-box .consigli-grid {
      grid-template-columns: 1fr;
    }
  }
  .ai-analysis-box .consiglio-card {
    background: var(--card);
    padding: 8px;
    border-radius: 6px;
    border: 1px solid var(--border);
  }
  .ai-analysis-box .consiglio-card .tipo {
    font-size: 10px;
    text-transform: uppercase;
    color: var(--text-muted);
  }
  .ai-analysis-box .consiglio-card .giocata {
    font-size: 14px;
    font-weight: bold;
    margin: 2px 0;
  }

<script type="text/babel">
const { useState, useEffect } = React;

// ============ TEMI ============
const THEMES = {
  'Scuro Blu Notte': { bg:'#0f1419', surface:'#1a2028', card:'#232b36', banner:'#2c3642', text:'#e6edf3', textMuted:'#8b949e', accent:'#f39c12', accent2:'#e67e22', border:'#30363d', tabActive:'#f39c12' },
  'Chiaro': { bg:'#f5f7fa', surface:'#ffffff', card:'#ffffff', banner:'#e8ecf1', text:'#1a2028', textMuted:'#546e7a', accent:'#1976d2', accent2:'#0d47a1', border:'#cfd8dc', tabActive:'#1976d2' },
  'Tramonto': { bg:'#2c1810', surface:'#3d2817', card:'#4a3422', banner:'#5d3f2a', text:'#ffe0b2', textMuted:'#bcaaa4', accent:'#ff6b35', accent2:'#f7931e', border:'#6d4c41', tabActive:'#ff6b35' },
  'Ghiaccio': { bg:'#e3f2fd', surface:'#ffffff', card:'#ffffff', banner:'#bbdefb', text:'#01579b', textMuted:'#455a64', accent:'#0288d1', accent2:'#01579b', border:'#90caf9', tabActive:'#0288d1' },
  'Neon': { bg:'#0a0e27', surface:'#131836', card:'#1a1f42', banner:'#24294f', text:'#00ffcc', textMuted:'#7b81a8', accent:'#ff00ff', accent2:'#00ffff', border:'#2d325f', tabActive:'#ff00ff' },
  'Calcio': { bg:'#1b5e20', surface:'#2e7d32', card:'#388e3c', banner:'#2e7d32', text:'#fff', textMuted:'#c8e6c9', accent:'#ffc107', accent2:'#ff9800', border:'#1b5e20', tabActive:'#ffc107' },
};

const MAIN_TABS = ['Palinsesto','Statistiche','Storico','Schedina AI','API KEY','Impostazioni'];
const SETTINGS_TABS = ['Temi','API KEY','Dati Locali','Importa Campionato'];

// ============ COLORI CAMPIONATI ============
const CHAMPIONSHIP_COLORS = {
  'Allsvenskan': '#e74c3c',
  'Premier League': '#3498db',
  'Serie A': '#2ecc71',
  'Bundesliga': '#f39c12',
  'Ligue 1': '#9b59b6',
  'Brasileirão': '#1abc9c',
  'Eredivisie': '#e67e22',
  'Primeira Liga': '#34495e',
  'Cina': '#c0392b',
  'Irlanda': '#27ae60',
  'Eliteserien': '#2980b9',
  'FIFA World Cup 2026': '#f1c40f',
  'Championship': '#6c3483',
  'La Liga': '#e74c3c',
  'Liga MX': '#16a085'
};

const getChampColor = (champName) => {
  if (!champName) return '#95a5a6';
  for (const [key, color] of Object.entries(CHAMPIONSHIP_COLORS)) {
    if (champName.toLowerCase().includes(key.toLowerCase()) || key.toLowerCase().includes(champName.toLowerCase())) {
      return color;
    }
  }
  let hash = 0;
  for (let i = 0; i < champName.length; i++) {
    hash = champName.charCodeAt(i) + ((hash << 5) - hash);
  }
  const hue = Math.abs(hash) % 360;
  return `hsl(${hue}, 65%, 50%)`;
};

// ============ FORMATO DATA EUROPEO (CORRETTO) ============
const formatDateEU = (dateStr) => {
  if (!dateStr) return 'N/D';
  if (typeof dateStr === 'string' && dateStr.match(/^\d{4}-\d{2}-\d{2}/)) {
    const [y, m, d] = dateStr.split('-');
    const year = parseInt(y);
    if (year < 1900 || year > 2100) return 'N/D';
    return `${d}/${m}/${y}`;
  }
  const date = new Date(dateStr);
  if (isNaN(date.getTime())) return 'N/D';
  const year = date.getFullYear();
  if (year < 1900 || year > 2100) return 'N/D';
  const day = String(date.getDate()).padStart(2, '0');
  const month = String(date.getMonth() + 1).padStart(2, '0');
  return `${day}/${month}/${year}`;
};

// ============ FILTRO PROSSIMI 6 GIORNI ============
const filterNext6Days = (matches) => {
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const sixDaysLater = new Date(today);
  sixDaysLater.setDate(sixDaysLater.getDate() + 6);
  
  return matches.filter(m => {
    if (!m.data) return false;
    const matchDate = new Date(m.data);
    if (isNaN(matchDate.getTime())) return false;
    matchDate.setHours(0, 0, 0, 0);
    return matchDate >= today && matchDate <= sixDaysLater;
  }).sort((a, b) => new Date(a.data + ' ' + a.ora) - new Date(b.data + ' ' + b.ora));
};

// ============ CLOCK ============
const Clock = () => {
  const [now, setNow] = useState(new Date());
  useEffect(() => {
    const timer = setInterval(() => setNow(new Date()), 1000);
    return () => clearInterval(timer);
  }, []);
  const formatDate = (d) => {
    const days = ['Domenica','Lunedì','Martedì','Mercoledì','Giovedì','Venerdì','Sabato'];
    const months = ['Gen','Feb','Mar','Apr','Mag','Giu','Lug','Ago','Set','Ott','Nov','Dic'];
    return `${days[d.getDay()]} ${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
  };
  const formatTime = (d) => d.toTimeString().slice(0, 8);
  return (
    <div className="clock">
      <div className="clock-date">{formatDate(now)}</div>
      <div className="clock-time">{formatTime(now)}</div>
    </div>
  );
};

// ============ STORAGE ============
const loadState = () => {
  try {
    return {
      championships: JSON.parse(localStorage.getItem('ft_champs') || '[]'),
      matches: JSON.parse(localStorage.getItem('ft_matches') || '[]'),
      apiKeys: JSON.parse(localStorage.getItem('ft_apikeys') || '{}'),
      theme: JSON.parse(localStorage.getItem('ft_theme') || '"Scuro Blu Notte"'),
      customTheme: JSON.parse(localStorage.getItem('ft_custom_theme') || 'null'),
    };
  } catch(e) { return { championships:[], matches:[], apiKeys:{}, theme:'Scuro Blu Notte', customTheme:null }; }
};

const saveState = (data) => {
  localStorage.setItem('ft_champs', JSON.stringify(data.championships));
  localStorage.setItem('ft_matches', JSON.stringify(data.matches));
  localStorage.setItem('ft_apikeys', JSON.stringify(data.apiKeys));
  localStorage.setItem('ft_theme', JSON.stringify(data.theme));
  localStorage.setItem('ft_custom_theme', JSON.stringify(data.customTheme));
};

// ============ API WRAPPERS ============
const askGroq = async (prompt, key) => {
  if (!key) {
    throw new Error('🔑 API GROQ non configurata. Vai nel tab API KEY per configurarla.');
  }
  try {
    const r = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type':'application/json', 'Authorization': `Bearer ${key}` },
      body: JSON.stringify({
        model: 'llama-3.3-70b-versatile',
        messages: [{ role:'system', content:'Sei un esperto data scientist e analista tattico di calcio. Rispondi ESCLUSIVAMENTE in formato JSON valido, senza testo prima o dopo.' }, { role:'user', content: prompt }]
      })
    });
    if (!r.ok) {
      const errorText = await r.text();
      throw new Error(`Errore API GROQ: ${r.status} - ${errorText}`);
    }
    const d = await r.json();
    const content = d.choices?.[0]?.message?.content;
    if (!content) {
      throw new Error('Groq non ha restituito una risposta valida.');
    }
    return content;
  } catch(e) {
    throw new Error(e.message || 'Errore durante la richiesta a Groq.');
  }
};

const fetchFootballData = async (endpoint, key) => {
  if (!key) return null;
  try {
    const r = await fetch(`https://api.football-data.org/v4/${endpoint}`, {
      headers: { 'X-Auth-Token': key }
    });
    return await r.json();
  } catch(e) { return null; }
};

// ============ DOWNLOAD CAMPIONATI ============
const downloadAllFootballDataCompetitions = async (apiKey, setMatches, setChampionships, showAlert, championships, matches) => {
  if (!apiKey) {
    showAlert('error', '❌ API Key Football-data.org non configurata!');
    return;
  }
  
  showAlert('info', '📥 Scarico tutti i campionati da Football-data.org...');
  
  try {
    const competitionsData = await fetchFootballData('competitions', apiKey);
    if (!competitionsData || !competitionsData.competitions) {
      showAlert('error', '❌ Errore nel recupero dei campionati');
      return;
    }
    
    const competitions = competitionsData.competitions;
    const newChampionships = [];
    const newMatches = [];
    
    const worldCupExists = competitions.some(c => c.code === 'WC');
    if (!worldCupExists) {
      competitions.push({
        id: 'wc-2026',
        name: 'FIFA World Cup 2026',
        code: 'WC',
        type: 'CUP',
        area: { name: 'World' }
      });
    }
    
    const existingChampNames = new Set(championships.map(c => c.name));
    
    for (const comp of competitions) {
      if (existingChampNames.has(comp.name)) {
        console.log(`⏭️ Campionato "${comp.name}" già presente, salto.`);
        continue;
      }
      
      try {
        const matchesData = await fetchFootballData(`competitions/${comp.id}/matches`, apiKey);
        if (!matchesData || !matchesData.matches) continue;
        
        const futureMatches = matchesData.matches.filter(m => 
          m.status === 'SCHEDULED' || m.status === 'TIMED' || m.status === 'LIVE' || m.status === 'IN_PLAY'
        );
        
        if (futureMatches.length === 0) continue;
        
        newChampionships.push({
          name: comp.name,
          code: comp.code,
          importedAt: new Date().toISOString()
        });
        
        const existingMatchKeys = new Set(matches.map(m => 
          `${m.campionato}|${m.data}|${m.ora}|${m.casa}|${m.ospiti}`
        ));
        
        futureMatches.forEach(m => {
          const homeTeam = m.homeTeam?.name || m.homeTeam?.shortName || 'Home';
          const awayTeam = m.awayTeam?.name || m.awayTeam?.shortName || 'Away';
          const matchDate = new Date(m.utcDate);
          const dataStr = matchDate.toISOString().slice(0, 10);
          const oraStr = matchDate.toTimeString().slice(0, 5);
          
          const key = `${comp.name}|${dataStr}|${oraStr}|${homeTeam}|${awayTeam}`;
          if (existingMatchKeys.has(key)) return;
          existingMatchKeys.add(key);
          
          newMatches.push({
            id: Math.random().toString(36).slice(2),
            campionato: comp.name,
            round: m.matchday || 'N/A',
            data: dataStr,
            ora: oraStr,
            casa: homeTeam,
            ospiti: awayTeam,
            stato: 'Futura',
            golCasa: m.score?.fullTime?.home ?? 0,
            golOspite: m.score?.fullTime?.away ?? 0,
          });
        });
        
        await new Promise(resolve => setTimeout(resolve, 500));
      } catch (err) {
        console.warn(`Errore campionato ${comp.name}:`, err);
      }
    }
    
    if (newChampionships.length === 0 && newMatches.length === 0) {
      showAlert('success', '✅ Nessun nuovo campionato o partita da aggiungere.');
      return;
    }
    
    setChampionships(prev => [...prev, ...newChampionships]);
    setMatches(prev => [...prev, ...newMatches]);
    
    showAlert('success', `✅ Scaricati ${newMatches.length} nuove partite da ${newChampionships.length} nuovi campionati!`);
    
  } catch (e) {
    showAlert('error', '❌ Errore download Football-data.org: ' + e.message);
  }
};

// ============ HELPERS ============
const calcFormAndStats = (matches, teamName) => {
  const played = matches.filter(m => m.stato === 'Giocata' && (m.casa === teamName || m.ospiti === teamName))
    .sort((a,b) => new Date(b.data+' '+b.ora) - new Date(a.data+' '+a.ora))
    .slice(0, 5);
  let form = '', points = 0;
  played.forEach(m => {
    if (m.casa === teamName) {
      const r = m.golCasa > m.golOspite ? 'V' : (m.golCasa === m.golOspite ? 'P' : 'S');
      form += r;
      if (r === 'V') points += 3; else if (r === 'P') points += 1;
    } else {
      const r = m.golOspite > m.golCasa ? 'V' : (m.golOspite === m.golCasa ? 'P' : 'S');
      form += r;
      if (r === 'V') points += 3; else if (r === 'P') points += 1;
    }
  });
  return { form: form || '-----', pct: played.length ? Math.round((points / (played.length * 3)) * 100) : 50 };
};

const calcTeamMG = (matches, teamName) => {
  const played = matches.filter(m => m.stato === 'Giocata' && (m.casa === teamName || m.ospiti === teamName));
  if (!played.length) return '0.0-0.0';
  let scored = 0, conceded = 0;
  played.forEach(m => {
    if (m.casa === teamName) { scored += m.golCasa; conceded += m.golOspite; }
    else { scored += m.golOspite; conceded += m.golCasa; }
  });
  return `${(scored/played.length).toFixed(1)}-${(conceded/played.length).toFixed(1)}`;
};

// ============ STATISTICHE DETTAGLIO PARTITA ============
const computeMatchStats = (match, allMatches) => {
  const homeTeam = match.casa;
  const awayTeam = match.ospiti;
  
  const homeGames = allMatches.filter(m => m.stato === 'Giocata' && (m.casa === homeTeam || m.ospiti === homeTeam));
  const awayGames = allMatches.filter(m => m.stato === 'Giocata' && (m.casa === awayTeam || m.ospiti === awayTeam));
  const totalGames = homeGames.length + awayGames.length;
  
  if (totalGames === 0) {
    return { error: 'Nessuna partita giocata per queste squadre.' };
  }
  
  const getTeamStats = (team, games) => {
    let wins = 0, draws = 0, losses = 0;
    let goalsScored = 0, goalsConceded = 0;
    games.forEach(g => {
      const isHome = g.casa === team;
      const teamGoals = isHome ? g.golCasa : g.golOspite;
      const oppGoals = isHome ? g.golOspite : g.golCasa;
      goalsScored += teamGoals;
      goalsConceded += oppGoals;
      if (teamGoals > oppGoals) wins++;
      else if (teamGoals === oppGoals) draws++;
      else losses++;
    });
    return { wins, draws, losses, goalsScored, goalsConceded, played: games.length };
  };
  
  const homeStats = getTeamStats(homeTeam, homeGames);
  const awayStats = getTeamStats(awayTeam, awayGames);
  
  const p1 = (homeStats.wins + awayStats.losses) / totalGames * 100;
  const pX = (homeStats.draws + awayStats.draws) / totalGames * 100;
  const p2 = (homeStats.losses + awayStats.wins) / totalGames * 100;
  
  const p1X = p1 + pX;
  const p12 = p1 + p2;
  const pX2 = pX + p2;
  
  const allGamesForGoals = [...homeGames, ...awayGames];
  const goalTotals = allGamesForGoals.map(g => g.golCasa + g.golOspite);
  const thresholds = [1.5, 2.5, 3.5, 4.5];
  const underOver = thresholds.map(t => {
    const over = goalTotals.filter(gt => gt > t).length / goalTotals.length * 100;
    const under = 100 - over;
    return { threshold: t, under, over };
  });
  
  const getMultigolV2 = (team, games) => {
    const goals = games.map(g => (g.casa === team) ? g.golCasa : g.golOspite);
    const total = goals.length;
    const count = (pred) => goals.filter(pred).length / total * 100;
    return {
      '0-1': count(g => g <= 1),
      '0-2': count(g => g <= 2),
      '1-3': count(g => g >= 1 && g <= 3),
      '2-4': count(g => g >= 2 && g <= 4),
    };
  };
  
  const homeMG = getMultigolV2(homeTeam, homeGames);
  const awayMG = getMultigolV2(awayTeam, awayGames);
  
  const totalGoals = allGamesForGoals.map(g => g.golCasa + g.golOspite);
  const mgTot = {
    '1-4': totalGoals.filter(g => g >= 1 && g <= 4).length / totalGoals.length * 100,
    '2-4': totalGoals.filter(g => g >= 2 && g <= 4).length / totalGoals.length * 100,
    '2-5': totalGoals.filter(g => g >= 2 && g <= 5).length / totalGoals.length * 100,
    '3-6': totalGoals.filter(g => g >= 3 && g <= 6).length / totalGoals.length * 100,
  };
  
  return {
    p1, pX, p2,
    p1X, p12, pX2,
    underOver,
    homeMG, awayMG,
    mgTot,
    homeGames, awayGames,
    homeStats, awayStats,
    totalGames
  };
};

// ============ FUNZIONI PER LE GIOCATE NEL MATCHTAB ============
const getTeamMultigolV2 = (allMatches, teamName) => {
  const games = allMatches.filter(m => m.stato === 'Giocata' && (m.casa === teamName || m.ospiti === teamName));
  if (!games.length) return { '0-1': 0, '0-2': 0, '1-3': 0, '2-4': 0 };
  const goals = games.map(g => (g.casa === teamName) ? g.golCasa : g.golOspite);
  const total = goals.length;
  const count = (pred) => goals.filter(pred).length / total * 100;
  return {
    '0-1': count(g => g <= 1),
    '0-2': count(g => g <= 2),
    '1-3': count(g => g >= 1 && g <= 3),
    '2-4': count(g => g >= 2 && g <= 4),
  };
};

const getTeamUnderOver = (allMatches, teamName) => {
  const games = allMatches.filter(m => m.stato === 'Giocata' && (m.casa === teamName || m.ospiti === teamName));
  if (!games.length) return {};
  const goals = games.map(g => (g.casa === teamName) ? g.golCasa : g.golOspite);
  const thresholds = [1.5, 2.5, 3.5, 4.5];
  const result = {};
  thresholds.forEach(t => {
    const over = goals.filter(g => g > t).length / goals.length * 100;
    const under = 100 - over;
    result[`Under ${t}`] = under;
    result[`Over ${t}`] = over;
  });
  return result;
};

const get12Under45 = (allMatches, homeTeam, awayTeam) => {
  const homeGames = allMatches.filter(m => m.stato === 'Giocata' && (m.casa === homeTeam || m.ospiti === homeTeam));
  const awayGames = allMatches.filter(m => m.stato === 'Giocata' && (m.casa === awayTeam || m.ospiti === awayTeam));
  const allGames = Array.from(new Map([...homeGames, ...awayGames].map(g => [g.id, g])).values());
  if (!allGames.length) return 0;
  const count = allGames.filter(g => {
    const total = g.golCasa + g.golOspite;
    return g.golCasa !== g.golOspite && total < 4.5;
  }).length;
  return (count / allGames.length) * 100;
};

const Standings = ({ matches, filterChampionship, highlightTeams = [] }) => {
  const [view, setView] = useState('generale');
  
  let filtered = matches;
  if (filterChampionship && filterChampionship !== 'Tutti') {
    filtered = filtered.filter(m => m.campionato === filterChampionship);
  }
  filtered = filtered.filter(m => m.stato === 'Giocata');
  
  if (filtered.length === 0) {
    return <div className="empty-state">Nessuna partita giocata per questo campionato.</div>;
  }
  
  const teamStats = {};
  const addGame = (team, isHome, golFatti, golSubiti) => {
    if (!teamStats[team]) {
      teamStats[team] = { 
        pg: 0, punti: 0, v: 0, p: 0, s: 0, gf: 0, gs: 0, 
        dr: 0, xG: 0, mediaGol: 0 
      };
    }
    const t = teamStats[team];
    t.pg++;
    t.gf += golFatti;
    t.gs += golSubiti;
    if (golFatti > golSubiti) {
      t.v++;
      t.punti += 3;
    } else if (golFatti === golSubiti) {
      t.p++;
      t.punti += 1;
    } else {
      t.s++;
    }
  };
  
  filtered.forEach(m => {
    if (view === 'generale') {
      addGame(m.casa, true, m.golCasa, m.golOspite);
      addGame(m.ospiti, false, m.golOspite, m.golCasa);
    } else if (view === 'casa') {
      addGame(m.casa, true, m.golCasa, m.golOspite);
    } else if (view === 'ospite') {
      addGame(m.ospiti, false, m.golOspite, m.golCasa);
    }
  });
  
  Object.values(teamStats).forEach(t => {
    t.dr = t.gf - t.gs;
    t.mediaGol = t.pg > 0 ? t.gf / t.pg : 0;
    t.xG = t.pg > 0 ? (t.gf / t.pg) * 0.9 : 0;
  });
  
  const sorted = Object.entries(teamStats)
    .sort((a, b) => {
      if (b[1].punti !== a[1].punti) return b[1].punti - a[1].punti;
      if (b[1].dr !== a[1].dr) return b[1].dr - a[1].dr;
      return b[1].gf - a[1].gf;
    })
    .map(([name, stats], index) => ({ pos: index + 1, name, ...stats }));
  
  return (
    <div>
      <div className="sub-tabs">
        <button className={view === 'generale' ? 'active' : ''} onClick={() => setView('generale')}>Generale</button>
        <button className={view === 'casa' ? 'active' : ''} onClick={() => setView('casa')}>Casa</button>
        <button className={view === 'ospite' ? 'active' : ''} onClick={() => setView('ospite')}>Ospite</button>
      </div>
      
      <div className="standings-table-wrap">
        <table className="standings-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Squadra</th>
              <th className="num">PG</th>
              <th className="num">Punti</th>
              <th className="num">V</th>
              <th className="num">P</th>
              <th className="num">S</th>
              <th className="num">GF</th>
              <th className="num">GS</th>
              <th className="num">DR</th>
              <th className="num">xG</th>
              <th className="num">Media Gol</th>
            </tr>
          </thead>
          <tbody>
            {sorted.map(row => {
              const isHighlighted = highlightTeams.includes(row.name);
              return (
                <tr key={row.name} className={isHighlighted ? 'highlighted' : ''}>
                  <td className="pos">{row.pos}</td>
                  <td className="team-name">{row.name}</td>
                  <td className="num">{row.pg}</td>
                  <td className="points">{row.punti}</td>
                  <td className="num">{row.v}</td>
                  <td className="num">{row.p}</td>
                  <td className="num">{row.s}</td>
                  <td className="num">{row.gf}</td>
                  <td className="num">{row.gs}</td>
                  <td className="num">{row.dr > 0 ? '+' : ''}{row.dr}</td>
                  <td className="num">{row.xG.toFixed(2)}</td>
                  <td className="num">{row.mediaGol.toFixed(2)}</td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
};

const MatchTab = ({ match, allMatches, onSelect, addToSchedina }) => {
  const homeForm = calcFormAndStats(allMatches, match.casa);
  const awayForm = calcFormAndStats(allMatches, match.ospiti);
  const champColor = getChampColor(match.campionato);
  const diff = Math.abs(homeForm.pct - awayForm.pct);
  
  const renderFormSquares = (formStr) => {
    return [...formStr].map((letter, idx) => (
      <div key={idx} className={`form-square form-square-${letter}`}>
        {letter}
      </div>
    ));
  };
  
  const homeMG = getTeamMultigolV2(allMatches, match.casa);
  const awayMG = getTeamMultigolV2(allMatches, match.ospiti);
  const homeUO = getTeamUnderOver(allMatches, match.casa);
  const awayUO = getTeamUnderOver(allMatches, match.ospiti);
  const pct12Under45 = get12Under45(allMatches, match.casa, match.ospiti);
  
  let teamFavorita, teamSfavorita;
  let pctFavorita, pctSfavorita;
  let suffix0x = '';
  
  if (diff >= 33) {
    if (homeForm.pct >= awayForm.pct) {
      teamFavorita = match.casa;
      teamSfavorita = match.ospiti;
    } else {
      teamFavorita = match.ospiti;
      teamSfavorita = match.casa;
    }
  } else {
    if (homeMG['1-3'] >= awayMG['1-3']) {
      teamFavorita = match.casa;
      teamSfavorita = match.ospiti;
    } else {
      teamFavorita = match.ospiti;
      teamSfavorita = match.casa;
    }
  }
  
  const mgSfavorita = getTeamMultigolV2(allMatches, teamSfavorita);
  if (mgSfavorita['0-1'] >= mgSfavorita['0-2']) {
    suffix0x = '0-1';
    pctSfavorita = mgSfavorita['0-1'];
  } else {
    suffix0x = '0-2';
    pctSfavorita = mgSfavorita['0-2'];
  }
  const mgFavorita = getTeamMultigolV2(allMatches, teamFavorita);
  pctFavorita = mgFavorita['1-3'];
  
  let bet2Label, bet2Team1, bet2Pct1, bet2Team2, bet2Pct2;
  if (teamFavorita === match.casa) {
    bet2Label = `(1-3) + (${suffix0x})`;
    bet2Team1 = teamFavorita;
    bet2Pct1 = pctFavorita;
    bet2Team2 = teamSfavorita;
    bet2Pct2 = pctSfavorita;
  } else {
    bet2Label = `(${suffix0x}) + (1-3)`;
    bet2Team1 = teamSfavorita;
    bet2Pct1 = pctSfavorita;
    bet2Team2 = teamFavorita;
    bet2Pct2 = pctFavorita;
  }
  
  const allUO = { ...homeUO, ...awayUO };
  let bestBet = '';
  let bestPct = 0;
  Object.entries(allUO).forEach(([key, val]) => {
    if (val > bestPct) {
      bestPct = val;
      bestBet = key;
    }
  });
  
  const score = Math.round((pct12Under45 + pctFavorita + pctSfavorita + bestPct) / 4);
  
  const handleClick = (e) => {
    e.stopPropagation();
    onSelect(match.id);
  };
  
  const addBet1 = (e) => {
    e.stopPropagation();
    const text = `Giocata 12+U4.5: ${Math.round(pct12Under45)}% (${match.casa} vs ${match.ospiti})`;
    addToSchedina(text);
  };
  const addBet2 = (e) => {
    e.stopPropagation();
    const text = `Combinata: ${bet2Label} - ${bet2Team1} (${Math.round(bet2Pct1)}%) / ${bet2Team2} (${Math.round(bet2Pct2)}%) - ${match.casa} vs ${match.ospiti}`;
    addToSchedina(text);
  };
  const addBet3 = (e) => {
    e.stopPropagation();
    const text = `Miglior U/O: ${bestBet} ${Math.round(bestPct)}% (${match.casa} vs ${match.ospiti})`;
    addToSchedina(text);
  };
  
  return (
    <div className="match-tab" style={{borderLeftColor: champColor}} onClick={handleClick}>
      <div className="score-badge">{score}%</div>
      <div className="tab-header" style={{background: champColor}}>📊 {match.campionato}</div>
      <div className="match-info">{match.campionato} - Giornata: {match.round}</div>
      <div className="match-info">📅 {formatDateEU(match.data)} - ⏰ {match.ora || 'TBD'}</div>
      
      <div className="teams-row">
        <div className="team">
          <div className="team-name">{match.casa}</div>
        </div>
        <div className="vs">VS</div>
        <div className="team">
          <div className="team-name">{match.ospiti}</div>
        </div>
      </div>
      
      <div className="form-row-compact">
        <div className="form-block-compact">
          <div className="form-label">Forma Casa</div>
          <div className="form-squares">{renderFormSquares(homeForm.form)}</div>
          <div className="form-pct-compact">{homeForm.pct}%</div>
          <div className="form-bar"><div className="form-bar-fill" style={{width: homeForm.pct+'%'}}></div></div>
        </div>
        <div className="form-block-compact">
          <div className="form-label">Forma Ospite</div>
          <div className="form-squares">{renderFormSquares(awayForm.form)}</div>
          <div className="form-pct-compact">{awayForm.pct}%</div>
          <div className="form-bar"><div className="form-bar-fill" style={{width: awayForm.pct+'%'}}></div></div>
        </div>
      </div>
      
      <div className="form-diff">
        📊 Differenza forma: <span>{diff}%</span>
      </div>
      
      <div className="bet-row">
        <div className="bet-item" onClick={addBet1}>
          <div className="bet-label">12+U4.5</div>
          <div className="bet-value">{Math.round(pct12Under45)}%</div>
        </div>
        <div className="bet-item" style={{flex: 2}} onClick={addBet2}>
          <div className="bet-label">{bet2Label}</div>
          <div className="bet-value" style={{fontSize: '12px'}}>
            {bet2Team1}: {Math.round(bet2Pct1)}% - {bet2Team2}: {Math.round(bet2Pct2)}%
          </div>
        </div>
        <div className="bet-item" onClick={addBet3}>
          <div className="bet-label">Miglior U/O</div>
          <div className="bet-value">{bestBet}: {Math.round(bestPct)}%</div>
        </div>
      </div>
    </div>
  );
};

// ============ ANALISI AI AVANZATA (CON 3 CONSIGLI) ============
const AIAnalysis = ({ match, allMatches, apiKey, setTab }) => {
  const [analysis, setAnalysis] = useState(null);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  
  useEffect(() => {
    if (!match) return;
    const storageKey = `ft_ai_${match.id}`;
    const saved = localStorage.getItem(storageKey);
    if (saved) {
      try {
        const parsed = JSON.parse(saved);
        setAnalysis(parsed);
        setError(null);
        return;
      } catch (e) {}
    }
    generateAnalysis();
  }, [match]);
  
  const generateAnalysis = async () => {
    if (!match) return;
    if (!apiKey) {
      setError('🔑 Chiave API GROQ non configurata');
      setLoading(false);
      return;
    }
    
    setLoading(true);
    setError(null);
    
    try {
      const stats = computeMatchStats(match, allMatches);
      if (stats.error) {
        setError(stats.error);
        setLoading(false);
        return;
      }
      
      const homeForm = calcFormAndStats(allMatches, match.casa);
      const awayForm = calcFormAndStats(allMatches, match.ospiti);
      const homeMG = calcTeamMG(allMatches, match.casa);
      const awayMG = calcTeamMG(allMatches, match.ospiti);
      
      const pct12Under45 = get12Under45(allMatches, match.casa, match.ospiti);
      const is12Under45Good = pct12Under45 >= 70;
      
      const prompt = `Analizza i seguenti dati pre-match e genera un'analisi dettagliata.
Rispondi ESCLUSIVAMENTE in formato JSON valido, con questa struttura:
{
  "panoramica": "Testo analisi stato di forma",
  "impatto_assenze": "Testo su infortuni e squalifiche (se non disponibili, indica 'Nessuna informazione')",
  "fattore_meteo_campo": "Testo su come il meteo e il campo influiscono (se non disponibili, indica 'Nessuna informazione')",
  "chiavi_tattiche": "Testo sull'analisi tattica",
  "pronostico": {
    "esito_1X2": "1, X o 2",
    "percentuale_sicurezza": 75,
    "12+under_4_5": "${is12Under45Good ? 'Sì' : 'No'}",
    "12+under_4_5_pct": ${Math.round(pct12Under45)},
    "motivazione_sintetica": "Una frase di riepilogo"
  },
  "consigli": [
    {
      "tipo": "singola",
      "giocata": "Over 1.5",
      "percentuale": 68
    },
    {
      "tipo": "combinata",
      "giocata": "2 + Under 4.5",
      "percentuale": 55
    },
    {
      "tipo": "libera",
      "giocata": "Multigol 1-3 + Over 2.5",
      "percentuale": 72
    }
  ],
  "indice_rischio_match": 5
}

Dati partita:
Partita: ${match.casa} vs ${match.ospiti}
Campionato: ${match.campionato} - Giornata: ${match.round}
Data: ${match.data} - Ora: ${match.ora}
Forma Casa: ${homeForm.form} (${homeForm.pct}%)
Forma Ospite: ${awayForm.form} (${awayForm.pct}%)
Differenza forma: ${Math.abs(homeForm.pct - awayForm.pct)}%
Media Gol Casa: ${homeMG} - Media Gol Ospite: ${awayMG}
1X2: 1=${Math.round(stats.p1)}% X=${Math.round(stats.pX)}% 2=${Math.round(stats.p2)}%
Doppia Chance: 1X=${Math.round(stats.p1X)}% 12=${Math.round(stats.p12)}% X2=${Math.round(stats.pX2)}%
Under/Over 1.5: U=${Math.round(stats.underOver[0].under)}% O=${Math.round(stats.underOver[0].over)}%
Under/Over 2.5: U=${Math.round(stats.underOver[1].under)}% O=${Math.round(stats.underOver[1].over)}%
Under/Over 3.5: U=${Math.round(stats.underOver[2].under)}% O=${Math.round(stats.underOver[2].over)}%
Under/Over 4.5: U=${Math.round(stats.underOver[3].under)}% O=${Math.round(stats.underOver[3].over)}%
Multigol Casa: 0-1=${Math.round(stats.homeMG['0-1'])}% 0-2=${Math.round(stats.homeMG['0-2'])}% 1-3=${Math.round(stats.homeMG['1-3'])}% 2-4=${Math.round(stats.homeMG['2-4'])}%
Multigol Ospite: 0-1=${Math.round(stats.awayMG['0-1'])}% 0-2=${Math.round(stats.awayMG['0-2'])}% 1-3=${Math.round(stats.awayMG['1-3'])}% 2-4=${Math.round(stats.awayMG['2-4'])}%
Multigol Totale: 1-4=${Math.round(stats.mgTot['1-4'])}% 2-4=${Math.round(stats.mgTot['2-4'])}% 2-5=${Math.round(stats.mgTot['2-5'])}% 3-6=${Math.round(stats.mgTot['3-6'])}%

Genera 3 consigli di giocate (singola, combinata, libera) basati sui dati, con percentuali realistiche.`;
      
      const res = await askGroq(prompt, apiKey);
      
      let jsonStr = res;
      const jsonMatch = res.match(/```(?:json)?\s*([\s\S]*?)```/);
      if (jsonMatch) jsonStr = jsonMatch[1];
      const parsed = JSON.parse(jsonStr.trim());
      
      if (parsed.pronostico) {
        parsed.pronostico['12+under_4_5'] = is12Under45Good ? 'Sì' : 'No';
        parsed.pronostico['12+under_4_5_pct'] = Math.round(pct12Under45);
      }
      
      const storageKey = `ft_ai_${match.id}`;
      localStorage.setItem(storageKey, JSON.stringify(parsed));
      
      setAnalysis(parsed);
      setError(null);
    } catch (e) {
      console.warn('Errore analisi AI:', e);
      setError(e.message || 'Errore durante la generazione dell\'analisi');
    }
    setLoading(false);
  };
  
  const refreshAnalysis = () => {
    if (match) {
      const storageKey = `ft_ai_${match.id}`;
      localStorage.removeItem(storageKey);
      generateAnalysis();
    }
  };
  
  const goToApiKey = () => {
    if (setTab) setTab('API KEY');
  };
  
  if (!match) return null;
  
  if (loading) {
    return (
      <div className="ai-analysis-loading">
        ⏳ Generazione analisi AI...<br/>
        <span style={{fontSize:'12px', color:'var(--text-muted)'}}>Potrebbe richiedere alcuni secondi</span>
      </div>

  }
  
  if (error) {
    const isKeyError = error.includes('API GROQ') || error.includes('chiave');
    return (
      <div className="ai-analysis-error">
        <span>⚠️ {error}</span>

        {!isKeyError && (

            <button className="btn-go-key" onClick={refreshAnalysis}>
              🔄 Riprova
            </button>
          </div>
        )}
      </div>
    );
  }
  
  if (!analysis) return null;
  
  const { panoramica, impatto_assenze, fattore_meteo_campo, chiavi_tattiche, pronostico, consigli, indice_rischio_match } = analysis;
  
  return (
    <div className="ai-analysis-box">
      <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'6px'}}>
        <h3 style={{color: getChampColor(match.campionato), margin:0, fontSize:'16px'}}>🤖 Analisi AI Avanzata</h3>
        <button className="btn-refresh" onClick={refreshAnalysis} title="Rigenera analisi">🔄</button>
      </div>
      
      <h4>📋 Panoramica</h4>
      <p>{panoramica || 'N/A'}</p>
      
      <h4>⚠️ Impatto Assenze</h4>
      <p>{impatto_assenze || 'Nessuna informazione'}</p>
      
      <h4>🌤️ Fattore Meteo/Campo</h4>
      <p>{fattore_meteo_campo || 'Nessuna informazione'}</p>
      
      <h4>🧠 Chiavi Tattiche</h4>
      <p>{chiavi_tattiche || 'N/A'}</p>
      
      <div className="pronostico-mini">
        <div className="item">
          <div className="label">Pronostico 1X2</div>
          <div className="value">{pronostico?.esito_1X2 || 'N/D'}</div>
        </div>
        <div className="item">
          <div className="label">Sicurezza</div>
          <div className="value" style={{color: (pronostico?.percentuale_sicurezza || 0) >= 80 ? 'var(--win)' : 'var(--accent)'}}>
            {pronostico?.percentuale_sicurezza || 0}%
          </div>
        </div>
        <div className="item">
          <div className="label">12+Under 4.5</div>
          <div className="value">
            {pronostico?.['12+under_4_5'] || 'No'}
            {pronostico?.['12+under_4_5_pct'] !== undefined && (

                ({pronostico['12+under_4_5_pct']}%)

// ============ APP ============
function App() {
  const initial = loadState();
  const [tab, setTab] = useState('Palinsesto');
  const [settingsTab, setSettingsTab] = useState('Temi');
  const [championships, setChampionships] = useState(initial.championships);
  const [matches, setMatches] = useState(initial.matches);
  const [apiKeys, setApiKeys] = useState(initial.apiKeys);
  const [theme, setTheme] = useState(initial.theme);
  const [customTheme, setCustomTheme] = useState(initial.customTheme || THEMES['Scuro Blu Notte']);
  const [selectedChamp, setSelectedChamp] = useState('Tutti');
  const [loading, setLoading] = useState(false);
  const [message, setMessage] = useState(null);
  const [debugColumns, setDebugColumns] = useState(null);
  
  // Stato per Schedina AI
  const [numMatches, setNumMatches] = useState(3);
  const [schedinaChamp, setSchedinaChamp] = useState('Tutti');
  const [daysRange, setDaysRange] = useState(0);
  const [schedinaMatches, setSchedinaMatches] = useState([]);
  const [schedinaSelections, setSchedinaSelections] = useState({});
  const [schedinaEntries, setSchedinaEntries] = useState([]);
  
  // Stato per tracciare le partite già utilizzate (consumate)
  const [usedMatchIds, setUsedMatchIds] = useState(new Set());
  
  const [schedinaPrompt, setSchedinaPrompt] = useState('Analizza le partite future e suggerisci 3 giocate di valore con motivazione.');
  const [schedinaResult, setSchedinaResult] = useState('');
  const [schedinaJson, setSchedinaJson] = useState(null);
  
  const [tempKeys, setTempKeys] = useState(apiKeys);
  const [apiTestResult, setApiTestResult] = useState({});
  
  const [selectedMatchId, setSelectedMatchId] = useState(null);
  
  const addToSchedina = (text) => {
    setSchedinaPrompt(prev => prev + '\n- ' + text);
    setTab('Schedina AI');
    showAlert('success', '✅ Giocata aggiunta alla Schedina AI!');
  };
  
  const addToSchedinaDirect = (matchId, giocata) => {
    const match = matches.find(m => m.id === matchId);
    if (!match) return;
    const entry = `${match.casa} vs ${match.ospiti} - ${giocata}`;
    if (schedinaEntries.includes(entry)) {
      showAlert('info', '⚠️ Giocata già presente nella schedina.');
      return;
    }
    setSchedinaEntries(prev => [...prev, entry]);
    const key = `${matchId}_${giocata}`;
    setSchedinaSelections(prev => ({ ...prev, [key]: true }));
    showAlert('success', '✅ Giocata aggiunta alla schedina!');
  };
  
  // Funzione che resetta le CARD (rimette tutte le partite a disposizione)
  const resetCards = () => {
    setUsedMatchIds(new Set());
    // Rigenera la schedina con le prime partite disponibili
    generateSchedina();
    showAlert('info', '🔄 CARD ricalcolate! Tutte le partite sono di nuovo disponibili.');
  };
  
  const generateSchedina = () => {
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    const maxDate = new Date(today);
    maxDate.setDate(maxDate.getDate() + daysRange);
    
    // Filtra le partite future in base al range giorni e al campionato
    let filtered = matches.filter(m => {
      if (m.stato !== 'Futura') return false;
      if (!m.data) return false;
      const matchDate = new Date(m.data);
      if (isNaN(matchDate.getTime())) return false;
      matchDate.setHours(0, 0, 0, 0);
      return matchDate >= today && matchDate <= maxDate;
    });
    
    if (schedinaChamp !== 'Tutti') {
      filtered = filtered.filter(m => m.campionato === schedinaChamp);
    }
    
    // Se non ci sono partite dopo il filtro, resetta e prova di nuovo
    if (filtered.length === 0) {
      setUsedMatchIds(new Set());
      showAlert('info', '🔄 Nessuna partita disponibile. CARD ricalcolate automaticamente.');
      // Richiama la funzione con le CARD resetate
      generateSchedina();
      return;
    }
    
    // Escludi le partite già utilizzate
    let available = filtered.filter(m => !usedMatchIds.has(m.id));
    
    // Se non ci sono partite disponibili, resetta e ricomincia
    if (available.length === 0) {
      setUsedMatchIds(new Set());
      showAlert('info', '🔄 Tutte le partite sono state consumate. CARD ricalcolate automaticamente.');
      // Richiama la funzione con le CARD resetate
      generateSchedina();
      return;
    }
    
    // Calcola il punteggio per ogni partita disponibile
    const scoredMatches = available.map(m => {
      const homeMG = getTeamMultigolV2(matches, m.casa);
      const awayMG = getTeamMultigolV2(matches, m.ospiti);
      const homeUO = getTeamUnderOver(matches, m.casa);
      const awayUO = getTeamUnderOver(matches, m.ospiti);
      const pct12Under45 = get12Under45(matches, m.casa, m.ospiti);
      
      let teamFavorita, teamSfavorita;
      let pctFavorita, pctSfavorita;
      const diff = Math.abs(calcFormAndStats(matches, m.casa).pct - calcFormAndStats(matches, m.ospiti).pct);
      if (diff >= 33) {
        if (calcFormAndStats(matches, m.casa).pct >= calcFormAndStats(matches, m.ospiti).pct) {
          teamFavorita = m.casa;
          teamSfavorita = m.ospiti;
        } else {
          teamFavorita = m.ospiti;
          teamSfavorita = m.casa;
        }
      } else {
        if (homeMG['1-3'] >= awayMG['1-3']) {
          teamFavorita = m.casa;
          teamSfavorita = m.ospiti;
        } else {
          teamFavorita = m.ospiti;
          teamSfavorita = m.casa;
        }
      }
      const mgSfavorita = getTeamMultigolV2(matches, teamSfavorita);
      let suffix0x = '';
      let pctSfavoritaVal = 0;
      if (mgSfavorita['0-1'] >= mgSfavorita['0-2']) {
        suffix0x = '0-1';
        pctSfavoritaVal = mgSfavorita['0-1'];
      } else {
        suffix0x = '0-2';
        pctSfavoritaVal = mgSfavorita['0-2'];
      }
      const mgFavorita = getTeamMultigolV2(matches, teamFavorita);
      pctFavorita = mgFavorita['1-3'];
      pctSfavorita = pctSfavoritaVal;
      
      const allUO = { ...homeUO, ...awayUO };
      let bestPct = 0;
      let bestBet = '';
      Object.entries(allUO).forEach(([key, val]) => {
        if (val > bestPct) {
          bestPct = val;
          bestBet = key;
        }
      });
      
      const score = Math.round((pct12Under45 + pctFavorita + pctSfavorita + bestPct) / 4);
      return { ...m, score, teamFavorita, teamSfavorita, pctFavorita, pctSfavorita, suffix0x, pct12Under45, bestBet, bestPct };
    });
    
    // Ordina per punteggio decrescente e prendi i primi N
    scoredMatches.sort((a, b) => b.score - a.score);
    const selected = scoredMatches.slice(0, numMatches);
    
    // Segna le partite selezionate come utilizzate
    const newUsed = new Set(usedMatchIds);
    selected.forEach(m => newUsed.add(m.id));
    setUsedMatchIds(newUsed);
    
    setSchedinaMatches(selected);
    setSchedinaSelections({});
  };
  
  // Resetta la schedina
  const resetSchedina = () => {
    setSchedinaMatches([]);
    setSchedinaSelections({});
    setSchedinaEntries([]);
    // Non resettiamo usedMatchIds per non perdere il progresso delle CARD
  };
  
  // Salva la schedina in locale (download JSON)
  const saveSchedinaLocal = () => {
    const data = {
      timestamp: new Date().toISOString(),
      entries: schedinaEntries,
      total: schedinaEntries.length
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `schedina_${Date.now()}.json`;
    a.click();
    showAlert('success', '💾 Schedina salvata in locale!');
  };
  
  const copySchedinaText = () => {
    const text = schedinaEntries.map((e, i) => `${i+1}. ${e}`).join('\n');
    navigator.clipboard.writeText(text).then(() => {
      showAlert('success', '📋 Schedina copiata negli appunti!');
    }).catch(() => {
      showAlert('error', '❌ Errore durante la copia.');
    });
  };
  
  const exportSchedinaImage = () => {
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    const width = 600;
    const lineHeight = 30;
    const padding = 20;
    const entries = schedinaEntries.length || 1;
    const height = padding * 2 + (entries + 2) * lineHeight + 40;
    canvas.width = width;
    canvas.height = height;
    
    ctx.fillStyle = '#1a2028';
    ctx.fillRect(0, 0, width, height);
    
    ctx.fillStyle = '#f39c12';
    ctx.font = 'bold 20px Arial';
    ctx.fillText('📋 Schedina GesssAI-Pro', padding, 40);
    
    ctx.fillStyle = '#8b949e';
    ctx.font = '14px Arial';
    ctx.fillText(`Data: ${new Date().toLocaleString()}`, padding, 70);
    
    ctx.fillStyle = '#e6edf3';
    ctx.font = '14px Arial';
    entries.forEach((entry, i) => {
      const y = 100 + i * lineHeight;
      ctx.fillText(`${i+1}. ${entry}`, padding, y);
    });
    
    ctx.fillStyle = '#f39c12';
    ctx.font = 'bold 16px Arial';
    ctx.fillText(`Totale: ${entries} giocate`, padding, 100 + entries * lineHeight + 10);
    
    const imgData = canvas.toDataURL('image/png');
    const link = document.createElement('a');
    link.href = imgData;
    link.download = `schedina_${Date.now()}.png`;
    link.click();
    showAlert('success', '🖼️ Schedina esportata come immagine!');
  };
  
  useEffect(() => {
    saveState({ championships, matches, apiKeys, theme, customTheme });
  }, [championships, matches, apiKeys, theme, customTheme]);
  
  useEffect(() => {
    const t = theme === 'Custom' ? customTheme : THEMES[theme] || THEMES['Scuro Blu Notte'];
    const root = document.documentElement;
    Object.entries(t).forEach(([k, v]) => {
      root.style.setProperty(`--${k.replace(/([A-Z])/g, '-$1').toLowerCase()}`, v);
    });
  }, [theme, customTheme]);
  
  const showAlert = (type, text) => {
    setMessage({ type, text });
    setTimeout(() => setMessage(null), 4000);
  };
  
  const selectMatch = (matchId) => {
    setSelectedMatchId(matchId);
    setTab('Statistiche');
  };
  
  const deselectMatch = () => {
    setSelectedMatchId(null);
  };
  
  const importXLSX = async (file) => {
    setLoading(true);
    setDebugColumns(null);
    try {
      const buffer = await file.arrayBuffer();
      const wb = XLSX.read(buffer, { type:'array' });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, { header: 1 });
      
      if (rows.length < 2) {
        showAlert('error', ' Il file è vuoto o non contiene dati validi');
        setLoading(false);
        return;
      }
      
      const headers = rows[0].map(h => String(h).trim());
      setDebugColumns(headers);
      
      const colMap = {};
      headers.forEach((h, idx) => {
        const normalized = h.toLowerCase().replace(/\s+/g, '');
        colMap[normalized] = idx;
      });
      
      const requiredCols = ['campionato', 'casa', 'ospite'];
      const missing = requiredCols.filter(c => !(c in colMap));
      
      if (missing.length > 0) {
        showAlert('error', `❌ Colonne mancanti: ${missing.join(', ')}. Colonne trovate: ${headers.join(', ')}`);
        setLoading(false);
        return;
      }
      
      const newMatches = [];
      const champSet = new Set(championships.map(c => c.name));
      
      for (let i = 1; i < rows.length; i++) {
        const row = rows[i];
        if (!row || row.length === 0) continue;
        
        const getCol = (names) => {
          for (const name of names) {
            const normalized = name.toLowerCase().replace(/\s+/g, '');
            if (colMap[normalized] !== undefined && row[colMap[normalized]] !== undefined && row[colMap[normalized]] !== '') {
              return row[colMap[normalized]];
            }
          }
          return null;
        };
        
        const campionato = getCol(['Campionato', 'campionato']);
        const round = getCol(['Round', 'round', 'Giornata', 'giornata']) || 'N/A';
        const data = getCol(['Data', 'data']);
        const ora = getCol(['Ora', 'ora', 'Time', 'time']);
        const casa = getCol(['Casa', 'casa', 'Home', 'home']);
        const ospiti = getCol(['Ospite', 'ospite', 'Ospiti', 'ospiti', 'Away', 'away']);
        const statoRaw = getCol(['Stato', 'stato', 'Status', 'status']) || 'Futura';
        const golCasaRaw = getCol(['GolCasa', 'golcasa']);
        const golOspiteRaw = getCol(['GolOspite', 'golospite']);
        
        if (!campionato || !casa || !ospiti) continue;
        
        const stato = String(statoRaw).toLowerCase().includes('gioc') ? 'Giocata' : 'Futura';
        
        let golCasa = 0, golOspite = 0;
        if (stato === 'Giocata') {
          golCasa = parseInt(golCasaRaw) || 0;
          golOspite = parseInt(golOspiteRaw) || 0;
        }
        
        let dataStr = '';
        if (data instanceof Date) {
          dataStr = data.toISOString().slice(0, 10);
        } else if (data) {
          const dataString = String(data).trim();
          if (dataString.match(/^\d{4}-\d{2}-\d{2}/)) {
            dataStr = dataString.slice(0, 10);
          } else if (dataString.match(/^\d{2}\/\d{2}\/\d{4}/)) {
            const [d, m, y] = dataString.split('/');
            dataStr = `${y}-${m}-${d}`;
          } else {
            dataStr = new Date(dataString).toISOString().slice(0, 10);
          }
        } else {
          continue;
        }
        
        let oraStr = 'TBD';
        if (ora) {
          const oraString = String(ora);
          oraStr = oraString.split('(')[0].trim().slice(0, 5);
          if (!oraStr.match(/^\d{2}:\d{2}$/)) oraStr = 'TBD';
        }
        
        champSet.add(campionato);
        
        newMatches.push({
          id: Math.random().toString(36).slice(2),
          campionato, round, data: dataStr, ora: oraStr,
          casa, ospiti, stato, golCasa, golOspite,
        });
      }
      
      if (newMatches.length === 0) {
        showAlert('error', `❌ Nessuna partita valida trovata. Colonne rilevate: ${headers.join(', ')}`);
        setLoading(false);
        return;
      }
      
      const newChamps = [...championships];
      champSet.forEach(name => {
        if (!newChamps.find(c => c.name === name)) newChamps.push({ name, importedAt: new Date().toISOString() });
      });
      
      setChampionships(newChamps);
      const allMatches = [...matches, ...newMatches];
      setMatches(allMatches);
      showAlert('success', `✅ Caricate ${newMatches.length} partite!`);
      
      setDebugColumns(null);
    } catch(e) {
      console.error('Errore importazione:', e);
      showAlert('error', '❌ Errore: ' + e.message);
    }
    setLoading(false);
  };

            <h2 style={{marginBottom:'14px'}}>🔑 Gestione API Key</h2>
            <div className="alert alert-info">
              💡 <b>Football-data.org</b> per scaricare i campionati. <b>GROQ</b> per l'AI. <b>OpenWeatherMap</b> opzionale.
            </div>
            {['Football-data', 'API-Football', 'GROQ', 'OpenWeatherMap'].map(name => (
              <div key={name} className="card">
                <h3>{name}</h3>
                <div className="form-group" style={{marginTop:'10px'}}>
                  <label>API Key</label>
                  <input type="password" value={tempKeys[name] || ''}
                    onChange={e => setTempKeys({ ...tempKeys, [name]: e.target.value })}
                    placeholder={`Inserisci la tua key ${name}`} />
                </div>
                <div style={{display:'flex', gap:'8px', flexWrap:'wrap'}}>
                  <button className="btn btn-secondary" onClick={() => testApiKey(name)}>🧪 Test</button>
                  <button className="btn" onClick={() => confirmApiKey(name)}>💾 Conferma</button>
                  {apiTestResult[name] && <span style={{padding:'10px', color: apiTestResult[name]==='OK' ? 'var(--win)' : 'var(--lose)'}}><b>Test: {apiTestResult[name]}</b></span>}
                  {apiKeys[name] && <span style={{padding:'10px', color:'var(--win)'}}>✅ Configurata</span>}
                </div>
              </div>
            ))}
          </div>
        )}
        
        {tab === 'Impostazioni' && (
          <div>
            <div className="tabs-sub">
              {SETTINGS_TABS.map(t => (
                <button key={t} className={settingsTab === t ? 'active' : ''} onClick={() => setSettingsTab(t)}>{t}</button>
              ))}
            </div>
            
            {settingsTab === 'Temi' && (
              <div>
                <h3 style={{marginBottom:'12px'}}>🎨 Scegli un Tema</h3>
                <div className="theme-grid">
                  {Object.entries(THEMES).map(([name, t]) => (
                    <div key={name} className={`theme-card ${theme === name ? 'active' : ''}`}
                      style={{background: t.card, color: t.text, borderColor: theme === name ? t.accent : t.border}}
                      onClick={() => setTheme(name)}>
                      <div className="theme-name" style={{color: t.accent}}>{name}</div>
                      <div style={{display:'flex', gap:'4px', justifyContent:'center', marginTop:'6px'}}>
                        <div style={{width:'20px',height:'20px',background:t.bg,borderRadius:'50%'}}></div>
                        <div style={{width:'20px',height:'20px',background:t.accent,borderRadius:'50%'}}></div>
                        <div style={{width:'20px',height:'20px',background:t.text,borderRadius:'50%'}}></div>
                      </div>
                    </div>
                  ))}
                  <div className={`theme-card ${theme === 'Custom' ? 'active' : ''}`}
                    style={{background: customTheme.card, color: customTheme.text, borderColor: theme === 'Custom' ? customTheme.accent : customTheme.border}}
                    onClick={() => setTheme('Custom')}>
                    <div className="theme-name" style={{color: customTheme.accent}}>🎨 Custom</div>
                  </div>
                </div>
                {theme === 'Custom' && (
                  <div className="card" style={{marginTop:'20px'}}>
                    <h3 style={{marginBottom:'12px'}}>Personalizza Colori</h3>
                    {[
                      ['Sfondo','bg'],['Superficie','surface'],['Card','card'],['Banner','banner'],
                      ['Testo','text'],['Testo Muted','textMuted'],['Accento','accent'],['Accento 2','accent2'],['Bordo','border']
                    ].map(([label, key]) => (
                      <div key={key} className="color-picker-row">
                        <input type="color" value={customTheme[key]} onChange={e => setCustomTheme({ ...customTheme, [key]: e.target.value })} />
                        <span>{label}</span>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}
            
            {settingsTab === 'API KEY' && (
              <div>
                <p style={{color:'var(--text-muted)'}}>Le API Key sono gestite nel TAB dedicato.</p>
                <button className="btn" onClick={() => setTab('API KEY')} style={{marginTop:'10px'}}>🔑 Vai al TAB API KEY</button>
              </div>
            )}
            
            {settingsTab === 'Dati Locali' && (
              <div>
                <h3 style={{marginBottom:'12px'}}>💾 Salvataggio / Caricamento</h3>
                <div className="card">
                  <p style={{marginBottom:'12px'}}>I dati vengono salvati automaticamente in localStorage.</p>
                  <button className="btn" onClick={saveLocal} style={{marginRight:'8px'}}>💾 Scarica Backup JSON</button>
                  <hr style={{margin:'14px 0', borderColor:'var(--border)'}}/>
                  <label style={{display:'block', marginBottom:'6px'}}>📂 Carica Backup JSON</label>
                  <input type="file" accept=".json" onChange={e => e.target.files[0] && loadLocal(e.target.files[0])} />
                  <hr style={{margin:'14px 0', borderColor:'var(--border)'}}/>
                  <button className="btn btn-danger" onClick={() => {
                    if (confirm('Vuoi davvero resettare TUTTI i dati?')) {
                      localStorage.clear();
                      setChampionships([]); setMatches([]); setApiKeys({}); setTempKeys({});
                      showAlert('success', '🗑️ Dati resettati.');
                    }
                  }}>🗑️ Reset Completo</button>
                </div>
              </div>
            )}
            
            {settingsTab === 'Importa Campionato' && (
              <div>
                <h3 style={{marginBottom:'12px'}}>📥 Importa Campionato da XLSX</h3>
                <div className="card">
                  <div className="alert alert-info">
                    Il file deve avere colonne: <b>Campionato | Round | Data | Ora | Casa | Risultato | Ospite | Stato | Gol Casa | Gol Ospite</b><br/>
                    Formato data accettato: <b>YYYY-MM-DD</b> (es. 2026-07-11)
                  </div>
                  <input type="file" accept=".xlsx,.xls" onChange={e => e.target.files[0] && importXLSX(e.target.files[0])} />
                  
                  {debugColumns && (
                    <div className="debug-columns">
                      <h4>🔍 Colonne rilevate nel file:</h4>
                      <div>
                        {debugColumns.map((col, idx) => (
                          <code key={idx}>{col}</code>
                        ))}
                      </div>
                    </div>
                  )}
                </div>
                
                <h3 style={{margin:'20px 0 12px'}}>
                  📋 Campionati Importati
                  <button 
                    className="btn btn-danger btn-sm" 
                    style={{marginLeft:'12px'}} 
                    onClick={clearAllChampionships}
                  >
                    🗑️ Elimina tutti
                  </button>
                </h3>
                {championships.length === 0 ? (
                  <div className="empty-state">Nessun campionato importato.</div>
                ) : (
                  <div className="champ-list">
                    {championships.map(c => (
                      <div key={c.name} className="champ-item" style={{borderLeft: `4px solid ${getChampColor(c.name)}`, paddingLeft:'12px'}}>
                        <div>
                          <b>{c.name}</b>
                          <div style={{fontSize:'11px', color:'var(--text-muted)'}}>
                            {matches.filter(m => m.campionato === c.name).length} partite
                          </div>
                        </div>
                        <button className="btn btn-danger btn-sm" onClick={() => {
                          if (confirm(`Eliminare ${c.name} e tutte le sue partite?`)) {
                            setChampionships(championships.filter(x => x.name !== c.name));
                            setMatches(matches.filter(m => m.campionato !== c.name));
                          }
                        }}>🗑️ Elimina</button>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}
          </div>
        )}
        
        <div style={{textAlign:'center', padding:'20px', color:'var(--text-muted)', fontSize:'12px'}}>
          GesssAI-Pro v1.0 • Dati: {matches.length} partite in {championships.length} campionati
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
