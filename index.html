<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<title>GesssAI-Pro - Football Trader</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root {
    --bg: #0f1419;
    --surface: #1a2028;
    --card: #232b36;
    --banner: #2c3642;
    --text: #e6edf3;
    --text-muted: #ffff00;
    --accent: #f39c12;
    --accent2: #e67e22;
    --border: #30363d;
    --win: #6fcf97;
    --draw: #f2c94c;
    --lose: #eb5757;
    --tab-active: #f39c12;
    
    --pct-rosso: #eb5757;
    --pct-neutro: #8b949e;
    --pct-verde: #6fcf97;
    --pct-oro: #f39c12;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }
  body { background: var(--bg); color: var(--text); min-height: 100vh; }
  
  .pct-rosso {
    color: var(--pct-rosso) !important;
    font-weight: bold;
  }
  .pct-neutro {
    color: var(--pct-neutro) !important;
    font-weight: bold;
  }
  .pct-verde {
    color: var(--pct-verde) !important;
    font-weight: bold;
  }
  .pct-oro {
    color: var(--pct-oro) !important;
    font-weight: bold;
    text-shadow: 0 0 10px rgba(243, 156, 18, 0.3);
  }

  .giocata-box {
    background: var(--surface);
    padding: 12px 16px;
    border-radius: 8px;
    margin-bottom: 8px;
    border-left: 4px solid var(--border);
    font-size: 14px;
  }
  .giocata-box .label {
    font-weight: 600;
    color: var(--text-muted);
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .giocata-box .value {
    font-size: 18px;
    margin-top: 2px;
  }
  .giocata-box .dettaglio {
    font-size: 13px;
    color: var(--text);
    margin-top: 4px;
  }
  .giocata-box .sottovoce {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  .header { 
    background: var(--banner); 
    padding: 16px 24px; 
    border-bottom: 2px solid var(--accent); 
    display: flex; 
    align-items: center; 
    justify-content: center;
    gap: 16px; 
    position: relative;
  }
  .header .header-left {
    position: absolute;
    left: 24px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .header .header-center {
    text-align: center;
  }
  .header .header-center .app-name {
    font-size: 28px;
    font-weight: bold;
    letter-spacing: 2px;
  }
  .header .header-center .app-name span {
    display: inline-block;
  }
  .header .header-center .subtitle {
    font-size: 12px;
    color: var(--text-muted);
  }
  .clock {
    position: absolute;
    right: 24px;
    background: var(--surface);
    padding: 8px 16px;
    border-radius: 8px;
    border: 1px solid var(--border);
    font-family: 'Courier New', monospace;
    font-size: 14px;
    font-weight: bold;
    color: var(--accent);
    min-width: 200px;
    text-align: right;
  }
  .clock-date { font-size: 12px; color: var(--text-muted); }
  .clock-time { font-size: 16px; color: var(--accent); }
  .tabs-nav { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); overflow-x: auto; }
  .tabs-nav button {
    flex: 1; min-width: 120px; padding: 14px 12px; background: transparent;
    color: var(--text-muted); border: none; cursor: pointer; font-size: 14px;
    border-bottom: 3px solid transparent; transition: all 0.2s;
    font-weight: 600; white-space: nowrap;
  }
  .tabs-nav button:hover { color: var(--text); background: var(--card); }
  .tabs-nav button.active { color: var(--accent); border-bottom-color: var(--tab-active); background: var(--card); }
  .container { padding: 20px; max-width: 1400px; margin: 0 auto; }
  .card {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    padding: 18px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }
  .matches-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 18px;
    justify-content: flex-start;
  }
  .match-tab {
    background: var(--card);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 0;
    border: 1px solid var(--border);
    border-left-width: 6px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.4);
    flex: 1;
    min-width: 340px;
    max-width: 420px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    position: relative;
  }
  .match-tab:hover {
    transform: translateY(-3px);
    box-shadow: 0 6px 16px rgba(0,0,0,0.6);
  }
  .match-tab .score-badge {
    position: absolute;
    top: 10px;
    right: 12px;
    background: var(--accent);
    color: #000;
    font-weight: bold;
    font-size: 18px;
    padding: 2px 10px;
    border-radius: 20px;
    border: 2px solid var(--accent2);
  }
  .weather-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: var(--surface);
    padding: 2px 8px;
    border-radius: 12px;
    font-size: 12px;
    border: 1px solid var(--border);
    margin-top: 4px;
  }
  .weather-badge .weather-icon { font-size: 16px; }
  .weather-badge .weather-temp { font-weight: bold; color: var(--accent); }
  .schedina-controls {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: center;
    margin-bottom: 16px;
  }
  .schedina-controls .left-group {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .schedina-controls .left-group select {
    padding: 8px 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    min-width: 150px;
  }
  .schedina-controls .num-buttons {
    display: flex;
    gap: 6px;
  }
  .schedina-controls .num-buttons button {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-weight: bold;
    cursor: pointer;
    transition: all 0.2s;
  }
  .schedina-controls .num-buttons button.active {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
  }
  .schedina-controls .right-group {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-left: auto;
  }
  .schedina-controls .right-group select {
    padding: 8px 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    min-width: 160px;
  }
  .schedina-controls .btn-generate {
    background: var(--accent);
    color: #000;
    border: none;
    padding: 8px 20px;
    border-radius: 6px;
    font-weight: bold;
    cursor: pointer;
  }
  .schedina-controls .btn-generate:hover { background: var(--accent2); }
  .schedina-controls .btn-reset-cards {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 8px 16px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
  }
  .schedina-controls .btn-reset-cards:hover {
    border-color: var(--accent);
    background: var(--card);
  }
  .schedina-match-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-left-width: 6px;
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 12px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.4);
    transition: transform 0.15s, box-shadow 0.15s;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
  }
  .schedina-match-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 16px rgba(0,0,0,0.6);
  }
  .schedina-match-card .match-info {
    flex: 1;
    min-width: 150px;
  }
  .schedina-match-card .match-info .teams {
    font-weight: bold;
    font-size: 16px;
  }
  .schedina-match-card .match-info .details {
    font-size: 12px;
    color: var(--text-muted);
  }
  .schedina-match-card .giocate {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .schedina-match-card .giocate .giocata-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 12px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    color: var(--text);
  }
  .schedina-match-card .giocate .giocata-btn:hover {
    border-color: var(--accent);
    background: var(--card);
  }
  .schedina-match-card .giocate .giocata-btn.disabled {
    opacity: 0.4;
    cursor: not-allowed;
    background: #3a3f4a;
    border-color: #3a3f4a;
    color: #888;
  }
  .schedina-match-card .giocate .giocata-btn.disabled:hover {
    border-color: #3a3f4a;
    background: #3a3f4a;
  }
  .schedina-actions {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 16px;
  }
  .schedina-actions button {
    padding: 6px 16px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--surface);
    color: var(--text);
    cursor: pointer;
    transition: all 0.2s;
    font-size: 13px;
  }
  .schedina-actions button:hover {
    border-color: var(--accent);
    background: var(--card);
  }
  .schedina-actions .btn-reset {
    border-color: var(--lose);
    color: var(--lose);
  }
  .schedina-actions .btn-reset:hover {
    background: var(--lose);
    color: #fff;
  }
  .schedina-actions .btn-save {
    border-color: var(--win);
    color: var(--win);
  }
  .schedina-actions .btn-save:hover {
    background: var(--win);
    color: #000;
  }
  .schedina-list {
    margin-top: 16px;
    background: var(--surface);
    padding: 12px;
    border-radius: 8px;
    border-left: 4px solid var(--accent);
  }
  .schedina-list .entry {
    padding: 4px 0;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
    display: flex;
    justify-content: space-between;
  }
  .schedina-list .entry:last-child { border-bottom: none; }
  .schedina-list .entry .remove-btn {
    color: var(--lose);
    cursor: pointer;
    margin-left: 8px;
  }
  .tab-header { 
    padding: 4px 12px; 
    border-radius: 6px; 
    margin-bottom: 6px; 
    text-align: center; 
    color: #fff; 
    font-weight: bold; 
    font-size: 13px; 
    display: inline-block;
  }
  .match-info { 
    text-align: center; 
    color: var(--text-muted); 
    font-size: 12px; 
    margin-bottom: 6px; 
  }
  .teams-row { 
    display: flex; 
    justify-content: space-around; 
    align-items: center; 
    padding: 8px 0; 
  }
  .team { 
    display: flex; 
    flex-direction: column; 
    align-items: center; 
    gap: 4px; 
    flex: 1;
  }
  .team-name { 
    font-weight: bold; 
    font-size: 20px;
    text-align: center;
  }
  .vs { 
    font-size: 18px; 
    color: var(--accent); 
    font-weight: bold; 
    padding: 0 8px;
  }
  .form-row-compact {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 10px;
    margin-bottom: 6px;
  }
  .form-block-compact { 
    text-align: center;
    padding: 8px 6px;
    background: var(--surface);
    border-radius: 6px;
  }
  .form-block-compact .form-label { 
    font-size: 10px; 
    color: var(--text-muted); 
    margin-bottom: 4px;
    text-transform: uppercase;
    font-weight: 600;
  }
  .form-squares {
    display: flex;
    justify-content: center;
    gap: 3px;
    margin-bottom: 4px;
    min-height: 20px;
  }
  .form-square {
    width: 22px;
    height: 22px;
    border-radius: 3px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    font-size: 12px;
    color: #000;
  }
  .form-square-V { background: var(--win); }
  .form-square-P { background: var(--draw); }
  .form-square-S { background: var(--lose); }
  .form-pct-compact {
    font-size: 22px;
    font-weight: bold;
    color: var(--accent);
    line-height: 1;
  }
  .form-bar { 
    height: 6px; 
    background: var(--card); 
    border-radius: 3px; 
    overflow: hidden; 
    margin-top: 4px;
  }
  .form-bar-fill { 
    height: 100%; 
    background: linear-gradient(90deg, var(--win), var(--accent)); 
    transition: width 0.3s; 
  }
  .form-diff {
    text-align: center;
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 4px;
  }
  .form-diff span {
    font-weight: bold;
    color: var(--accent);
  }
  .bet-row {
    display: flex;
    justify-content: space-around;
    gap: 6px;
    margin-top: 8px;
    flex-wrap: wrap;
  }
  .bet-item {
    background: var(--surface);
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 12px;
    border: 1px solid var(--border);
    text-align: center;
    flex: 1;
    min-width: 70px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .bet-item:hover { background: var(--card); }
  .bet-item .bet-label {
    font-size: 10px;
    text-transform: uppercase;
    font-weight: 600;
    letter-spacing: 0.3px;
  }
  .bet-item .bet-value {
    font-weight: bold;
    font-size: 14px;
  }
  .match-tab-history {
    background: var(--card);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 0;
    border: 1px solid var(--border);
    border-left-width: 6px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.4);
    flex: 1;
    min-width: 340px;
    max-width: 420px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .match-tab-history:hover {
    transform: translateY(-3px);
    box-shadow: 0 6px 16px rgba(0,0,0,0.6);
  }
  .match-tab-history .teams-row {
    display: flex;
    justify-content: space-around;
    align-items: center;
    padding: 4px 0;
  }
  .match-tab-history .score {
    font-size: 24px;
    font-weight: bold;
    padding: 0px 12px;
  }
  .match-tab-history .score-win { color: var(--win); }
  .match-tab-history .score-draw { color: var(--draw); }
  .match-tab-history .score-loss { color: var(--lose); }
  .standings-table-wrap {
    overflow-x: auto;
  }
  .standings-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  .standings-table th {
    background: var(--surface);
    color: var(--text-muted);
    padding: 8px 6px;
    text-align: left;
    border-bottom: 2px solid var(--border);
    font-weight: 600;
    text-transform: uppercase;
    font-size: 11px;
    white-space: nowrap;
  }
  .standings-table td {
    padding: 6px 6px;
    border-bottom: 1px solid var(--border);
  }
  .standings-table tr.highlighted td {
    background: var(--accent) !important;
    color: #000 !important;
    font-weight: bold;
  }
  .standings-table tr:hover td { background: var(--card); }
  .standings-table .pos {
    font-weight: bold;
    color: var(--accent);
    text-align: center;
  }
  .standings-table .team-name { font-weight: bold; }
  .standings-table .num { text-align: center; }
  .standings-table .points {
    font-weight: bold;
    color: var(--accent);
    text-align: center;
  }
  .sub-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .sub-tabs button {
    padding: 8px 16px;
    background: var(--surface);
    color: var(--text-muted);
    border: 1px solid var(--border);
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
  }
  .sub-tabs button.active {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
  }
  .detail-section { margin-bottom: 20px; }
  .detail-section h4 {
    color: var(--accent);
    margin-bottom: 10px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 6px;
    font-size: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .detail-stat-box {
    padding: 8px 12px;
    border-radius: 8px;
    text-align: center;
    border: 1px solid var(--border);
    background: var(--surface);
    transition: background 0.2s, transform 0.1s;
    min-width: 60px;
    flex: 1;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .detail-stat-box:hover { transform: scale(1.02); }
  .detail-stat-box .label {
    display: block;
    font-size: 14px;
    font-weight: 600;
    color: #ffff00;
    margin-bottom: 2px;
  }
  .detail-stat-box .value {
    display: block;
    font-size: 20px;
    font-weight: bold;
  }
  .detail-stat-box .bomb-icon {
    display: inline-block;
    font-size: 20px;
    animation: bomb-bounce 0.8s infinite ease-in-out;
    transform-origin: center;
    margin-left: 4px;
  }
  .detail-stat-box.flag-red { background: var(--lose); }
  .detail-stat-box.flag-red .value { color: #000; }
  .detail-stat-box.flag-neutral { background: var(--pct-neutro); }
  .detail-stat-box.flag-neutral .value { color: #000; }
  .detail-stat-box.flag-green { background: var(--win); }
  .detail-stat-box.flag-green .value { color: #000; }
  .detail-stat-box.flag-gold { background: var(--accent); }
  .detail-stat-box.flag-gold .value { color: #000; }
  .detail-stat-box.flag-bomb { 
    background: var(--accent); 
    animation: bomb-glow 1s infinite alternate;
  }
  .detail-stat-box.flag-bomb .value { color: #000; }
  
  @keyframes bomb-bounce {
    0% { transform: scale(1) rotate(0deg); }
    50% { transform: scale(1.3) rotate(10deg); }
    100% { transform: scale(1) rotate(0deg); }
  }
  @keyframes bomb-glow {
    0% { box-shadow: 0 0 8px var(--accent); }
    100% { box-shadow: 0 0 30px #ffaa00; }
  }
  .detail-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 6px;
  }
  .detail-row .detail-stat-box { flex: 1; min-width: 60px; }
  .opponents-row {
    display: flex;
    flex-wrap: wrap;
    justify-content: space-between;
    gap: 12px;
    margin: 8px 0;
  }
  .opponents-col {
    flex: 1;
    min-width: 120px;
    background: var(--surface);
    padding: 8px;
    border-radius: 6px;
  }
  .opponents-col .opp-item {
    font-size: 12px;
    padding: 2px 0;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .opponents-col .opp-item:last-child { border-bottom: none; }
  .opp-result-indicator {
    display: inline-block;
    width: 14px;
    height: 14px;
    border-radius: 3px;
    margin-right: 4px;
    vertical-align: middle;
  }
  .opp-result-indicator.win { background: var(--win); }
  .opp-result-indicator.draw { background: var(--draw); }
  .opp-result-indicator.loss { background: var(--lose); }
  .opp-form-pct {
    font-size: 24px;
    font-weight: bold;
    color: var(--accent);
    text-align: center;
    margin-top: 6px;
  }
  .opp-form-bar {
    height: 8px;
    background: var(--card);
    border-radius: 4px;
    overflow: hidden;
    margin-top: 4px;
  }
  .opp-form-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--win), var(--accent));
    transition: width 0.3s;
  }
  .stats-two-col {
    display: grid;
    grid-template-columns: 1fr 1.2fr;
    gap: 20px;
  }
  @media (max-width: 768px) { .stats-two-col { grid-template-columns: 1fr; } }
  .stats-placeholder {
    text-align: center;
    padding: 40px;
    color: var(--text-muted);
    font-size: 16px;
  }
  .ai-analysis-box {
    background: var(--surface);
    padding: 14px 16px;
    border-radius: 8px;
    margin-top: 16px;
    border-left: 4px solid var(--accent);
  }
  .ai-analysis-box h4 {
    color: var(--accent);
    margin: 12px 0 6px;
    font-size: 14px;
    font-weight: 700;
  }
  .ai-analysis-box p {
    font-size: 13px;
    line-height: 1.6;
    margin-bottom: 6px;
    color: var(--text);
  }
  .ai-analysis-box .pronostico-mini {
    display: flex;

  const blacklist = getBlacklist();

    .map(l => ({ ...l, isDefault: false }));

};

// ============================================================
// fetchSofaScoreMatches con supporto stagione
// ============================================================
const fetchSofaScoreMatches = async (leagueId, seasonYear) => {
  try {
    const seasonsRes = await fetch(
      `https://api.sofascore.com/api/v1/unique-tournament/${leagueId}/seasons`
    );
    if (!seasonsRes.ok) throw new Error('Errore nel recupero stagioni');
    const seasonsData = await seasonsRes.json();
    
    let targetSeasonId = null;
    let availableSeasons = [];
    
    if (seasonsData.seasons) {
      seasonsData.seasons.forEach(season => {
        availableSeasons.push({
          id: season.id,
          name: season.name || `Stagione ${season.id}`
        });
        console.log(`📅 Stagione disponibile: ${season.name} (ID: ${season.id})`);
      });
    }
    
    if (seasonsData.seasons) {
      for (const season of seasonsData.seasons) {
        const seasonName = season.name || '';
        if (seasonYear === '25/26' && seasonName.includes('2025/2026')) {
          targetSeasonId = season.id;
          break;
        } else if (seasonYear === '26/27' && seasonName.includes('2026/2027')) {
          targetSeasonId = season.id;
          break;
        } else if (seasonYear === '26/26' && seasonName.includes('2026')) {
          targetSeasonId = season.id;
          break;
        }
      }
    }
    
    if (!targetSeasonId && seasonsData.seasons && seasonsData.seasons.length > 0) {
      targetSeasonId = seasonsData.seasons[0].id;
      console.log(`⚠️ Stagione ${seasonYear} non trovata, uso la prima disponibile: ${seasonsData.seasons[0].name}`);
    }
    
    if (!targetSeasonId) {
      const availableNames = availableSeasons.map(s => s.name).join(', ');
      throw new Error(`Nessuna stagione disponibile. Stagioni trovate: ${availableNames}`);
    }
    
    console.log(`📅 Stagione selezionata: ${targetSeasonId} (${seasonYear})`);
    
    let allEvents = [];
    let round = 1;
    let hasMore = true;
    
    while (hasMore && round <= 40) {
      try {
        const url = `https://api.sofascore.com/api/v1/unique-tournament/${leagueId}/season/${targetSeasonId}/events/round/${round}`;
        console.log(`🔍 Cerco round ${round}...`);
        
        const res = await fetch(url);
        if (!res.ok) {
          if (res.status === 404) {
            hasMore = false;
            break;
          }
          throw new Error(`HTTP ${res.status}`);
        }
        
        const data = await res.json();
        if (data.events && data.events.length > 0) {
          allEvents = [...allEvents, ...data.events];
          console.log(`✅ Round ${round}: ${data.events.length} partite`);
        }
        round++;
        await new Promise(r => setTimeout(r, 100));
      } catch (e) {
        console.warn(`Round ${round} fallito:`, e.message);
        hasMore = false;
      }
    }
    
    console.log(`📊 Totale partite trovate: ${allEvents.length}`);
    return allEvents;
    
  } catch (e) {
    console.error('Errore fetch SofaScore:', e);
    return [];
  }
};

const getChampColor = (champName) => {
  if (!champName) return '#95a5a6';
  for (const [key, color] of Object.entries(CHAMPIONSHIP_COLORS)) {
    if (champName.toLowerCase().includes(key.toLowerCase()) || key.toLowerCase().includes(champName.toLowerCase())) {
      return color;
    }
  }
  let hash = 0;
  for (let i = 0; i < champName.length; i++) {
    hash = champName.charCodeAt(i) + ((hash << 5) - hash);
  }
  const hue = Math.abs(hash) % 360;
  return `hsl(${hue}, 65%, 50%)`;
};

const formatDateEU = (dateStr) => {
  if (!dateStr) return 'N/D';
  if (typeof dateStr === 'string' && dateStr.match(/^\d{4}-\d{2}-\d{2}/)) {
    const [y, m, d] = dateStr.split('-');
    const year = parseInt(y);
    if (year < 1900 || year > 2100) return 'N/D';
    return `${d}/${m}/${y}`;
  }
  const date = new Date(dateStr);
  if (isNaN(date.getTime())) return 'N/D';
  const year = date.getFullYear();
  if (year < 1900 || year > 2100) return 'N/D';
  const day = String(date.getDate()).padStart(2, '0');
  const month = String(date.getMonth() + 1).padStart(2, '0');
  return `${day}/${month}/${year}`;
};

const filterNext6Days = (matches) => {
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const sixDaysLater = new Date(today);
  sixDaysLater.setDate(sixDaysLater.getDate() + 6);
  
  return matches.filter(m => {
    if (!m.data) return false;
    const matchDate = new Date(m.data);
    if (isNaN(matchDate.getTime())) return false;
    matchDate.setHours(0, 0, 0, 0);
    return matchDate >= today && matchDate <= sixDaysLater;
  }).sort((a, b) => new Date(a.data + ' ' + a.ora) - new Date(b.data + ' ' + b.ora));
};

  const formatDate = (d) => {
    const days = ['Domenica','Lunedì','Martedì','Mercoledì','Giovedì','Venerdì','Sabato'];
    const months = ['Gen','Feb','Mar','Apr','Mag','Giu','Lug','Ago','Set','Ott','Nov','Dic'];
    return `${days[d.getDay()]} ${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
  };
  const formatTime = (d) => d.toTimeString().slice(0, 8);
  return (
    <div className="clock">
      <div className="clock-date">{formatDate(now)}</div>
      <div className="clock-time">{formatTime(now)}</div>

};

const calcFormAndStats = (matches, teamName) => {
  const played = matches.filter(m => m.stato === 'Giocata' && (m.casa === teamName || m.ospiti === teamName))
    .sort((a,b) => new Date(b.data+' '+b.ora) - new Date(a.data+' '+a.ora))
    .slice(0, 5);
  let form = '', points = 0;
  played.forEach(m => {
    if (m.casa === teamName) {
      const r = m.golCasa > m.golOspite ? 'V' : (m.golCasa === m.golOspite ? 'P' : 'S');
      form += r;
      if (r === 'V') points += 3; else if (r === 'P') points += 1;
    } else {
      const r = m.golOspite > m.golCasa ? 'V' : (m.golOspite === m.golCasa ? 'P' : 'S');
      form += r;
      if (r === 'V') points += 3; else if (r === 'P') points += 1;
    }
  });
  return { form: form || '-----', pct: played.length ? Math.round((points / (played.length * 3)) * 100) : 50 };
};

const calcTeamMG = (matches, teamName) => {
  const played = matches.filter(m => m.stato === 'Giocata' && (m.casa === teamName || m.ospiti === teamName));
  if (!played.length) return '0.0-0.0';
  let scored = 0, conceded = 0;
  played.forEach(m => {
    if (m.casa === teamName) { scored += m.golCasa; conceded += m.golOspite; }
    else { scored += m.golOspite; conceded += m.golCasa; }
  });
  return `${(scored/played.length).toFixed(1)}-${(conceded/played.length).toFixed(1)}`;
};

const getMostFrequentGoalRange = (teamName, allMatches) => {
  const matches = allMatches.filter(m => m.stato === 'Giocata' && (m.casa === teamName || m.ospiti === teamName));
  if (matches.length === 0) return { label: 'N/A', pct: 0 };
  
  const goals = matches.map(m => (m.casa === teamName) ? m.golCasa : m.golOspite);
  const total = goals.length;
  
  let freq = {0:0, 1:0, 2:0, ge3:0};
  goals.forEach(g => {
    if (g === 0) freq[0]++;
    else if (g === 1) freq[1]++;
    else if (g === 2) freq[2]++;
    else freq.ge3++;
  });
  
  let maxCount = 0;
  let maxKey = '0';
  for (let key in freq) {
    if (freq[key] > maxCount) {
      maxCount = freq[key];
      maxKey = key;
    }
  }
  
  let label, rangePct;
  if (maxKey === '0') {
    label = '0-1';
    rangePct = goals.filter(g => g <= 1).length / total * 100;
  } else if (maxKey === '1') {
    label = '0-2';
    rangePct = goals.filter(g => g <= 2).length / total * 100;
  } else if (maxKey === '2') {
    label = 'Over 1,5';
    rangePct = goals.filter(g => g >= 2 && g <= 4).length / total * 100;
  } else {
    label = 'Over 1,5';
    rangePct = goals.filter(g => g >= 2).length / total * 100;
  }
  
  return { label, pct: Math.round(rangePct) };
};

const getBestFreeCombo = (stats, homeMG, awayMG, mgTot) => {
  if (stats.error) return { label: 'N/A', pct: 0 };
  
  const { p1X, p12, pX2, underOver } = stats;
  const over15 = underOver[0].over;
  const under35 = underOver[2].under;
  
  const candidates = [];
  
  candidates.push({ label: '1X', pct: p1X });
  candidates.push({ label: '12', pct: p12 });
  candidates.push({ label: 'X2', pct: pX2 });
  candidates.push({ label: 'Over 1.5', pct: over15 });
  candidates.push({ label: 'Under 3.5', pct: under35 });
  
  for (const [label, pct] of Object.entries(mgTot)) {
    let displayLabel = label === '2-4' ? 'Over 1,5' : label;
    candidates.push({ label: `MG Tot ${displayLabel}`, pct });
  }
  
  for (const [label, pct] of Object.entries(homeMG)) {
    let displayLabel = label === '2-4' ? 'Over 1,5' : label;
    candidates.push({ label: `MG Casa ${displayLabel}`, pct });
  }
  
  for (const [label, pct] of Object.entries(awayMG)) {
    let displayLabel = label === '2-4' ? 'Over 1,5' : label;
    candidates.push({ label: `MG Ospite ${displayLabel}`, pct });
  }
  
  candidates.push({ label: '1X+Over1.5', pct: (p1X + over15) / 2 });
  candidates.push({ label: '12+Over1.5', pct: (p12 + over15) / 2 });
  candidates.push({ label: 'X2+Over1.5', pct: (pX2 + over15) / 2 });
  
  candidates.push({ label: '1X+Under3.5', pct: (p1X + under35) / 2 });
  candidates.push({ label: '12+Under3.5', pct: (p12 + under35) / 2 });
  candidates.push({ label: 'X2+Under3.5', pct: (pX2 + under35) / 2 });
  
  for (const [mgLabel, mgPct] of Object.entries(mgTot)) {
    let displayLabel = mgLabel === '2-4' ? 'Over 1,5' : mgLabel;
    candidates.push({ label: `1X+MG Tot ${displayLabel}`, pct: (p1X + mgPct) / 2 });
    candidates.push({ label: `12+MG Tot ${displayLabel}`, pct: (p12 + mgPct) / 2 });
    candidates.push({ label: `X2+MG Tot ${displayLabel}`, pct: (pX2 + mgPct) / 2 });
  }
  
  for (const [homeLabel, homePct] of Object.entries(homeMG)) {
    for (const [awayLabel, awayPct] of Object.entries(awayMG)) {
      let displayHome = homeLabel === '2-4' ? 'Over 1,5' : homeLabel;
      let displayAway = awayLabel === '2-4' ? 'Over 1,5' : awayLabel;
      candidates.push({
        label: `MG Casa ${displayHome} + MG Ospite ${displayAway}`,
        pct: (homePct + awayPct) / 2
      });
    }
  }
  
  let best = candidates.reduce((a, b) => a.pct > b.pct ? a : b);
  best.pct = Math.round(best.pct);
  return best;
};

const computeMatchStats = (match, allMatches) => {
  const homeTeam = match.casa;
  const awayTeam = match.ospiti;
  
  const homeGames = allMatches.filter(m => m.stato === 'Giocata' && (m.casa === homeTeam || m.ospiti === homeTeam));
  const awayGames = allMatches.filter(m => m.stato === 'Giocata' && (m.casa === awayTeam || m.ospiti === awayTeam));
  const totalGames = homeGames.length + awayGames.length;
  
  if (totalGames === 0) {
    return { error: 'Nessuna partita giocata per queste squadre.' };
  }
  
  const getTeamStats = (team, games) => {
    let wins = 0, draws = 0, losses = 0;
    let goalsScored = 0, goalsConceded = 0;
    games.forEach(g => {
      const isHome = g.casa === team;
      const teamGoals = isHome ? g.golCasa : g.golOspite;
      const oppGoals = isHome ? g.golOspite : g.golCasa;
      goalsScored += teamGoals;
      goalsConceded += oppGoals;
      if (teamGoals > oppGoals) wins++;
      else if (teamGoals === oppGoals) draws++;
      else losses++;
    });
    return { wins, draws, losses, goalsScored, goalsConceded, played: games.length };
  };
  
  const homeStats = getTeamStats(homeTeam, homeGames);
  const awayStats = getTeamStats(awayTeam, awayGames);
  
  const p1 = (homeStats.wins + awayStats.losses) / totalGames * 100;
  const pX = (homeStats.draws + awayStats.draws) / totalGames * 100;
  const p2 = (homeStats.losses + awayStats.wins) / totalGames * 100;
  
  const p1X = p1 + pX;
  const p12 = p1 + p2;
  const pX2 = pX + p2;
  
  const allGamesForGoals = [...homeGames, ...awayGames];
  const goalTotals = allGamesForGoals.map(g => g.golCasa + g.golOspite);
  const thresholds = [1.5, 2.5, 3.5, 4.5];
  const underOver = thresholds.map(t => {
    const over = goalTotals.filter(gt => gt > t).length / goalTotals.length * 100;
    const under = 100 - over;
    return { threshold: t, under, over };
  });
  
  const getMultigolV2 = (team, games) => {
    const goals = games.map(g => (g.casa === team) ? g.golCasa : g.golOspite);
    const total = goals.length;
    const count = (pred) => goals.filter(pred).length / total * 100;
    return {
      '0-1': count(g => g <= 1),
      '0-2': count(g => g <= 2),
      '1-3': count(g => g >= 1 && g <= 3),
      '2-4': count(g => g >= 2 && g <= 4),
    };
  };
  
  const homeMG = getMultigolV2(homeTeam, homeGames);
  const awayMG = getMultigolV2(awayTeam, awayGames);
  
  const totalGoals = allGamesForGoals.map(g => g.golCasa + g.golOspite);
  const mgTot = {
    '1-4': totalGoals.filter(g => g >= 1 && g <= 4).length / totalGoals.length * 100,
    '2-4': totalGoals.filter(g => g >= 2 && g <= 4).length / totalGoals.length * 100,
    '2-5': totalGoals.filter(g => g >= 2 && g <= 5).length / totalGoals.length * 100,
    '3-6': totalGoals.filter(g => g >= 3 && g <= 6).length / totalGoals.length * 100,
  };
  
  return {
    p1, pX, p2,
    p1X, p12, pX2,
    underOver,
    homeMG, awayMG,
    mgTot,
    homeGames, awayGames,
    homeStats, awayStats,
    totalGames
  };
};

const getTeamMultigolV2 = (allMatches, teamName) => {
  const games = allMatches.filter(m => m.stato === 'Giocata' && (m.casa === teamName || m.ospiti === teamName));
  if (!games.length) return { '0-1': 0, '0-2': 0, '1-3': 0, '2-4': 0 };
  const goals = games.map(g => (g.casa === teamName) ? g.golCasa : g.golOspite);
  const total = goals.length;
  const count = (pred) => goals.filter(pred).length / total * 100;
  return {
    '0-1': count(g => g <= 1),
    '0-2': count(g => g <= 2),
    '1-3': count(g => g >= 1 && g <= 3),
    '2-4': count(g => g >= 2 && g <= 4),
  };
};

const getTeamUnderOver = (allMatches, teamName) => {
  const games = allMatches.filter(m => m.stato === 'Giocata' && (m.casa === teamName || m.ospiti === teamName));
  if (!games.length) return {};
  const goals = games.map(g => (g.casa === teamName) ? g.golCasa : g.golOspite);
  const thresholds = [1.5, 2.5, 3.5, 4.5];
  const result = {};
  thresholds.forEach(t => {
    const over = goals.filter(g => g > t).length / goals.length * 100;
    const under = 100 - over;
    result[`Under ${t}`] = under;
    result[`Over ${t}`] = over;
  });
  return result;
};

const get12Under45 = (allMatches, homeTeam, awayTeam) => {
  const homeGames = allMatches.filter(m => m.stato === 'Giocata' && (m.casa === homeTeam || m.ospiti === homeTeam));
  const awayGames = allMatches.filter(m => m.stato === 'Giocata' && (m.casa === awayTeam || m.ospiti === awayTeam));
  const allGames = Array.from(new Map([...homeGames, ...awayGames].map(g => [g.id, g])).values());
  if (!allGames.length) return 0;
  const count = allGames.filter(g => {
    const total = g.golCasa + g.golOspite;
    return g.golCasa !== g.golOspite && total < 4.5;
  }).length;
  return (count / allGames.length) * 100;
};

const Standings = ({ matches, filterChampionship, highlightTeams = [] }) => {
  const [view, setView] = useState('generale');
  
  let filtered = matches;
  if (filterChampionship && filterChampionship !== 'Tutti') {
    filtered = filtered.filter(m => m.campionato === filterChampionship);
  }
  filtered = filtered.filter(m => m.stato === 'Giocata');
  
  if (filtered.length === 0) {
    return <div className="empty-state">Nessuna partita giocata per questo campionato.</div>;
  }
  
  const teamStats = {};
  const addGame = (team, isHome, golFatti, golSubiti) => {
    if (!teamStats[team]) {
      teamStats[team] = { 
        pg: 0, punti: 0, v: 0, p: 0, s: 0, gf: 0, gs: 0, 
        dr: 0, xG: 0, mediaGol: 0 
      };
    }
    const t = teamStats[team];
    t.pg++;
    t.gf += golFatti;
    t.gs += golSubiti;
    if (golFatti > golSubiti) {
      t.v++;
      t.punti += 3;
    } else if (golFatti === golSubiti) {
      t.p++;
      t.punti += 1;
    } else {
      t.s++;
    }
  };
  
  filtered.forEach(m => {
    if (view === 'generale') {
      addGame(m.casa, true, m.golCasa, m.golOspite);
      addGame(m.ospiti, false, m.golOspite, m.golCasa);
    } else if (view === 'casa') {
      addGame(m.casa, true, m.golCasa, m.golOspite);
    } else if (view === 'ospite') {
      addGame(m.ospiti, false, m.golOspite, m.golCasa);
    }
  });
  
  Object.values(teamStats).forEach(t => {
    t.dr = t.gf - t.gs;
    t.mediaGol = t.pg > 0 ? t.gf / t.pg : 0;
    t.xG = t.pg > 0 ? (t.gf / t.pg) * 0.9 : 0;
  });
  
  const sorted = Object.entries(teamStats)
    .sort((a, b) => {
      if (b[1].punti !== a[1].punti) return b[1].punti - a[1].punti;
      if (b[1].dr !== a[1].dr) return b[1].dr - a[1].dr;
      return b[1].gf - a[1].gf;
    })
    .map(([name, stats], index) => ({ pos: index + 1, name, ...stats }));
  
  return (
    <div>
      <div className="sub-tabs">
        <button className={view === 'generale' ? 'active' : ''} onClick={() => setView('generale')}>Generale</button>
        <button className={view === 'casa' ? 'active' : ''} onClick={() => setView('casa')}>Casa</button>
        <button className={view === 'ospite' ? 'active' : ''} onClick={() => setView('ospite')}>Ospite</button>
      </div>
      
      <div className="standings-table-wrap">
        <table className="standings-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Squadra</th>
              <th className="num">PG</th>
              <th className="num">Punti</th>
              <th className="num">V</th>
              <th className="num">P</th>
              <th className="num">S</th>
              <th className="num">GF</th>
              <th className="num">GS</th>
              <th className="num">DR</th>
              <th className="num">xG</th>
              <th className="num">Media Gol</th>
            </tr>
          </thead>
          <tbody>
            {sorted.map(row => {
              const isHighlighted = highlightTeams.includes(row.name);
              return (
                <tr key={row.name} className={isHighlighted ? 'highlighted' : ''}>
                  <td className="pos">{row.pos}</td>
                  <td className="team-name">{row.name}</td>
                  <td className="num">{row.pg}</td>
                  <td className="points">{row.punti}</td>
                  <td className="num">{row.v}</td>
                  <td className="num">{row.p}</td>
                  <td className="num">{row.s}</td>
                  <td className="num">{row.gf}</td>
                  <td className="num">{row.gs}</td>
                  <td className="num">{row.dr > 0 ? '+' : ''}{row.dr}</td>
                  <td className="num">{row.xG.toFixed(2)}</td>
                  <td className="num">{row.mediaGol.toFixed(2)}</td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
};

        addToSchedina(text);
      }
    };
    
    return (
      <div className={`detail-stat-box ${cls}`} onClick={handleClick}>
        <span className="label">{label}</span>
        <span className="value" style={{color: '#000', fontSize: '20px', fontWeight: 'bold'}}>
          {roundedValue}%
          {isBomb && <span className="bomb-icon">💣</span>}
        </span>
      </div>
    );
  };
  
  const homeForm = calcFormAndStats(allMatches, match.casa);
  const awayForm = calcFormAndStats(allMatches, match.ospiti);
  
  const renderFormSquares = (formStr) => {
    return [...formStr].map((letter, idx) => (
      <div key={idx} className={`form-square form-square-${letter}`}>
        {letter}
      </div>
    ));
  };
  
  const getResultColor = (game, team) => {
    const isHome = game.casa === team;
    const teamGoals = isHome ? game.golCasa : game.golOspite;
    const oppGoals = isHome ? game.golOspite : game.golCasa;
    if (teamGoals > oppGoals) return 'win';
    if (teamGoals === oppGoals) return 'draw';
    return 'loss';
  };
  
  const getLast5Games = (teamName) => {
    const games = allMatches
      .filter(m => m.stato === 'Giocata' && (m.casa === teamName || m.ospiti === teamName))
      .sort((a,b) => new Date(b.data+' '+b.ora) - new Date(a.data+' '+a.ora))
      .slice(0, 5);
    return games;
  };
  
  const last5Home = getLast5Games(match.casa);
  const last5Away = getLast5Games(match.ospiti);
  
  return (
    <div>
      <div className="card">
        <h2 style={{color: getChampColor(match.campionato)}}>{match.campionato}</h2>
        <div style={{display:'flex', flexWrap:'wrap', gap:'12px', margin:'8px 0'}}>
          <span><b>Giornata:</b> {match.round}</span>
          <span><b>Data:</b> {formatDateEU(match.data)}</span>
          <span><b>Ora:</b> {match.ora || 'TBD'}</span>
        </div>
        <div style={{display:'flex', justifyContent:'center', gap:'20px', fontSize:'24px', fontWeight:'bold', margin:'12px 0'}}>
          <span style={{color: getChampColor(match.campionato)}}>{match.casa}</span>
          <span style={{color:'var(--text-muted)'}}>VS</span>
          <span style={{color: getChampColor(match.campionato)}}>{match.ospiti}</span>
        </div>
        
        <div style={{display:'flex', flexWrap:'wrap', gap:'12px', margin:'8px 0'}}>
          <div style={{flex:1, minWidth:'200px'}}>
            <h4 style={{color: getChampColor(match.campionato)}}>{match.casa}</h4>
            <div style={{display:'flex', alignItems:'center', gap:'8px'}}>
              <span>Forma:</span>
              <div className="form-squares" style={{display:'inline-flex'}}>
                {renderFormSquares(homeForm.form)}
              </div>
            </div>
            <div>Partite giocate: {homeGames.length}</div>
            <div>V-P-S: {stats.homeStats.wins}-{stats.homeStats.draws}-{stats.homeStats.losses}</div>
          </div>
          <div style={{flex:1, minWidth:'200px'}}>
            <h4 style={{color: getChampColor(match.campionato)}}>{match.ospiti}</h4>
            <div style={{display:'flex', alignItems:'center', gap:'8px'}}>
              <span>Forma:</span>
              <div className="form-squares" style={{display:'inline-flex'}}>
                {renderFormSquares(awayForm.form)}
              </div>
            </div>
            <div>Partite giocate: {awayGames.length}</div>
            <div>V-P-S: {stats.awayStats.wins}-{stats.awayStats.draws}-{stats.awayStats.losses}</div>
          </div>
        </div>
        
        <div className="opponents-row">
          <div className="opponents-col">
            <b>Ultimi avversari ({match.casa})</b>
            {last5Home.map(g => {
              const resultClass = getResultColor(g, match.casa);
              const oppName = g.casa === match.casa ? g.ospiti : g.casa;
              return (
                <div key={g.id} className="opp-item">
                  <span>{oppName}</span>
                  <span>
                    <span className={`opp-result-indicator ${resultClass}`}></span>
                    ({g.golCasa}-{g.golOspite})
                  </span>
                </div>
              );
            })}
            <div className="opp-form-pct">{homeForm.pct}%</div>
            <div className="opp-form-bar"><div className="opp-form-bar-fill" style={{width: homeForm.pct+'%'}}></div></div>
          </div>
          <div className="opponents-col">
            <b>Ultimi avversari ({match.ospiti})</b>
            {last5Away.map(g => {
              const resultClass = getResultColor(g, match.ospiti);
              const oppName = g.casa === match.ospiti ? g.ospiti : g.casa;
              return (
                <div key={g.id} className="opp-item">
                  <span>{oppName}</span>
                  <span>
                    <span className={`opp-result-indicator ${resultClass}`}></span>
                    ({g.golCasa}-{g.golOspite})
                  </span>
                </div>
              );
            })}
            <div className="opp-form-pct">{awayForm.pct}%</div>
            <div className="opp-form-bar"><div className="opp-form-bar-fill" style={{width: awayForm.pct+'%'}}></div></div>
          </div>
        </div>
      </div>
      
      <div className="card detail-section">
        <h4>⚡ FISSA</h4>
        <div className="detail-row">
          {renderStatBox('1', stats.p1, 'Fissa 1')}
          {renderStatBox('X', stats.pX, 'Fissa X')}
          {renderStatBox('2', stats.p2, 'Fissa 2')}
        </div>
      </div>
      
      <div className="card detail-section">
        <h4>🛡️ DOPPIA CHANCE</h4>
        <div className="detail-row">
          {renderStatBox('1X', stats.p1X, 'Doppia Chance 1X')}
          {renderStatBox('12', stats.p12, 'Doppia Chance 12')}
          {renderStatBox('X2', stats.pX2, 'Doppia Chance X2')}
        </div>
      </div>
      
      <div className="card detail-section">
        <h4>📊 UNDER / OVER</h4>
        {stats.underOver.map(u => (
          <div key={u.threshold} className="detail-row">
            <div className="detail-stat-box" style={{flex:'0 0 70px', background:'var(--surface)'}}>
              <span className="label" style={{color: '#ffff00'}}>Soglia</span>
              <span className="value" style={{color: '#fff', fontSize:'14px'}}>{u.threshold}</span>
            </div>
            {renderStatBox('Under', u.under, `Under ${u.threshold}`)}
            {renderStatBox('Over', u.over, `Over ${u.threshold}`)}
          </div>
        ))}
      </div>
      
      <div className="card detail-section">
        <h4>🏠 {match.casa} / ✈️ {match.ospiti}</h4>
        <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'8px'}}>
          <div>
            <div style={{fontWeight:'bold', color: getChampColor(match.campionato)}}>Casa</div>
            <div className="detail-row" style={{marginBottom:'4px'}}>
              {renderStatBox('0-1', stats.homeMG['0-1'], `Casa 0-1`)}
              {renderStatBox('0-2', stats.homeMG['0-2'], `Casa 0-2`)}
            </div>
            <div className="detail-row" style={{marginBottom:'4px'}}>
              {renderStatBox('1-3', stats.homeMG['1-3'], `Casa 1-3`)}
              {renderStatBox('Over 1,5', stats.homeMG['2-4'], `Casa Over 1,5`)}
            </div>
          </div>
          <div>
            <div style={{fontWeight:'bold', color: getChampColor(match.campionato)}}>Ospite</div>
            <div className="detail-row" style={{marginBottom:'4px'}}>
              {renderStatBox('0-1', stats.awayMG['0-1'], `Ospite 0-1`)}
              {renderStatBox('0-2', stats.awayMG['0-2'], `Ospite 0-2`)}
            </div>
            <div className="detail-row" style={{marginBottom:'4px'}}>
              {renderStatBox('1-3', stats.awayMG['1-3'], `Ospite 1-3`)}
              {renderStatBox('Over 1,5', stats.awayMG['2-4'], `Ospite Over 1,5`)}
            </div>
          </div>
        </div>
      </div>
      
      <div className="card detail-section">
        <h4>🎯 MULTIGOL TOTALE</h4>
        <div className="detail-row">
          {Object.entries(stats.mgTot).map(([label, val]) => {
            const numValue = typeof val === 'number' ? val : 0;
            const roundedValue = Math.round(numValue);
            const isBomb = numValue >= 90;
            const displayLabel = label === '2-4' ? 'Over 1,5' : label;
            const cls = getColorClass(numValue);
            
            const handleClick = () => {
              const text = `MG Totale ${displayLabel}: ${roundedValue}% (${match.casa} vs ${match.ospiti})`;
              addToSchedina(text);
            };
            return (
              <div key={label} className={`detail-stat-box ${cls}`} style={{flex:'1', minWidth:'80px'}} onClick={handleClick}>
                <span className="label">{displayLabel}</span>
                <span className="value" style={{color: '#000', fontSize: '20px', fontWeight: 'bold'}}>
                  {roundedValue}%
                  {isBomb && <span className="bomb-icon">💣</span>}
                </span>
              </div>
            );
          })}
        </div>
      </div>
      
      <div style={{textAlign:'center', color:'var(--text-muted)', fontSize:'12px', marginTop:'12px'}}>
        Basato su {totalGames} partite giocate ({homeGames.length} {match.casa} + {awayGames.length} {match.ospiti})
      </div>
    </div>
  );
};

// ============================================================
// AIAnalysis - Versione Professionale con API
// ============================================================
const AIAnalysis = ({ match, allMatches, apiKeys, setTab }) => {
  const [analysis, setAnalysis] = useState(null);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const [weatherData, setWeatherData] = useState(null);
  const [injuriesData, setInjuriesData] = useState(null);
  const [standingsData, setStandingsData] = useState(null);
  const [headToHeadData, setHeadToHeadData] = useState(null);
  const [playersData, setPlayersData] = useState(null);
  const [teamStatsData, setTeamStatsData] = useState(null);
  const [isRefreshing, setIsRefreshing] = useState(false);
  
  const fetchWeather = async (city, matchDate) => {
    const apiKey = apiKeys['OpenWeatherMap'];
    if (!apiKey || !city) return null;
    try {
      const r = await fetch(
        `https://api.openweathermap.org/data/2.5/forecast?q=${encodeURIComponent(city)}&units=metric&appid=${apiKey}`
      );
      if (!r.ok) return null;
      const data = await r.json();
      const matchDay = new Date(matchDate);
      matchDay.setHours(0,0,0,0);
      const forecasts = data.list.filter(item => {
        const dt = new Date(item.dt * 1000);
        dt.setHours(0,0,0,0);
        return dt.getTime() === matchDay.getTime();
      });
      if (forecasts.length === 0) return null;
      const forecast = forecasts[0];
      return {
        temp: forecast.main.temp,
        temp_min: forecast.main.temp_min,
        temp_max: forecast.main.temp_max,
        weather: forecast.weather[0].description,
        weather_icon: forecast.weather[0].icon,
        wind_speed: forecast.wind.speed,
        rain: forecast.rain ? forecast.rain['3h'] : 0,
        snow: forecast.snow ? forecast.snow['3h'] : 0,
        humidity: forecast.main.humidity,
        pressure: forecast.main.pressure
      };
    } catch (e) { return null; }
  };
  
  const fetchInjuries = async (teamName) => {
    const apiKey = apiKeys['API-Football'];
    if (!apiKey) return null;
    try {
      const r = await fetch(`https://v3.football.api-sports.io/injuries?team=${encodeURIComponent(teamName)}`, {
        headers: { 'x-apisports-key': apiKey }
      });
      if (!r.ok) return null;
      const data = await r.json();
      return data.response || [];
    } catch (e) { return null; }
  };
  
  const fetchHeadToHead = async (homeTeam, awayTeam) => {
    const apiKey = apiKeys['API-Football'];
    if (!apiKey) return null;
    try {
      const r = await fetch(`https://v3.football.api-sports.io/fixtures/headtohead?h2h=${encodeURIComponent(homeTeam)}-${encodeURIComponent(awayTeam)}&last=10`, {
        headers: { 'x-apisports-key': apiKey }
      });
      if (!r.ok) return null;
      const data = await r.json();
      return data.response || [];
    } catch (e) { return null; }
  };
  
  const fetchTeamStats = async (teamName) => {
    const apiKey = apiKeys['API-Football'];
    if (!apiKey) return null;
    try {
      const searchRes = await fetch(`https://v3.football.api-sports.io/teams?search=${encodeURIComponent(teamName)}`, {
        headers: { 'x-apisports-key': apiKey }
      });
      if (!searchRes.ok) return null;
      const searchData = await searchRes.json();
      if (!searchData.response || searchData.response.length === 0) return null;
      
      const teamId = searchData.response[0].team.id;
      
      const statsRes = await fetch(`https://v3.football.api-sports.io/teams/statistics?team=${teamId}&league=${getLeagueIdFromChampionship(match.campionato)}&season=${new Date().getFullYear()}`, {
        headers: { 'x-apisports-key': apiKey }
      });
      if (!statsRes.ok) return null;
      const statsData = await statsRes.json();
      return statsData.response;
    } catch (e) { return null; }
  };
  
  const fetchPlayers = async (teamName) => {
    const apiKey = apiKeys['API-Football'];
    if (!apiKey) return null;
    try {
      const searchRes = await fetch(`https://v3.football.api-sports.io/teams?search=${encodeURIComponent(teamName)}`, {
        headers: { 'x-apisports-key': apiKey }
      });
      if (!searchRes.ok) return null;
      const searchData = await searchRes.json();
      if (!searchData.response || searchData.response.length === 0) return null;
      
      const teamId = searchData.response[0].team.id;
      
      const playersRes = await fetch(`https://v3.football.api-sports.io/players?team=${teamId}&season=${new Date().getFullYear()}`, {
        headers: { 'x-apisports-key': apiKey }
      });
      if (!playersRes.ok) return null;
      const playersData = await playersRes.json();
      return playersData.response || [];
    } catch (e) { return null; }
  };
  
  const getLeagueIdFromChampionship = (champName) => {
    const leagueMap = {
      'Premier League': 39,
      'Serie A': 135,
      'La Liga': 140,
      'Bundesliga': 78,
      'Ligue 1': 61,
      'Eredivisie': 88,
      'Primeira Liga': 94,
      'Allsvenskan': 45,
      'Eliteserien': 44,
      'Danish Superliga': 40,
      'Pro League': 42,
      'Championship': 40,
      'Liga MX': 85,
      'Brasileirão': 71,
      'J1 League': 98,
      'K League 1': 103,
      'Swiss Super League': 36,
      'Austrian Bundesliga': 135,
      'Chinese Super League': 169,
      'Premier Division': 72,
      'Besta deild': 45,
      'Liga Portugal Betclic': 94
    };
    for (const [key, id] of Object.entries(leagueMap)) {
      if (champName.toLowerCase().includes(key.toLowerCase()) || key.toLowerCase().includes(champName.toLowerCase())) {
        return id;
      }
    }
    return null;
  };
  
  const getStandings = (teamName, championship) => {
    const matchesFiltered = allMatches.filter(m => m.campionato === championship && m.stato === 'Giocata');
    if (matchesFiltered.length === 0) return null;
    const teamStats = {};
    const addGame = (team, isHome, golFatti, golSubiti) => {
      if (!teamStats[team]) {
        teamStats[team] = { pg: 0, punti: 0, v: 0, p: 0, s: 0, gf: 0, gs: 0 };
      }
      const t = teamStats[team];
      t.pg++;
      t.gf += golFatti;
      t.gs += golSubiti;
      if (golFatti > golSubiti) {
        t.v++;
        t.punti += 3;
      } else if (golFatti === golSubiti) {
        t.p++;
        t.punti += 1;
      } else {
        t.s++;
      }
    };
    matchesFiltered.forEach(m => {
      addGame(m.casa, true, m.golCasa, m.golOspite);
      addGame(m.ospiti, false, m.golOspite, m.golCasa);
    });
    const sorted = Object.entries(teamStats)
      .sort((a, b) => {
        if (b[1].punti !== a[1].punti) return b[1].punti - a[1].punti;
        if (b[1].gf - b[1].gs !== a[1].gf - a[1].gs) return (b[1].gf - b[1].gs) - (a[1].gf - a[1].gs);
        return b[1].gf - a[1].gf;
      })
      .map(([name, stats], index) => ({ pos: index + 1, name, ...stats }));
    const teamPos = sorted.find(s => s.name === teamName);
    return teamPos ? { pos: teamPos.pos, punti: teamPos.punti, pg: teamPos.pg } : null;
  };
  
  const getWeatherEmoji = (weatherDesc) => {
    if (!weatherDesc) return '🌤️';
    const desc = weatherDesc.toLowerCase();
    if (desc.includes('clear') || desc.includes('sunny')) return '☀️';
    if (desc.includes('cloud') || desc.includes('overcast')) return '☁️';
    if (desc.includes('rain') || desc.includes('drizzle')) return '🌧️';
    if (desc.includes('thunder') || desc.includes('storm')) return '⛈️';
    if (desc.includes('snow') || desc.includes('sleet')) return '❄️';
    if (desc.includes('fog') || desc.includes('mist')) return '🌫️';
    return '🌤️';
  };
  
  useEffect(() => {
    if (!match) return;
    const storageKey = `ft_ai_${match.id}`;
    const saved = localStorage.getItem(storageKey);
    if (saved) {
      try {
        const parsed = JSON.parse(saved);
        setAnalysis(parsed.analysis || null);
        setWeatherData(parsed.weatherData || null);
        setInjuriesData(parsed.injuriesData || null);
        setStandingsData(parsed.standingsData || null);
        setHeadToHeadData(parsed.headToHeadData || null);
        setPlayersData(parsed.playersData || null);
        setTeamStatsData(parsed.teamStatsData || null);
        setError(null);
        return;
      } catch (e) {}
    }
    generateAnalysis();
  }, [match]);
  
  const generateAnalysis = async (forceRefresh = false) => {
    if (!match) return;
    if (!apiKeys['GROQ']) {
      setError('🔑 Chiave API GROQ non configurata');
      setLoading(false);
      return;
    }
    
    setLoading(true);
    setError(null);
    setIsRefreshing(true);
    
    try {
      const stats = computeMatchStats(match, allMatches);
      if (stats.error) {
        setError(stats.error);
        setLoading(false);
        setIsRefreshing(false);
        return;
      }
      const homeForm = calcFormAndStats(allMatches, match.casa);
      const awayForm = calcFormAndStats(allMatches, match.ospiti);
      const homeMG = calcTeamMG(allMatches, match.casa);
      const awayMG = calcTeamMG(allMatches, match.ospiti);
      const pct12Under45 = get12Under45(allMatches, match.casa, match.ospiti);
      
      const city = getCittaFromChampionship(match.campionato);
      let weather = null;
      if (city && apiKeys['OpenWeatherMap']) {
        weather = await fetchWeather(city, match.data);
        setWeatherData(weather);
      }
      
      let injuries = null;
      let h2h = null;
      let players = null;
      let teamStats = null;
      
      if (apiKeys['API-Football']) {
        const [injHome, injAway, h2hData, playersHome, playersAway, statsHome, statsAway] = await Promise.all([
          fetchInjuries(match.casa),
          fetchInjuries(match.ospiti),
          fetchHeadToHead(match.casa, match.ospiti),
          fetchPlayers(match.casa),
          fetchPlayers(match.ospiti),
          fetchTeamStats(match.casa),
          fetchTeamStats(match.ospiti)
        ]);
        
        if (injHome || injAway) {
          injuries = { home: injHome || [], away: injAway || [] };
        }
        setInjuriesData(injuries);
        
        if (h2hData) {
          setHeadToHeadData(h2hData);
        }
        
        if (playersHome || playersAway) {
          players = { home: playersHome || [], away: playersAway || [] };
          setPlayersData(players);
        }
        
        if (statsHome || statsAway) {
          teamStats = { home: statsHome, away: statsAway };
          setTeamStatsData(teamStats);
        }
      }
      
      const standingHome = getStandings(match.casa, match.campionato);
      const standingAway = getStandings(match.ospiti, match.campionato);
      const standings = { home: standingHome, away: standingAway };
      setStandingsData(standings);
      
      let meteoSection = '';
      if (weather) {
        const weatherEmoji = getWeatherEmoji(weather.weather);
        meteoSection = `
🌤️ CONDIZIONI METEO PREVISTE (${city}):
- ${weatherEmoji} ${weather.weather}
- Temperatura: ${weather.temp}°C (min ${weather.temp_min}°C, max ${weather.temp_max}°C)
- Vento: ${weather.wind_speed} m/s
- Pioggia: ${weather.rain ? weather.rain + ' mm' : 'nessuna'}
- Umidità: ${weather.humidity || 'N/A'}%
- Pressione: ${weather.pressure || 'N/A'} hPa

IMPATTO SUL GIOCO:
${weather.rain > 5 ? '🔴 Pioggia intensa: campo pesante, favorisce il gioco fisico e i contrasti.' : weather.rain > 0 ? '🟡 Pioggia leggera: campo scivoloso, attenzione ai passaggi.' : '✅ Meteo favorevole per un calcio spettacolare.'}
${weather.wind_speed > 5 ? '💨 Vento forte (oltre 5 m/s): influenzerà lanci lunghi e calci piazzati.' : ''}
${weather.temp > 30 ? '🔥 Caldo estremo: possibile calo fisico nel secondo tempo.' : ''}
${weather.temp < 5 ? '❄️ Freddo intenso: campo duro, favorisce il possesso palla.' : ''}
${weather.humidity > 70 ? '💧 Alta umidità: palleggiatura più difficile, favorisce il gioco corto.' : ''}
`;
      } else {
        meteoSection = '⚠️ Dati meteo non disponibili per questa partita.';
      }
      
      let injuriesSection = '';
      if (injuries && (injuries.home.length > 0 || injuries.away.length > 0)) {
        injuriesSection = '⚠️ INFORTUNI E SQUALIFICHE:\n';
        if (injuries.home.length > 0) {
          const keyInjuries = injuries.home.filter(i => i.status === 'out' || i.status === 'doubtful');
          const minorInjuries = injuries.home.filter(i => i.status !== 'out' && i.status !== 'doubtful');
          injuriesSection += `  ${match.casa}:\n`;
          if (keyInjuries.length > 0) {
            injuriesSection += `    🔴 Giocatori chiave assenti: ${keyInjuries.map(i => `${i.player.name} (${i.type || 'infortunio'})`).join(', ')}\n`;
          }
          if (minorInjuries.length > 0) {
            injuriesSection += `    🟡 Altri assenti: ${minorInjuries.map(i => `${i.player.name} (${i.status})`).join(', ')}\n`;
          }
          if (injuries.home.length === 0) {
            injuriesSection += `    ✅ Tutti disponibili\n`;
          }
        }
        if (injuries.away.length > 0) {
          const keyInjuries = injuries.away.filter(i => i.status === 'out' || i.status === 'doubtful');
          const minorInjuries = injuries.away.filter(i => i.status !== 'out' && i.status !== 'doubtful');

const TeamMatchesHistory = ({ teamName, championship, allMatches }) => {
  const teamMatches = allMatches
    .filter(m => m.campionato === championship && m.stato === 'Giocata' && (m.casa === teamName || m.ospiti === teamName))
    .sort((a, b) => new Date(b.data + ' ' + b.ora) - new Date(a.data + ' ' + a.ora));

  if (teamMatches.length === 0) {
    return (
      <div className="card" style={{padding: '12px', textAlign:'center'}}>
        <p style={{color:'var(--text-muted)'}}>Nessuna partita giocata per {teamName} in questo campionato.</p>
      </div>
    );
  }

  const getResult = (match, team) => {
    const isHome = match.casa === team;
    const teamGoals = isHome ? match.golCasa : match.golOspite;
    const oppGoals = isHome ? match.golOspite : match.golCasa;
    if (teamGoals > oppGoals) return 'win';
    if (teamGoals === oppGoals) return 'draw';
    return 'loss';
  };

  const getOpponent = (match, team) => {
    return match.casa === team ? match.ospiti : match.casa;
  };
  
  const getResultColor = (result) => {
    if (result === 'win') return 'var(--win)';
    if (result === 'draw') return 'var(--draw)';
    return 'var(--lose)';
  };

  return (
    <div className="card" style={{padding: '12px'}}>
      <h4 style={{color: getChampColor(teamName), marginBottom:'12px'}}>📋 {teamName}</h4>
      <div className="standings-table-wrap">
        <table className="standings-table history-table">
          <thead>
            <tr>
              <th>Data</th>
              <th>Avversario</th>
              <th style={{textAlign:'center'}}>Risultato</th>
            </tr>
          </thead>
          <tbody>
            {teamMatches.map(m => {
              const result = getResult(m, teamName);
              const opponent = getOpponent(m, teamName);
              const resultColor = getResultColor(result);
              const scoreText = `${m.golCasa} - ${m.golOspite}`;
              
              return (
                <tr key={m.id}>
                  <td style={{color: 'var(--text)'}}>{formatDateEU(m.data)}</td>
                  <td style={{color: 'var(--text)'}}>{opponent}</td>
                  <td style={{textAlign: 'center'}}>
                    <span style={{
                      display: 'inline-block',
                      backgroundColor: resultColor,
                      color: '#000',
                      fontWeight: 'bold',
                      padding: '2px 12px',
                      borderRadius: '4px',
                      minWidth: '60px',
                      textAlign: 'center',
                      fontSize: '14px'
                    }}>
                      {scoreText}
                    </span>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
};

const SofaScoreManager = ({ onImport, loading, matches, setMatches }) => {
  const [customLeagues, setCustomLeagues] = useState(getCustomSofaLeagues);
  const [newLeagueName, setNewLeagueName] = useState('');
  const [newLeagueId, setNewLeagueId] = useState('');
  const [selectedSeason, setSelectedSeason] = useState('26/27');
  const [searchQuery, setSearchQuery] = useState('');
  const [searchResults, setSearchResults] = useState([]);
  const [searching, setSearching] = useState(false);
  const [selectedTab, setSelectedTab] = useState('lista');
  const [isChecking, setIsChecking] = useState(false);

  const saveLeagues = (leagues) => {
    setCustomLeagues(leagues);
    saveCustomSofaLeagues(leagues);
  };

  // Funzione per rimuovere un campionato (anche predefinito)
  const removeLeague = (id, name) => {
    const isDefault = Object.values(SOFASCORE_LEAGUE_IDS).includes(id);
    
    // Controlla se ha partite importate
    const matchCount = matches ? matches.filter(m => m.campionato === name).length : 0;
    
    if (matchCount > 0) {
      if (!confirm(`⚠️ Il campionato "${name}" ha ${matchCount} partite importate.\n\nEliminarlo cancellerà anche le partite. Continuare?`)) {
        return;
      }
      // Elimina le partite
      setMatches(prev => prev.filter(m => m.campionato !== name));
    }
    
    if (isDefault) {
      // Per i campionati predefiniti: aggiungi alla blacklist
      const blacklist = getBlacklist();
      if (!blacklist.includes(id)) {
        blacklist.push(id);
        saveBlacklist(blacklist);
      }
      showAlert('success', `🗑️ "${name}" rimosso dalla lista!`);
    } else {
      // Per i campionati personalizzati: rimuovi dalla lista
      saveLeagues(customLeagues.filter(l => l.id !== id));
      showAlert('success', `🗑️ "${name}" rimosso dalla lista!`);
    }
  };

  const checkLeagueHasMatches = async (leagueId, seasonYear) => {
    try {
      const events = await fetchSofaScoreMatches(leagueId, seasonYear);
      return { hasMatches: events.length > 0, count: events.length };
    } catch (e) {
      console.error('Errore controllo lega:', e);
      return { hasMatches: false, count: 0, error: e.message };
    }
  };

  const addAndImportLeague = async () => {
    if (!newLeagueName.trim() || !newLeagueId.trim()) {
      alert('Inserisci sia il nome che l\'ID del campionato.');
      return;
    }

    const id = parseInt(newLeagueId);
    if (isNaN(id) || id <= 0) {
      alert('L\'ID deve essere un numero positivo.');
      return;
    }

    const allLeagues = getVisibleLeagues(customLeagues);
    if (allLeagues.some(l => l.id === id || l.name.toLowerCase() === newLeagueName.toLowerCase())) {
      alert('⚠️ Questo campionato o ID è già presente nella lista.');
      return;
    }

    setIsChecking(true);
    const leagueName = newLeagueName.trim();

    try {
      const checkResult = await checkLeagueHasMatches(id, selectedSeason);
      
      if (checkResult.error) {
        alert(`❌ Errore nel controllo: ${checkResult.error}`);
        setIsChecking(false);
        return;
      }

      if (!checkResult.hasMatches) {
        alert(`❌ Nessuna partita trovata per "${leagueName}" (ID: ${id}) nella stagione ${selectedSeason}.`);
        setIsChecking(false);
        return;
      }

      const newLeague = { name: leagueName, id: id };
      saveLeagues([...customLeagues, newLeague]);
      await onImport(leagueName, selectedSeason);
      
      setNewLeagueName('');
      setNewLeagueId('');
      
    } catch (e) {
      console.error('Errore:', e);
      alert(`❌ Errore durante l'aggiunta: ${e.message}`);
    }
    
    setIsChecking(false);
  };

  const searchSofaLeagues = async () => {
    if (!searchQuery.trim()) {
      alert('Inserisci un termine di ricerca.');
      return;
    }
    setSearching(true);
    setSearchResults([]);
    try {
      const response = await fetch(
        `https://api.sofascore.com/api/v1/search?q=${encodeURIComponent(searchQuery)}&type=tournament`
      );
      if (!response.ok) throw new Error('Errore nella ricerca');
      const data = await response.json();
      if (data.results && data.results.length > 0) {
        const footballTournaments = data.results.filter(
          r => r.sport?.id === 1 || r.sport?.slug === 'football'
        );
        setSearchResults(footballTournaments);
        if (footballTournaments.length === 0) {
          alert('Nessun campionato di calcio trovato. Prova con un termine più specifico.');
        }
      } else {
        alert('Nessun risultato trovato.');
      }
    } catch (e) {
      console.error('Errore ricerca:', e);
      alert('Errore durante la ricerca. Verifica la connessione.');
    }
    setSearching(false);
  };

  const addFromSearch = async (tournament) => {
    const name = tournament.name;
    const id = tournament.id;
    
    const allLeagues = getVisibleLeagues(customLeagues);
    if (allLeagues.some(l => l.id === id || l.name.toLowerCase() === name.toLowerCase())) {
      alert('⚠️ Questo campionato è già nella tua lista.');
      return;
    }

    setIsChecking(true);
    
    try {
      const checkResult = await checkLeagueHasMatches(id, selectedSeason);
      
      if (checkResult.error) {
        alert(`❌ Errore nel controllo: ${checkResult.error}`);
        setIsChecking(false);
        return;
      }

      if (!checkResult.hasMatches) {
        alert(`❌ Nessuna partita trovata per "${name}" (ID: ${id}) nella stagione ${selectedSeason}.`);
        setIsChecking(false);
        return;
      }

      saveLeagues([...customLeagues, { name, id }]);
      await onImport(name, selectedSeason);
      setSearchResults(searchResults.filter(r => r.id !== id));
      
    } catch (e) {
      console.error('Errore:', e);
      alert(`❌ Errore durante l'aggiunta: ${e.message}`);
    }
    
    setIsChecking(false);
  };

  const allLeagues = getVisibleLeagues(customLeagues);

  // Funzione per mostrare alert (passata dal componente padre)
  const showAlert = (type, text) => {
    // Questa funzione sarà passata dal componente padre
    if (window.showAlert) window.showAlert(type, text);
    else alert(text);
  };

  return (
    <div className="card">
      <h4 style={{marginBottom:'12px'}}>🌐 Gestione Campionati SofaScore</h4>
      
      <div className="sub-tabs" style={{marginBottom:'12px'}}>
        <button className={selectedTab === 'lista' ? 'active' : ''} onClick={() => setSelectedTab('lista')}>
          📋 Lista campionati ({allLeagues.length})
        </button>
        <button className={selectedTab === 'cerca' ? 'active' : ''} onClick={() => setSelectedTab('cerca')}>
          🔍 Cerca e aggiungi
        </button>
      </div>

      {selectedTab === 'lista' && (
        <div>
          <div style={{display:'flex', gap:'8px', flexWrap:'wrap', marginBottom:'12px'}}>
            <input
              type="text"
              value={newLeagueName}
              onChange={e => setNewLeagueName(e.target.value)}
              placeholder="Nome campionato (es. Champions League)"
              style={{flex:1, minWidth:'150px'}}
            />
            <input
              type="number"
              value={newLeagueId}
              onChange={e => setNewLeagueId(e.target.value)}
              placeholder="ID SofaScore (es. 7)"
              style={{width:'120px'}}
            />
            <select 
              value={selectedSeason} 
              onChange={e => setSelectedSeason(e.target.value)}
              style={{width:'120px', padding:'8px'}}
            >
              <option value="25/26">25/26</option>
              <option value="26/27">26/27</option>
              <option value="26/26">26/26 (anno solare)</option>
            </select>
            <button 
              className="btn" 
              onClick={addAndImportLeague}
              disabled={isChecking || loading}
            >
              {isChecking ? '⏳ Controllo...' : '➕ Aggiungi e Importa'}
            </button>
          </div>
          
          <div style={{maxHeight:'300px', overflowY:'auto'}}>
            {allLeagues.length === 0 ? (
              <p style={{color:'var(--text-muted)', textAlign:'center', padding:'20px'}}>
                Nessun campionato configurato.
              </p>
            ) : (
              <table className="standings-table" style={{fontSize:'13px'}}>
                <thead>
                  <tr>
                    <th>Campionato</th>
                    <th style={{textAlign:'center'}}>ID</th>
                    <th style={{textAlign:'center'}}>Tipo</th>
                    <th style={{textAlign:'center'}}>Partite</th>
                    <th style={{textAlign:'center'}}>Azioni</th>
                  </tr>
                </thead>
                <tbody>
                  {allLeagues.map(league => {
                    const matchCount = matches ? matches.filter(m => m.campionato === league.name).length : 0;
                    
                    return (
                      <tr key={league.id} style={{borderBottom:'1px solid var(--border)'}}>
                        <td style={{padding:'6px 8px'}}>
                          <span style={{color: league.isDefault ? 'var(--text)' : 'var(--accent)'}}>

                        <td style={{textAlign:'center', padding:'6px 8px'}}>{league.id}</td>

                            background: league.isDefault ? 'var(--surface)' : 'var(--accent)',

                            {league.isDefault ? 'Predefinito' : 'Personalizzato'}

                        </td>
                        <td style={{textAlign:'center', padding:'6px 8px'}}>
                          {matchCount > 0 ? (
                            <span style={{color:'var(--win)', fontWeight:'bold'}}>{matchCount}</span>

                        <td style={{textAlign:'center', padding:'6px 8px'}}>

                          <button

            <span style={{color:'var(--accent)'}}>

              ✅ Il pulsante ✖ rimuove TUTTI i campionati (anche quelli predefiniti)!
            </span>
          </div>
        </div>
      )}

      {selectedTab === 'cerca' && (
        <div>
          <div style={{display:'flex', gap:'8px', marginBottom:'12px'}}>
            <input
              type="text"
              value={searchQuery}
              onChange={e => setSearchQuery(e.target.value)}

                    <th>Campionato</th>

const askGroq = async (prompt, key) => {
  if (!key) {
    throw new Error('🔑 API GROQ non configurata. Vai nel tab API KEY per configurarla.');
  }
  try {
    const r = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type':'application/json', 'Authorization': `Bearer ${key}` },
      body: JSON.stringify({
        model: 'llama-3.3-70b-versatile',
        messages: [{ role:'system', content:'Sei un esperto data scientist e analista tattico di calcio. Rispondi ESCLUSIVAMENTE in formato JSON valido, senza testo prima o dopo.' }, { role:'user', content: prompt }]
      })
    });
    if (!r.ok) {
      const errorText = await r.text();
      throw new Error(`Errore API GROQ: ${r.status} - ${errorText}`);
    }
    const d = await r.json();
    const content = d.choices?.[0]?.message?.content;
    if (!content) {
      throw new Error('Groq non ha restituito una risposta valida.');
    }
    return content;
  } catch(e) {
    throw new Error(e.message || 'Errore durante la richiesta a Groq.');
  }
};

  const generateSchedina = () => {
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    
    const maxDate = new Date(today);
    maxDate.setDate(maxDate.getDate() + daysRange);
    
    let filtered = matches.filter(m => {
      if (m.stato !== 'Futura') return false;
      if (!m.data) return false;
      const matchDate = new Date(m.data);
      if (isNaN(matchDate.getTime())) return false;
      matchDate.setHours(0, 0, 0, 0);
      return matchDate >= today && matchDate <= maxDate;
    });
    
    if (schedinaChamp !== 'Tutti') {
      filtered = filtered.filter(m => m.campionato === schedinaChamp);
    }
    
    if (filtered.length === 0) {
      setUsedMatchIds(new Set());
      showAlert('info', '🔄 Nessuna partita disponibile nel range selezionato. CARD ricalcolate automaticamente.');
      const allFiltered = matches.filter(m => {
        if (m.stato !== 'Futura') return false;
        if (!m.data) return false;
        const matchDate = new Date(m.data);
        if (isNaN(matchDate.getTime())) return false;
        matchDate.setHours(0, 0, 0, 0);
        return matchDate >= today;
      });
      if (allFiltered.length === 0) {
        showAlert('error', '❌ Nessuna partita futura disponibile in nessun campionato.');
        setSchedinaMatches([]);
        return;
      }
      filtered = allFiltered;
      setUsedMatchIds(new Set());
    }
    
    let available = filtered.filter(m => !usedMatchIds.has(m.id));
    
    if (available.length === 0) {
      setUsedMatchIds(new Set());
      showAlert('info', '🔄 Tutte le partite sono state consumate. CARD ricalcolate automaticamente.');
      available = filtered;
    }
    
    const scoredMatches = available.map(m => {
      const homeMG = getTeamMultigolV2(matches, m.casa);
      const awayMG = getTeamMultigolV2(matches, m.ospiti);
      const homeUO = getTeamUnderOver(matches, m.casa);
      const awayUO = getTeamUnderOver(matches, m.ospiti);
      const pct12Under45 = get12Under45(matches, m.casa, m.ospiti);
      
      const homeRange = getMostFrequentGoalRange(m.casa, matches);
      const awayRange = getMostFrequentGoalRange(m.ospiti, matches);
      
      const stats = computeMatchStats(m, matches);
      let freeCombo = { label: 'N/A', pct: 0 };
      if (!stats.error) {
        freeCombo = getBestFreeCombo(stats, stats.homeMG, stats.awayMG, stats.mgTot);
      }
      
      const allUO = { ...homeUO, ...awayUO };
      let bestPct = 0;
      let bestBet = '';
      Object.entries(allUO).forEach(([key, val]) => {
        if (val > bestPct) {
          bestPct = val;
          bestBet = key;
        }
      });
      
      const score = Math.round((pct12Under45 + homeRange.pct + awayRange.pct + freeCombo.pct) / 4);
      return { ...m, score, homeRange, awayRange, pct12Under45, bestBet, bestPct, freeCombo };
    });
    
    scoredMatches.sort((a, b) => b.score - a.score);
    const selected = scoredMatches.slice(0, numMatches);

    selected.forEach(m => newUsed.add(m.id));

      try {
        const data = JSON.parse(e.target.result);
        if (data.championships) setChampionships(data.championships);

      const homeMG = calcTeamMG(matches, m.casa);

      const stats = computeMatchStats(m, matches);
      if (stats.error) return;
      matchData += `
Partita: ${m.casa} vs ${m.ospiti}
Campionato: ${m.campionato} - Giornata: ${m.round}
Data: ${m.data} - Ora: ${m.ora}
Forma Casa: ${homeForm.form} (${homeForm.pct}%)
Forma Ospite: ${awayForm.form} (${awayForm.pct}%)
Differenza forma: ${Math.abs(homeForm.pct - awayForm.pct)}%
Media Gol Casa: ${homeMG} - Media Gol Ospite: ${awayMG}
1X2: 1=${Math.round(stats.p1)}% X=${Math.round(stats.pX)}% 2=${Math.round(stats.p2)}%
Doppia Chance: 1X=${Math.round(stats.p1X)}% 12=${Math.round(stats.p12)}% X2=${Math.round(stats.pX2)}%
Under/Over 1.5: U=${Math.round(stats.underOver[0].under)}% O=${Math.round(stats.underOver[0].over)}%
Under/Over 2.5: U=${Math.round(stats.underOver[1].under)}% O=${Math.round(stats.underOver[1].over)}%
Under/Over 3.5: U=${Math.round(stats.underOver[2].under)}% O=${Math.round(stats.underOver[2].over)}%
Under/Over 4.5: U=${Math.round(stats.underOver[3].under)}% O=${Math.round(stats.underOver[3].over)}%
Multigol Casa: 0-1=${Math.round(stats.homeMG['0-1'])}% 0-2=${Math.round(stats.homeMG['0-2'])}% 1-3=${Math.round(stats.homeMG['1-3'])}% Over 1,5=${Math.round(stats.homeMG['2-4'])}%
Multigol Ospite: 0-1=${Math.round(stats.awayMG['0-1'])}% 0-2=${Math.round(stats.awayMG['0-2'])}% 1-3=${Math.round(stats.awayMG['1-3'])}% Over 1,5=${Math.round(stats.awayMG['2-4'])}%
Multigol Totale: 1-4=${Math.round(stats.mgTot['1-4'])}% Over 1,5=${Math.round(stats.mgTot['2-4'])}% 2-5=${Math.round(stats.mgTot['2-5'])}% 3-6=${Math.round(stats.mgTot['3-6'])}%`;
    });
    
    const fullPrompt = `Analizza i seguenti dati pre-match e per OGNI partita suggerisci 3 consigli di giocate con relative percentuali di probabilità.

Struttura JSON richiesta (array di oggetti, uno per partita):
[
  {
    "partita": "NomeCasa vs NomeOspite",
    "consigli": [
      {
        "tipo": "singola",
        "giocata": "Over 1.5",
        "percentuale": 68
      },
      {
        "tipo": "combinata",
        "giocata": "2 + Under 4.5",
        "percentuale": 55
      },
      {
        "tipo": "libera",
        "giocata": "1X+Over1.5",
        "percentuale": 72
      }
    ],
    "analisi_breve": "Breve analisi della partita (max 2 righe)"
  }
]

Per il consiglio "libera", usa UNA delle seguenti tipologie (scegli la migliore in base ai dati):
- DC (1X, 12, X2)
- Over 1.5
- Under 3.5
- DC + Over 1.5
- DC + Under 3.5
- DC + Multigol Totale (1-4, Over 1,5, 2-5, 3-6)
- Multigol Totale (1-4, Over 1,5, 2-5, 3-6)
- Multigol Casa (0-1, 0-2, 1-3, Over 1,5)
- Multigol Ospite (0-1, 0-2, 1-3, Over 1,5)
- Multigol Casa + Multigol Ospite

Le percentuali delle combo sono calcolate come media delle due giocate che le compongono.

Regole:
- Il campo "tipo" deve essere esattamente "singola", "combinata" o "libera".
- "singola": una singola giocata (es. Over 1.5, Fissa 1, Multigol Casa 1-3, ecc.)
- "combinata": una combinata di almeno due giocate (es. 2+Under 4.5, X2+Over 1.5, 12+Under 4.5, ecc.)
- "libera": una delle tipologie sopra.
- La percentuale deve essere un numero intero tra 0 e 100, basato sui dati statistici forniti.

Dati:
${matchData}`;
    
    setLoading(true);
    try {
      const res = await askGroq(fullPrompt, apiKeys.GROQ);
      let jsonStr = res;
      const jsonMatch = res.match(/```(?:json)?\s*([\s\S]*?)```/);
      if (jsonMatch) jsonStr = jsonMatch[1];
      const parsed = JSON.parse(jsonStr.trim());
      if (Array.isArray(parsed)) {
        setSchedinaJson(parsed);
        setSchedinaResult('');
      } else {
        setSchedinaJson([parsed]);
        setSchedinaResult('');
      }

      setSchedinaResult(e.message || 'Errore durante la generazione');
