<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<title>GesssAI-Pro - Football Trader</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
<style>
  :root {
    --bg: #0f1419;
    --surface: #1a2028;
    --card: #232b36;
    --banner: #2c3642;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --accent: #f39c12;
    --accent2: #e67e22;
    --border: #30363d;
    --win: #6fcf97;
    --draw: #f2c94c;
    --lose: #eb5757;
    --tab-active: #f39c12;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }
  body { background: var(--bg); color: var(--text); min-height: 100vh; }
  .header { 
    background: var(--banner); 
    padding: 16px 24px; 
    border-bottom: 2px solid var(--accent); 
    display: flex; 
    align-items: center; 
    justify-content: center;
    gap: 16px; 
    position: relative;
  }
  .header .header-left {
    position: absolute;
    left: 24px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .header .header-center {
    text-align: center;
  }
  .header .header-center .app-name {
    font-size: 28px;
    font-weight: bold;
    letter-spacing: 2px;
  }
  .header .header-center .app-name span {
    display: inline-block;
  }
  .header .header-center .subtitle {
    font-size: 12px;
    color: var(--text-muted);
  }
  .clock {
    position: absolute;
    right: 24px;
    background: var(--surface);
    padding: 8px 16px;
    border-radius: 8px;
    border: 1px solid var(--border);
    font-family: 'Courier New', monospace;
    font-size: 14px;
    font-weight: bold;
    color: var(--accent);
    min-width: 200px;
    text-align: right;
  }
  .clock-date { font-size: 12px; color: var(--text-muted); }
  .clock-time { font-size: 16px; color: var(--accent); }
  .tabs-nav { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); overflow-x: auto; }
  .tabs-nav button {
    flex: 1; min-width: 120px; padding: 14px 12px; background: transparent;
    color: var(--text-muted); border: none; cursor: pointer; font-size: 14px;
    border-bottom: 3px solid transparent; transition: all 0.2s;
    font-weight: 600; white-space: nowrap;
  }
  .tabs-nav button:hover { color: var(--text); background: var(--card); }
  .tabs-nav button.active { color: var(--accent); border-bottom-color: var(--tab-active); background: var(--card); }
  .container { padding: 20px; max-width: 1400px; margin: 0 auto; }
  .card {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    padding: 18px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }
  .matches-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 18px;
    justify-content: flex-start;
  }
  .match-tab {
    background: var(--card);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 0;
    border: 1px solid var(--border);
    border-left-width: 6px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.4);
    flex: 1;
    min-width: 340px;
    max-width: 420px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    position: relative;
  }
  .match-tab:hover {
    transform: translateY(-3px);
    box-shadow: 0 6px 16px rgba(0,0,0,0.6);
  }
  .match-tab .score-badge {
    position: absolute;
    top: 10px;
    right: 12px;
    background: var(--accent);
    color: #000;
    font-weight: bold;
    font-size: 18px;
    padding: 2px 10px;
    border-radius: 20px;
    border: 2px solid var(--accent2);
  }
  .weather-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: var(--surface);
    padding: 2px 8px;
    border-radius: 12px;
    font-size: 12px;
    border: 1px solid var(--border);
    margin-top: 4px;
  }
  .weather-badge .weather-icon { font-size: 16px; }
  .weather-badge .weather-temp { font-weight: bold; color: var(--accent); }
  .schedina-controls {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: center;
    margin-bottom: 16px;
  }
  .schedina-controls .left-group {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .schedina-controls .left-group select {
    padding: 8px 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    min-width: 150px;
  }
  .schedina-controls .num-buttons {
    display: flex;
    gap: 6px;
  }
  .schedina-controls .num-buttons button {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-weight: bold;
    cursor: pointer;
    transition: all 0.2s;
  }
  .schedina-controls .num-buttons button.active {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
  }
  .schedina-controls .right-group {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-left: auto;
  }
  .schedina-controls .right-group select {
    padding: 8px 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    min-width: 160px;
  }
  .schedina-controls .btn-generate {
    background: var(--accent);
    color: #000;
    border: none;
    padding: 8px 20px;
    border-radius: 6px;
    font-weight: bold;
    cursor: pointer;
  }
  .schedina-controls .btn-generate:hover { background: var(--accent2); }
  .schedina-controls .btn-reset-cards {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 8px 16px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
  }
  .schedina-controls .btn-reset-cards:hover {
    border-color: var(--accent);
    background: var(--card);
  }
  .schedina-match-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-left-width: 6px;
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 12px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.4);
    transition: transform 0.15s, box-shadow 0.15s;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
  }
  .schedina-match-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 16px rgba(0,0,0,0.6);
  }
  .schedina-match-card .match-info {
    flex: 1;
    min-width: 150px;
  }
  .schedina-match-card .match-info .teams {
    font-weight: bold;
    font-size: 16px;
  }
  .schedina-match-card .match-info .details {
    font-size: 12px;
    color: var(--text-muted);
  }
  .schedina-match-card .giocate {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .schedina-match-card .giocate .giocata-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 12px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    color: var(--text);
  }
  .schedina-match-card .giocate .giocata-btn:hover {
    border-color: var(--accent);
    background: var(--card);
  }
  .schedina-match-card .giocate .giocata-btn.disabled {
    opacity: 0.4;
    cursor: not-allowed;
    background: #3a3f4a;
    border-color: #3a3f4a;
    color: #888;
  }
  .schedina-match-card .giocate .giocata-btn.disabled:hover {
    border-color: #3a3f4a;
    background: #3a3f4a;
  }
  .schedina-actions {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 16px;
  }
  .schedina-actions button {
    padding: 6px 16px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--surface);
    color: var(--text);
    cursor: pointer;
    transition: all 0.2s;
    font-size: 13px;
  }
  .schedina-actions button:hover {
    border-color: var(--accent);
    background: var(--card);
  }
  .schedina-actions .btn-reset {
    border-color: var(--lose);
    color: var(--lose);
  }
  .schedina-actions .btn-reset:hover {
    background: var(--lose);
    color: #fff;
  }
  .schedina-actions .btn-save {
    border-color: var(--win);
    color: var(--win);
  }
  .schedina-actions .btn-save:hover {
    background: var(--win);
    color: #000;
  }
  .schedina-list {
    margin-top: 16px;
    background: var(--surface);
    padding: 12px;
    border-radius: 8px;
    border-left: 4px solid var(--accent);
  }
  .schedina-list .entry {
    padding: 4px 0;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
    display: flex;
    justify-content: space-between;
  }
  .schedina-list .entry:last-child { border-bottom: none; }
  .schedina-list .entry .remove-btn {
    color: var(--lose);
    cursor: pointer;
    margin-left: 8px;
  }
  .tab-header { 
    padding: 4px 12px; 
    border-radius: 6px; 
    margin-bottom: 6px; 
    text-align: center; 
    color: #fff; 
    font-weight: bold; 
    font-size: 13px; 
    display: inline-block;
  }
  .match-info { 
    text-align: center; 
    color: var(--text-muted); 
    font-size: 12px; 
    margin-bottom: 6px; 
  }
  .teams-row { 
    display: flex; 
    justify-content: space-around; 
    align-items: center; 
    padding: 8px 0; 
  }
  .team { 
    display: flex; 
    flex-direction: column; 
    align-items: center; 
    gap: 4px; 
    flex: 1;
  }
  .team-name { 
    font-weight: bold; 
    font-size: 20px;
    text-align: center;
  }
  .vs { 
    font-size: 18px; 
    color: var(--accent); 
    font-weight: bold; 
    padding: 0 8px;
  }
  .form-row-compact {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 10px;
    margin-bottom: 6px;
  }
  .form-block-compact { 
    text-align: center;
    padding: 8px 6px;
    background: var(--surface);
    border-radius: 6px;
  }
  .form-block-compact .form-label { 
    font-size: 10px; 
    color: var(--text-muted); 
    margin-bottom: 4px;
    text-transform: uppercase;
    font-weight: 600;
  }
  .form-squares {
    display: flex;
    justify-content: center;
    gap: 3px;
    margin-bottom: 4px;
    min-height: 20px;
  }
  .form-square {
    width: 22px;
    height: 22px;
    border-radius: 3px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    font-size: 12px;
    color: #000;
  }
  .form-square-V { background: var(--win); }
  .form-square-P { background: var(--draw); }
  .form-square-S { background: var(--lose); }
  .form-pct-compact {
    font-size: 22px;
    font-weight: bold;
    color: var(--accent);
    line-height: 1;
  }
  .form-bar { 
    height: 6px; 
    background: var(--card); 
    border-radius: 3px; 
    overflow: hidden; 
    margin-top: 4px;
  }
  .form-bar-fill { 
    height: 100%; 
    background: linear-gradient(90deg, var(--win), var(--accent)); 
    transition: width 0.3s; 
  }
  .form-diff {
    text-align: center;
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 4px;
  }
  .form-diff span {
    font-weight: bold;
    color: var(--accent);
  }
  .bet-row {
    display: flex;
    justify-content: space-around;
    gap: 6px;
    margin-top: 8px;
    flex-wrap: wrap;
  }
  .bet-item {
    background: var(--surface);
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 12px;
    border: 1px solid var(--border);
    text-align: center;
    flex: 1;
    min-width: 70px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .bet-item:hover { background: var(--card); }
  .bet-item .bet-label {
    color: var(--text-muted);
    font-size: 10px;
    text-transform: uppercase;
  }
  .bet-item .bet-value {
    font-weight: bold;
    color: var(--accent);
    font-size: 14px;
  }
  .match-tab-history {
    background: var(--card);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 0;
    border: 1px solid var(--border);
    border-left-width: 6px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.4);
    flex: 1;
    min-width: 340px;
    max-width: 420px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .match-tab-history:hover {
    transform: translateY(-3px);
    box-shadow: 0 6px 16px rgba(0,0,0,0.6);
  }
  .match-tab-history .teams-row {
    display: flex;
    justify-content: space-around;
    align-items: center;
    padding: 4px 0;
  }
  .match-tab-history .score {
    font-size: 24px;
    font-weight: bold;
    padding: 0 12px;
  }
  .match-tab-history .score-win { color: var(--win); }
  .match-tab-history .score-draw { color: var(--draw); }
  .match-tab-history .score-loss { color: var(--lose); }
  .standings-table-wrap {
    overflow-x: auto;
  }
  .standings-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  .standings-table th {
    background: var(--surface);
    color: var(--text-muted);
    padding: 8px 6px;
    text-align: left;
    border-bottom: 2px solid var(--border);
    font-weight: 600;
    text-transform: uppercase;
    font-size: 11px;
    white-space: nowrap;
  }
  .standings-table td {
    padding: 6px 6px;
    border-bottom: 1px solid var(--border);
  }
  .standings-table tr.highlighted td {
    background: var(--accent) !important;
    color: #000 !important;
    font-weight: bold;
  }
  .standings-table tr:hover td { background: var(--card); }
  .standings-table .pos {
    font-weight: bold;
    color: var(--accent);
    text-align: center;
  }
  .standings-table .team-name { font-weight: bold; }
  .standings-table .num { text-align: center; }
  .standings-table .points {
    font-weight: bold;
    color: var(--accent);
    text-align: center;
  }
  .sub-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .sub-tabs button {
    padding: 8px 16px;
    background: var(--surface);
    color: var(--text-muted);
    border: 1px solid var(--border);
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
  }
  .sub-tabs button.active {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
  }
  .detail-section { margin-bottom: 20px; }
  .detail-section h4 {
    color: var(--accent);
    margin-bottom: 10px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 6px;
    font-size: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .detail-stat-box {
    padding: 12px 8px;
    border-radius: 8px;
    text-align: center;
    border: 1px solid var(--border);
    background: var(--surface);
    color: #fff;
    transition: background 0.2s, transform 0.1s;
    min-width: 60px;
    flex: 1;
    cursor: pointer;
  }
  .detail-stat-box:hover { transform: scale(1.02); }
  .detail-stat-box .label {
    display: block;
    font-size: 20px;
    font-weight: 600;
    color: #fff;
    margin-bottom: 2px;
  }
  .detail-stat-box .value {
    display: block;
    font-size: 20px;
    font-weight: bold;
    color: #fff;
  }
  .detail-stat-box .bomb-icon {
    display: inline-block;
    font-size: 20px;
    animation: bomb-bounce 0.8s infinite ease-in-out;
    transform-origin: center;
    margin-left: 4px;
  }
  .detail-stat-box.flag-red { background: var(--lose); }
  .detail-stat-box.flag-neutral { background: #6c757d; }
  .detail-stat-box.flag-green { background: var(--win); }
  .detail-stat-box.flag-gold { background: var(--accent); color: #000; }
  .detail-stat-box.flag-gold .label,
  .detail-stat-box.flag-gold .value { color: #000; }
  .detail-stat-box.flag-bomb { 
    background: var(--accent); 
    color: #000;
    animation: bomb-glow 1s infinite alternate;
  }
  .detail-stat-box.flag-bomb .label,
  .detail-stat-box.flag-bomb .value { color: #000; }
  @keyframes bomb-bounce {
    0% { transform: scale(1) rotate(0deg); }
    50% { transform: scale(1.3) rotate(10deg); }
    100% { transform: scale(1) rotate(0deg); }
  }
  @keyframes bomb-glow {
    0% { box-shadow: 0 0 8px var(--accent); }
    100% { box-shadow: 0 0 30px #ffaa00; }
  }
  .detail-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 6px;
  }
  .detail-row .detail-stat-box { flex: 1; min-width: 60px; }
  .opponents-row {
    display: flex;
    flex-wrap: wrap;
    justify-content: space-between;
    gap: 12px;
    margin: 8px 0;
  }
  .opponents-col {
    flex: 1;
    min-width: 120px;
    background: var(--surface);
    padding: 8px;
    border-radius: 6px;
  }
  .opponents-col .opp-item {
    font-size: 12px;
    padding: 2px 0;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .opponents-col .opp-item:last-child { border-bottom: none; }
  .opp-result-indicator {
    display: inline-block;
    width: 14px;
    height: 14px;
    border-radius: 3px;
    margin-right: 4px;
    vertical-align: middle;
  }
  .opp-result-indicator.win { background: var(--win); }
  .opp-result-indicator.draw { background: var(--draw); }
  .opp-result-indicator.loss { background: var(--lose); }
  .opp-form-pct {
    font-size: 24px;
    font-weight: bold;
    color: var(--accent);
    text-align: center;
    margin-top: 6px;
  }
  .opp-form-bar {
    height: 8px;
    background: var(--card);
    border-radius: 4px;
    overflow: hidden;
    margin-top: 4px;
  }
  .opp-form-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--win), var(--accent));
    transition: width 0.3s;
  }
  .stats-two-col {
    display: grid;
    grid-template-columns: 1fr 1.2fr;
    gap: 20px;
  }
  @media (max-width: 768px) { .stats-two-col { grid-template-columns: 1fr; } }
  .stats-placeholder {
    text-align: center;
    padding: 40px;
    color: var(--text-muted);
    font-size: 16px;
  }
  .ai-analysis-box {
    background: var(--surface);
    padding: 14px 16px;
    border-radius: 8px;
    margin-top: 16px;
    border-left: 4px solid var(--accent);
  }
  .ai-analysis-box h4 {
    color: var(--accent);
    margin: 8px 0 4px;
    font-size: 14px;
  }
  .ai-analysis-box p {
    font-size: 13px;
    line-height: 1.5;
    margin-bottom: 6px;
  }
  .ai-analysis-box .pronostico-mini {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    background: var(--card);
    padding: 10px;
    border-radius: 6px;
    margin-top: 6px;
  }
  .ai-analysis-box .pronostico-mini .item {
    flex: 1;
    min-width: 70px;
    text-align: center;
  }
  .ai-analysis-box .pronostico-mini .item .label {
    font-size: 10px;
    color: var(--text-muted);
    text-transform: uppercase;
  }
  .ai-analysis-box .pronostico-mini .item .value {
    font-size: 18px;
    font-weight: bold;
    color: var(--accent);
  }
  .ai-analysis-box .consigli-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    margin-top: 6px;
  }
  @media (max-width: 768px) { .ai-analysis-box .consigli-grid { grid-template-columns: 1fr; } }
  .ai-analysis-box .consiglio-card {
    background: var(--card);
    padding: 8px;
    border-radius: 6px;
    border: 1px solid var(--border);
  }
  .ai-analysis-box .consiglio-card .tipo {
    font-size: 10px;
    text-transform: uppercase;
    color: var(--text-muted);
  }
  .ai-analysis-box .consiglio-card .giocata {
    font-size: 14px;
    font-weight: bold;
    margin: 2px 0;
  }
  .ai-analysis-box .consiglio-card .percentuale {
    font-size: 22px;
    font-weight: bold;
    color: var(--accent);
    display: inline-block;

const getChampColor = (champName) => {
  if (!champName) return '#95a5a6';
  for (const [key, color] of Object.entries(CHAMPIONSHIP_COLORS)) {
    if (champName.toLowerCase().includes(key.toLowerCase()) || key.toLowerCase().includes(champName.toLowerCase())) {
      return color;
    }
  }
  let hash = 0;
  for (let i = 0; i < champName.length; i++) {
    hash = champName.charCodeAt(i) + ((hash << 5) - hash);
  }
  const hue = Math.abs(hash) % 360;
  return `hsl(${hue}, 65%, 50%)`;
};

  for (const [key, city] of Object.entries(CITTÀ_PER_CAMPIONATO)) {

const formatDateEU = (dateStr) => {
  if (!dateStr) return 'N/D';
  if (typeof dateStr === 'string' && dateStr.match(/^\d{4}-\d{2}-\d{2}/)) {
    const [y, m, d] = dateStr.split('-');
    const year = parseInt(y);
    if (year < 1900 || year > 2100) return 'N/D';
    return `${d}/${m}/${y}`;
  }
  const date = new Date(dateStr);
  if (isNaN(date.getTime())) return 'N/D';
  const year = date.getFullYear();
  if (year < 1900 || year > 2100) return 'N/D';
  const day = String(date.getDate()).padStart(2, '0');
  const month = String(date.getMonth() + 1).padStart(2, '0');
  return `${day}/${month}/${year}`;
};

const filterNext6Days = (matches) => {
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const sixDaysLater = new Date(today);
  sixDaysLater.setDate(sixDaysLater.getDate() + 6);
  
  return matches.filter(m => {
    if (!m.data) return false;
    const matchDate = new Date(m.data);
    if (isNaN(matchDate.getTime())) return false;
    matchDate.setHours(0, 0, 0, 0);
    return matchDate >= today && matchDate <= sixDaysLater;
  }).sort((a, b) => new Date(a.data + ' ' + a.ora) - new Date(b.data + ' ' + b.ora));
};

    return `${days[d.getDay()]} ${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
  };

// FUNZIONI DI CALCOLO
// ============================================================
const calcFormAndStats = (matches, teamName) => {
  const played = matches.filter(m => m.stato === 'Giocata' && (m.casa === teamName || m.ospiti === teamName))
    .sort((a,b) => new Date(b.data+' '+b.ora) - new Date(a.data+' '+a.ora))
    .slice(0, 5);
  let form = '', points = 0;
  played.forEach(m => {
    if (m.casa === teamName) {
      const r = m.golCasa > m.golOspite ? 'V' : (m.golCasa === m.golOspite ? 'P' : 'S');
      form += r;
      if (r === 'V') points += 3; else if (r === 'P') points += 1;
    } else {
      const r = m.golOspite > m.golCasa ? 'V' : (m.golOspite === m.golCasa ? 'P' : 'S');
      form += r;
      if (r === 'V') points += 3; else if (r === 'P') points += 1;
    }
  });
  return { form: form || '-----', pct: played.length ? Math.round((points / (played.length * 3)) * 100) : 50 };
};

const calcTeamMG = (matches, teamName) => {
  const played = matches.filter(m => m.stato === 'Giocata' && (m.casa === teamName || m.ospiti === teamName));
  if (!played.length) return '0.0-0.0';
  let scored = 0, conceded = 0;
  played.forEach(m => {
    if (m.casa === teamName) { scored += m.golCasa; conceded += m.golOspite; }
    else { scored += m.golOspite; conceded += m.golCasa; }
  });
  return `${(scored/played.length).toFixed(1)}-${(conceded/played.length).toFixed(1)}`;
};

// Funzione che restituisce la fascia più frequente, ma con etichetta "Over 1,5" al posto di "2-4"
const getMostFrequentGoalRange = (teamName, allMatches) => {
  const matches = allMatches.filter(m => m.stato === 'Giocata' && (m.casa === teamName || m.ospiti === teamName));
  if (matches.length === 0) return { label: 'N/A', pct: 0 };
  
  const goals = matches.map(m => (m.casa === teamName) ? m.golCasa : m.golOspite);
  const total = goals.length;
  
  let freq = {0:0, 1:0, 2:0, ge3:0};
  goals.forEach(g => {
    if (g === 0) freq[0]++;
    else if (g === 1) freq[1]++;
    else if (g === 2) freq[2]++;
    else freq.ge3++;
  });
  
  let maxCount = 0;
  let maxKey = '0';
  for (let key in freq) {
    if (freq[key] > maxCount) {
      maxCount = freq[key];
      maxKey = key;
    }
  }
  
  let label, rangePct;
  if (maxKey === '0') {
    label = '0-1';
    rangePct = goals.filter(g => g <= 1).length / total * 100;
  } else if (maxKey === '1') {
    label = '0-2';
    rangePct = goals.filter(g => g <= 2).length / total * 100;
  } else if (maxKey === '2') {
    label = 'Over 1,5';
    rangePct = goals.filter(g => g >= 2 && g <= 4).length / total * 100;
  } else {
    label = 'Over 1,5';
    rangePct = goals.filter(g => g >= 2).length / total * 100;
  }
  
  return { label, pct: Math.round(rangePct) };
};

// Calcola la migliore "Libera" tra tutte le combo approvate
const getBestFreeCombo = (stats, homeMG, awayMG, mgTot) => {
  if (stats.error) return { label: 'N/A', pct: 0 };
  
  const { p1X, p12, pX2, underOver } = stats;
  const over15 = underOver[0].over;
  const under35 = underOver[2].under;
  
  const candidates = [];
  
  // Singole
  candidates.push({ label: '1X', pct: p1X });
  candidates.push({ label: '12', pct: p12 });
  candidates.push({ label: 'X2', pct: pX2 });
  candidates.push({ label: 'Over 1.5', pct: over15 });
  candidates.push({ label: 'Under 3.5', pct: under35 });
  
  // Multigol Totale
  for (const [label, pct] of Object.entries(mgTot)) {
    let displayLabel = label === '2-4' ? 'Over 1,5' : label;
    candidates.push({ label: `MG Tot ${displayLabel}`, pct });
  }
  
  // Multigol Casa
  for (const [label, pct] of Object.entries(homeMG)) {
    let displayLabel = label === '2-4' ? 'Over 1,5' : label;
    candidates.push({ label: `MG Casa ${displayLabel}`, pct });
  }
  
  // Multigol Ospite
  for (const [label, pct] of Object.entries(awayMG)) {
    let displayLabel = label === '2-4' ? 'Over 1,5' : label;
    candidates.push({ label: `MG Ospite ${displayLabel}`, pct });
  }
  
  // DC + Over 1.5
  candidates.push({ label: '1X+Over1.5', pct: (p1X + over15) / 2 });
  candidates.push({ label: '12+Over1.5', pct: (p12 + over15) / 2 });
  candidates.push({ label: 'X2+Over1.5', pct: (pX2 + over15) / 2 });
  
  // DC + Under 3.5
  candidates.push({ label: '1X+Under3.5', pct: (p1X + under35) / 2 });
  candidates.push({ label: '12+Under3.5', pct: (p12 + under35) / 2 });
  candidates.push({ label: 'X2+Under3.5', pct: (pX2 + under35) / 2 });
  
  // DC + Multigol Totale
  for (const [mgLabel, mgPct] of Object.entries(mgTot)) {
    let displayLabel = mgLabel === '2-4' ? 'Over 1,5' : mgLabel;
    candidates.push({ label: `1X+MG Tot ${displayLabel}`, pct: (p1X + mgPct) / 2 });
    candidates.push({ label: `12+MG Tot ${displayLabel}`, pct: (p12 + mgPct) / 2 });
    candidates.push({ label: `X2+MG Tot ${displayLabel}`, pct: (pX2 + mgPct) / 2 });
  }
  
  // Multigol Casa + Multigol Ospite
  for (const [homeLabel, homePct] of Object.entries(homeMG)) {
    for (const [awayLabel, awayPct] of Object.entries(awayMG)) {
      let displayHome = homeLabel === '2-4' ? 'Over 1,5' : homeLabel;
      let displayAway = awayLabel === '2-4' ? 'Over 1,5' : awayLabel;
      candidates.push({
        label: `MG Casa ${displayHome} + MG Ospite ${displayAway}`,
        pct: (homePct + awayPct) / 2
      });
    }
  }
  
  let best = candidates.reduce((a, b) => a.pct > b.pct ? a : b);
  best.pct = Math.round(best.pct);
  return best;
};

const computeMatchStats = (match, allMatches) => {
  const homeTeam = match.casa;
  const awayTeam = match.ospiti;
  
  const homeGames = allMatches.filter(m => m.stato === 'Giocata' && (m.casa === homeTeam || m.ospiti === homeTeam));
  const awayGames = allMatches.filter(m => m.stato === 'Giocata' && (m.casa === awayTeam || m.ospiti === awayTeam));
  const totalGames = homeGames.length + awayGames.length;
  
  if (totalGames === 0) {
    return { error: 'Nessuna partita giocata per queste squadre.' };
  }
  
  const getTeamStats = (team, games) => {
    let wins = 0, draws = 0, losses = 0;
    let goalsScored = 0, goalsConceded = 0;
    games.forEach(g => {
      const isHome = g.casa === team;
      const teamGoals = isHome ? g.golCasa : g.golOspite;
      const oppGoals = isHome ? g.golOspite : g.golCasa;
      goalsScored += teamGoals;
      goalsConceded += oppGoals;
      if (teamGoals > oppGoals) wins++;
      else if (teamGoals === oppGoals) draws++;
      else losses++;
    });
    return { wins, draws, losses, goalsScored, goalsConceded, played: games.length };
  };
  
  const homeStats = getTeamStats(homeTeam, homeGames);
  const awayStats = getTeamStats(awayTeam, awayGames);
  
  const p1 = (homeStats.wins + awayStats.losses) / totalGames * 100;
  const pX = (homeStats.draws + awayStats.draws) / totalGames * 100;
  const p2 = (homeStats.losses + awayStats.wins) / totalGames * 100;
  
  const p1X = p1 + pX;
  const p12 = p1 + p2;
  const pX2 = pX + p2;
  
  const allGamesForGoals = [...homeGames, ...awayGames];
  const goalTotals = allGamesForGoals.map(g => g.golCasa + g.golOspite);
  const thresholds = [1.5, 2.5, 3.5, 4.5];
  const underOver = thresholds.map(t => {
    const over = goalTotals.filter(gt => gt > t).length / goalTotals.length * 100;
    const under = 100 - over;
    return { threshold: t, under, over };
  });
  
  const getMultigolV2 = (team, games) => {
    const goals = games.map(g => (g.casa === team) ? g.golCasa : g.golOspite);
    const total = goals.length;
    const count = (pred) => goals.filter(pred).length / total * 100;
    return {
      '0-1': count(g => g <= 1),
      '0-2': count(g => g <= 2),
      '1-3': count(g => g >= 1 && g <= 3),
      '2-4': count(g => g >= 2 && g <= 4),
    };
  };
  
  const homeMG = getMultigolV2(homeTeam, homeGames);
  const awayMG = getMultigolV2(awayTeam, awayGames);
  
  const totalGoals = allGamesForGoals.map(g => g.golCasa + g.golOspite);
  const mgTot = {
    '1-4': totalGoals.filter(g => g >= 1 && g <= 4).length / totalGoals.length * 100,
    '2-4': totalGoals.filter(g => g >= 2 && g <= 4).length / totalGoals.length * 100,
    '2-5': totalGoals.filter(g => g >= 2 && g <= 5).length / totalGoals.length * 100,
    '3-6': totalGoals.filter(g => g >= 3 && g <= 6).length / totalGoals.length * 100,
  };
  
  return {
    p1, pX, p2,
    p1X, p12, pX2,
    underOver,
    homeMG, awayMG,
    mgTot,
    homeGames, awayGames,
    homeStats, awayStats,
    totalGames
  };
};

const getTeamMultigolV2 = (allMatches, teamName) => {
  const games = allMatches.filter(m => m.stato === 'Giocata' && (m.casa === teamName || m.ospiti === teamName));
  if (!games.length) return { '0-1': 0, '0-2': 0, '1-3': 0, '2-4': 0 };
  const goals = games.map(g => (g.casa === teamName) ? g.golCasa : g.golOspite);
  const total = goals.length;
  const count = (pred) => goals.filter(pred).length / total * 100;
  return {
    '0-1': count(g => g <= 1),
    '0-2': count(g => g <= 2),
    '1-3': count(g => g >= 1 && g <= 3),
    '2-4': count(g => g >= 2 && g <= 4),
  };
};

const getTeamUnderOver = (allMatches, teamName) => {
  const games = allMatches.filter(m => m.stato === 'Giocata' && (m.casa === teamName || m.ospiti === teamName));
  if (!games.length) return {};
  const goals = games.map(g => (g.casa === teamName) ? g.golCasa : g.golOspite);
  const thresholds = [1.5, 2.5, 3.5, 4.5];
  const result = {};
  thresholds.forEach(t => {
    const over = goals.filter(g => g > t).length / goals.length * 100;
    const under = 100 - over;
    result[`Under ${t}`] = under;
    result[`Over ${t}`] = over;
  });
  return result;
};

const get12Under45 = (allMatches, homeTeam, awayTeam) => {
  const homeGames = allMatches.filter(m => m.stato === 'Giocata' && (m.casa === homeTeam || m.ospiti === homeTeam));
  const awayGames = allMatches.filter(m => m.stato === 'Giocata' && (m.casa === awayTeam || m.ospiti === awayTeam));
  const allGames = Array.from(new Map([...homeGames, ...awayGames].map(g => [g.id, g])).values());
  if (!allGames.length) return 0;
  const count = allGames.filter(g => {
    const total = g.golCasa + g.golOspite;
    return g.golCasa !== g.golOspite && total < 4.5;
  }).length;
  return (count / allGames.length) * 100;
};

const fetchSofaScoreMatches = async (leagueId, seasonId) => {
  try {
    // Prima ottieni le stagioni disponibili
    const seasonsRes = await fetch(
      `https://api.sofascore.com/api/v1/unique-tournament/${leagueId}/seasons`
    );
    if (!seasonsRes.ok) throw new Error('Errore nel recupero stagioni');
    const seasonsData = await seasonsRes.json();
    
    let targetSeasonId = seasonId;
    if (!targetSeasonId && seasonsData.seasons && seasonsData.seasons.length > 0) {
      targetSeasonId = seasonsData.seasons[0].id;
    }
    
    if (!targetSeasonId) throw new Error('Nessuna stagione disponibile');
    
    const matchesRes = await fetch(
      `https://api.sofascore.com/api/v1/unique-tournament/${leagueId}/season/${targetSeasonId}/events/round/all`
    );
    if (!matchesRes.ok) throw new Error('Errore nel recupero partite');
    const matchesData = await matchesRes.json();
    
    return matchesData.events || [];
  } catch (e) {
    console.error('Errore fetch SofaScore:', e);
    return [];
  }
};

const Standings = ({ matches, filterChampionship, highlightTeams = [] }) => {
  const [view, setView] = useState('generale');
  
  let filtered = matches;
  if (filterChampionship && filterChampionship !== 'Tutti') {
    filtered = filtered.filter(m => m.campionato === filterChampionship);
  }
  filtered = filtered.filter(m => m.stato === 'Giocata');
  
  if (filtered.length === 0) {
    return <div className="empty-state">Nessuna partita giocata per questo campionato.</div>;
  }
  
  const teamStats = {};
  const addGame = (team, isHome, golFatti, golSubiti) => {
    if (!teamStats[team]) {
      teamStats[team] = { 
        pg: 0, punti: 0, v: 0, p: 0, s: 0, gf: 0, gs: 0, 
        dr: 0, xG: 0, mediaGol: 0 
      };
    }
    const t = teamStats[team];
    t.pg++;
    t.gf += golFatti;
    t.gs += golSubiti;
    if (golFatti > golSubiti) {
      t.v++;
      t.punti += 3;
    } else if (golFatti === golSubiti) {
      t.p++;
      t.punti += 1;
    } else {
      t.s++;
    }
  };
  
  filtered.forEach(m => {
    if (view === 'generale') {
      addGame(m.casa, true, m.golCasa, m.golOspite);
      addGame(m.ospiti, false, m.golOspite, m.golCasa);
    } else if (view === 'casa') {
      addGame(m.casa, true, m.golCasa, m.golOspite);
    } else if (view === 'ospite') {
      addGame(m.ospiti, false, m.golOspite, m.golCasa);
    }
  });
  
  Object.values(teamStats).forEach(t => {
    t.dr = t.gf - t.gs;
    t.mediaGol = t.pg > 0 ? t.gf / t.pg : 0;
    t.xG = t.pg > 0 ? (t.gf / t.pg) * 0.9 : 0;
  });
  
  const sorted = Object.entries(teamStats)
    .sort((a, b) => {
      if (b[1].punti !== a[1].punti) return b[1].punti - a[1].punti;
      if (b[1].dr !== a[1].dr) return b[1].dr - a[1].dr;
      return b[1].gf - a[1].gf;
    })
    .map(([name, stats], index) => ({ pos: index + 1, name, ...stats }));
  
  return (
    <div>
      <div className="sub-tabs">
        <button className={view === 'generale' ? 'active' : ''} onClick={() => setView('generale')}>Generale</button>
        <button className={view === 'casa' ? 'active' : ''} onClick={() => setView('casa')}>Casa</button>
        <button className={view === 'ospite' ? 'active' : ''} onClick={() => setView('ospite')}>Ospite</button>
      </div>
      
      <div className="standings-table-wrap">
        <table className="standings-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Squadra</th>
              <th className="num">PG</th>
              <th className="num">Punti</th>
              <th className="num">V</th>
              <th className="num">P</th>
              <th className="num">S</th>
              <th className="num">GF</th>
              <th className="num">GS</th>
              <th className="num">DR</th>
              <th className="num">xG</th>
              <th className="num">Media Gol</th>
            </tr>
          </thead>
          <tbody>
            {sorted.map(row => {
              const isHighlighted = highlightTeams.includes(row.name);
              return (
                <tr key={row.name} className={isHighlighted ? 'highlighted' : ''}>
                  <td className="pos">{row.pos}</td>
                  <td className="team-name">{row.name}</td>
                  <td className="num">{row.pg}</td>
                  <td className="points">{row.punti}</td>
                  <td className="num">{row.v}</td>
                  <td className="num">{row.p}</td>
                  <td className="num">{row.s}</td>
                  <td className="num">{row.gf}</td>
                  <td className="num">{row.gs}</td>
                  <td className="num">{row.dr > 0 ? '+' : ''}{row.dr}</td>
                  <td className="num">{row.xG.toFixed(2)}</td>
                  <td className="num">{row.mediaGol.toFixed(2)}</td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
};

const AIAnalysis = ({ match, allMatches, apiKeys, setTab }) => {
  const [analysis, setAnalysis] = useState(null);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const [weatherData, setWeatherData] = useState(null);
  const [injuriesData, setInjuriesData] = useState(null);
  const [standingsData, setStandingsData] = useState(null);
  const [isRefreshing, setIsRefreshing] = useState(false);
  
  const fetchWeather = async (city, matchDate) => {
    const apiKey = apiKeys['OpenWeatherMap'];
    if (!apiKey || !city) return null;
    try {
      const r = await fetch(
        `https://api.openweathermap.org/data/2.5/forecast?q=${encodeURIComponent(city)}&units=metric&appid=${apiKey}`
      );
      if (!r.ok) return null;
      const data = await r.json();
      const matchDay = new Date(matchDate);
      matchDay.setHours(0,0,0,0);
      const forecasts = data.list.filter(item => {
        const dt = new Date(item.dt * 1000);
        dt.setHours(0,0,0,0);
        return dt.getTime() === matchDay.getTime();
      });
      if (forecasts.length === 0) return null;
      const forecast = forecasts[0];
      return {
        temp: forecast.main.temp,
        temp_min: forecast.main.temp_min,
        temp_max: forecast.main.temp_max,
        weather: forecast.weather[0].description,
        wind_speed: forecast.wind.speed,
        rain: forecast.rain ? forecast.rain['3h'] : 0,
        snow: forecast.snow ? forecast.snow['3h'] : 0,
      };
    } catch (e) { return null; }
  };
  
  const fetchInjuries = async (teamName) => {
    const apiKey = apiKeys['API-Football'];
    if (!apiKey) return null;
    try {
      const r = await fetch(`https://v3.football.api-sports.io/injuries?team=${encodeURIComponent(teamName)}`, {
        headers: { 'x-apisports-key': apiKey }
      });
      if (!r.ok) return null;
      const data = await r.json();
      return data.response || [];
    } catch (e) { return null; }
  };
  
  const getStandings = (teamName, championship) => {
    const matchesFiltered = allMatches.filter(m => m.campionato === championship && m.stato === 'Giocata');
    if (matchesFiltered.length === 0) return null;
    const teamStats = {};
    const addGame = (team, isHome, golFatti, golSubiti) => {
      if (!teamStats[team]) {
        teamStats[team] = { pg: 0, punti: 0, v: 0, p: 0, s: 0, gf: 0, gs: 0 };
      }
      const t = teamStats[team];
      t.pg++;
      t.gf += golFatti;
      t.gs += golSubiti;
      if (golFatti > golSubiti) {
        t.v++;
        t.punti += 3;
      } else if (golFatti === golSubiti) {
        t.p++;
        t.punti += 1;
      } else {
        t.s++;
      }
    };
    matchesFiltered.forEach(m => {
      addGame(m.casa, true, m.golCasa, m.golOspite);
      addGame(m.ospiti, false, m.golOspite, m.golCasa);
    });
    const sorted = Object.entries(teamStats)
      .sort((a, b) => {
        if (b[1].punti !== a[1].punti) return b[1].punti - a[1].punti;
        if (b[1].gf - b[1].gs !== a[1].gf - a[1].gs) return (b[1].gf - b[1].gs) - (a[1].gf - a[1].gs);
        return b[1].gf - a[1].gf;
      })
      .map(([name, stats], index) => ({ pos: index + 1, name, ...stats }));
    const teamPos = sorted.find(s => s.name === teamName);
    return teamPos ? { pos: teamPos.pos, punti: teamPos.punti, pg: teamPos.pg } : null;
  };
  
  useEffect(() => {
    if (!match) return;
    const storageKey = `ft_ai_${match.id}`;
    const saved = localStorage.getItem(storageKey);
    if (saved) {
      try {
        const parsed = JSON.parse(saved);
        setAnalysis(parsed.analysis || null);
        setWeatherData(parsed.weatherData || null);
        setInjuriesData(parsed.injuriesData || null);
        setStandingsData(parsed.standingsData || null);
        setError(null);
        return;
      } catch (e) {}
    }
    generateAnalysis();
  }, [match]);
  
  const generateAnalysis = async (forceRefresh = false) => {
    if (!match) return;
    if (!apiKeys['GROQ']) {
      setError('🔑 Chiave API GROQ non configurata');
      setLoading(false);
      return;
    }
    
    setLoading(true);
    setError(null);
    setIsRefreshing(true);
    
    try {
      const stats = computeMatchStats(match, allMatches);
      if (stats.error) {
        setError(stats.error);
        setLoading(false);
        setIsRefreshing(false);
        return;
      }
      const homeForm = calcFormAndStats(allMatches, match.casa);
      const awayForm = calcFormAndStats(allMatches, match.ospiti);
      const homeMG = calcTeamMG(allMatches, match.casa);
      const awayMG = calcTeamMG(allMatches, match.ospiti);
      const pct12Under45 = get12Under45(allMatches, match.casa, match.ospiti);
      const is12Under45Good = pct12Under45 >= 70;
      
      const city = getCittaFromChampionship(match.campionato);
      let weather = null;
      if (city && apiKeys['OpenWeatherMap']) {
        weather = await fetchWeather(city, match.data);
        setWeatherData(weather);
      }
      
      let injuries = null;
      if (apiKeys['API-Football']) {
        const injHome = await fetchInjuries(match.casa);
        const injAway = await fetchInjuries(match.ospiti);
        if (injHome || injAway) {
          injuries = { home: injHome || [], away: injAway || [] };
        }
        setInjuriesData(injuries);
      }
      
      const standingHome = getStandings(match.casa, match.campionato);
      const standingAway = getStandings(match.ospiti, match.campionato);
      const standings = { home: standingHome, away: standingAway };
      setStandingsData(standings);
      
      let meteoSection = '';
      if (weather) {
        meteoSection = `
🌤️ Condizioni meteo previste per ${city} il giorno della partita:
- Temperatura: ${weather.temp}°C (min ${weather.temp_min}°C, max ${weather.temp_max}°C)
- Condizioni: ${weather.weather}
- Vento: ${weather.wind_speed} m/s
- Pioggia: ${weather.rain ? weather.rain + ' mm' : 'nessuna'}
- Neve: ${weather.snow ? weather.snow + ' mm' : 'nessuna'}

💡 Impatto sul gioco:
${weather.rain > 0 ? '🔴 Pioggia: campo scivoloso, favorisce il gioco corto e i contrasti.' : '✅ Meteo favorevole per un calcio spettacolare.'}
${weather.wind_speed > 5 ? '💨 Vento forte: può influenzare i lanci lunghi e i calci piazzati.' : ''}
${weather.temp > 30 ? '🔥 Caldo intenso: potrebbe affaticare i giocatori, favorendo le sostituzioni.' : ''}
${weather.temp < 5 ? '❄️ Freddo: potrebbe rallentare il gioco, favorire il possesso palla.' : ''}
`;
      } else {
        meteoSection = 'Dati meteo non disponibili.';
      }
      
      let injuriesSection = '';
      if (injuries && (injuries.home.length > 0 || injuries.away.length > 0)) {
        injuriesSection = '⚠️ Infortuni e squalifiche:\n';
        if (injuries.home.length > 0) {
          injuriesSection += `  ${match.casa}: ${injuries.home.map(i => `${i.player.name} (${i.status})`).join(', ')}\n`;
        }
        if (injuries.away.length > 0) {
          injuriesSection += `  ${match.ospiti}: ${injuries.away.map(i => `${i.player.name} (${i.status})`).join(', ')}\n`;
        }
      } else {
        injuriesSection = 'Nessuna informazione su infortuni/squalifiche.';
      }
      
      let standingsSection = '';
      if (standings.home) {
        standingsSection = `🏆 Classifica in campionato:\n- ${match.casa}: ${standings.home.pos}° posto (${standings.home.punti} punti, ${standings.home.pg} partite)\n- ${match.ospiti}: ${standings.away ? standings.away.pos + '° posto (' + standings.away.punti + ' punti, ' + standings.away.pg + ' partite)' : 'N/A'}`;
      } else {
        standingsSection = 'Classifica non disponibile.';
      }
      
      const prompt = `Analizza la partita ${match.casa} vs ${match.ospiti} (${match.campionato} - Giornata: ${match.round}) del ${match.data} alle ${match.ora}.

Dati statistici:
- Forma Casa (ultime 5): ${homeForm.form} (${homeForm.pct}%)
- Forma Ospite: ${awayForm.form} (${awayForm.pct}%)
- Differenza forma: ${Math.abs(homeForm.pct - awayForm.pct)}%
- Media Gol Casa: ${homeMG} - Media Gol Ospite: ${awayMG}
- 1X2: 1=${Math.round(stats.p1)}% X=${Math.round(stats.pX)}% 2=${Math.round(stats.p2)}%
- Doppia Chance: 1X=${Math.round(stats.p1X)}% 12=${Math.round(stats.p12)}% X2=${Math.round(stats.pX2)}%
- Under/Over 1.5: U=${Math.round(stats.underOver[0].under)}% O=${Math.round(stats.underOver[0].over)}%
- Under/Over 2.5: U=${Math.round(stats.underOver[1].under)}% O=${Math.round(stats.underOver[1].over)}%
- Under/Over 3.5: U=${Math.round(stats.underOver[2].under)}% O=${Math.round(stats.underOver[2].over)}%
- Under/Over 4.5: U=${Math.round(stats.underOver[3].under)}% O=${Math.round(stats.underOver[3].over)}%
- Multigol Casa: 0-1=${Math.round(stats.homeMG['0-1'])}% 0-2=${Math.round(stats.homeMG['0-2'])}% 1-3=${Math.round(stats.homeMG['1-3'])}% Over 1,5=${Math.round(stats.homeMG['2-4'])}%
- Multigol Ospite: 0-1=${Math.round(stats.awayMG['0-1'])}% 0-2=${Math.round(stats.awayMG['0-2'])}% 1-3=${Math.round(stats.awayMG['1-3'])}% Over 1,5=${Math.round(stats.awayMG['2-4'])}%
- Multigol Totale: 1-4=${Math.round(stats.mgTot['1-4'])}% Over 1,5=${Math.round(stats.mgTot['2-4'])}% 2-5=${Math.round(stats.mgTot['2-5'])}% 3-6=${Math.round(stats.mgTot['3-6'])}%

${meteoSection}

${injuriesSection}

${standingsSection}

Sulla base di questi dati, genera un'analisi dettagliata in formato JSON con la seguente struttura:
{
  "panoramica": "Analisi dello stato di forma e probabile andamento",
  "impatto_assenze": "Valutazione degli assenti e impatto sulla squadra",
  "fattore_meteo_campo": "Come il meteo e il campo potrebbero influenzare il gioco",
  "chiavi_tattiche": "Aspetti tattici da tenere d'occhio",
  "pronostico": {
    "esito_1X2": "1, X o 2",
    "percentuale_sicurezza": 75,
    "12+under_4_5": "${is12Under45Good ? 'Sì' : 'No'}",
    "12+under_4_5_pct": ${Math.round(pct12Under45)},
    "motivazione_sintetica": "Frase riepilogativa"
  },
  "consigli": [
    { "tipo": "singola", "giocata": "Over 1.5", "percentuale": 68 },
    { "tipo": "combinata", "giocata": "2 + Under 4.5", "percentuale": 55 },
    { "tipo": "libera", "giocata": "1X+Over1.5", "percentuale": 72 }
  ],
  "indice_rischio_match": 5
}

Sii preciso e utilizza le percentuali calcolate. Per il consiglio "libera", scegli tra le combo approvate (DC, Over, Under, DC+Over, DC+Under, DC+MG Tot, MG Tot, MG Casa, MG Ospite, MG Casa+MG Ospite).`;

      const res = await askGroq(prompt, apiKeys['GROQ']);
      let jsonStr = res;
      const jsonMatch = res.match(/```(?:json)?\s*([\s\S]*?)```/);
      if (jsonMatch) jsonStr = jsonMatch[1];
      const parsed = JSON.parse(jsonStr.trim());
      
      if (parsed.consigli && parsed.consigli.length === 3) {
        const bestFree = getBestFreeCombo(stats, stats.homeMG, stats.awayMG, stats.mgTot);
        const libera = parsed.consigli[2];
        const validKeywords = ['1X','12','X2','Over','Under','MG','Multigol','Casa','Ospite','DC'];
        const isValid = validKeywords.some(k => libera.giocata.includes(k));
        if (!isValid) {
          libera.giocata = bestFree.label;
          libera.percentuale = bestFree.pct;
        }
      }
      
      const storageKey = `ft_ai_${match.id}`;
      const toStore = {
        analysis: parsed,
        weatherData: weather,
        injuriesData: injuries,
        standingsData: standings
      };
      localStorage.setItem(storageKey, JSON.stringify(toStore));
      
      setAnalysis(parsed);
      setError(null);
    } catch (e) {
      console.warn('Errore analisi AI:', e);
      setError(e.message || 'Errore durante la generazione dell\'analisi');
    }
    setLoading(false);
    setIsRefreshing(false);
  };
  
  const refreshAnalysis = () => {
    if (match) {
      const storageKey = `ft_ai_${match.id}`;
      localStorage.removeItem(storageKey);
      generateAnalysis(true);
    }
  };
  
  const goToApiKey = () => {
    if (setTab) setTab('API KEY');
  };
  
  if (!match) return null;
  
  if (loading) {
    return (
      <div className="ai-analysis-loading">
        ⏳ Generazione analisi AI...<br/>
        <span style={{fontSize:'12px', color:'var(--text-muted)'}}>Potrebbe richiedere alcuni secondi</span>
        {isRefreshing && <div style={{marginTop:'8px'}}>🔄 Aggiornamento con meteo e infortuni</div>}
      </div>
    );
  }
  
  if (error) {
    const isKeyError = error.includes('GROQ') || error.includes('chiave');
    return (
      <div className="ai-analysis-error">
        <span>⚠️ {error}</span>
        {isKeyError && (
          <div>
            <button className="btn-go-key" onClick={goToApiKey}>
              🔑 Vai al tab API KEY
            </button>
          </div>
        )}
        {!isKeyError && (
          <div style={{marginTop:'8px'}}>
            <button className="btn-go-key" onClick={refreshAnalysis}>
              🔄 Riprova
            </button>
          </div>
        )}
      </div>
    );
  }
  
  if (!analysis) return null;
  
  const { panoramica, impatto_assenze, fattore_meteo_campo, chiavi_tattiche, pronostico, consigli, indice_rischio_match } = analysis;
  
  return (
    <div className="ai-analysis-box">
      <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'6px'}}>
        <h3 style={{color: getChampColor(match.campionato), margin:0, fontSize:'16px'}}>
          🤖 Analisi AI Avanzata
          {weatherData && <span style={{marginLeft:'8px', fontSize:'14px'}}>🌤️</span>}
          {injuriesData && <span style={{marginLeft:'4px', fontSize:'14px'}}>🏥</span>}
        </h3>
        <div>
          <button className="btn-refresh" onClick={refreshAnalysis} title="Rigenera analisi con meteo aggiornato">
            🌤️ Aggiorna Meteo
          </button>
          <button className="btn-refresh" onClick={refreshAnalysis} title="Rigenera analisi" style={{marginLeft:'6px'}}>🔄</button>
        </div>
      </div>
      
      <h4>📋 Panoramica</h4>
      <p>{panoramica || 'N/A'}</p>
      
      <h4>⚠️ Impatto Assenze</h4>
      <p>{impatto_assenze || 'Nessuna informazione'}</p>
      
      <h4>🌤️ Fattore Meteo/Campo</h4>
      <p>{fattore_meteo_campo || 'Nessuna informazione'}</p>
      
      <h4>🧠 Chiavi Tattiche</h4>
      <p>{chiavi_tattiche || 'N/A'}</p>
      
      <div className="pronostico-mini">
        <div className="item">
          <div className="label">Pronostico 1X2</div>
          <div className="value">{pronostico?.esito_1X2 || 'N/D'}</div>
        </div>
        <div className="item">
          <div className="label">Sicurezza</div>
          <div className="value" style={{color: (pronostico?.percentuale_sicurezza || 0) >= 80 ? 'var(--win)' : 'var(--accent)'}}>

          🎯 Indice Rischio Match: {indice_rischio_match || 'N/D'}/10

const TeamMatchesHistory = ({ teamName, championship, allMatches }) => {
  const teamMatches = allMatches
    .filter(m => m.campionato === championship && m.stato === 'Giocata' && (m.casa === teamName || m.ospiti === teamName))
    .sort((a, b) => new Date(b.data + ' ' + b.ora) - new Date(a.data + ' ' + a.ora));

  if (teamMatches.length === 0) {
    return (
      <div className="card" style={{padding: '12px', textAlign:'center'}}>
        <p style={{color:'var(--text-muted)'}}>Nessuna partita giocata per {teamName} in questo campionato.</p>
      </div>
    );
  }

  const getResult = (match, team) => {
    const isHome = match.casa === team;
    const teamGoals = isHome ? match.golCasa : match.golOspite;
    const oppGoals = isHome ? match.golOspite : match.golCasa;
    if (teamGoals > oppGoals) return 'win';
    if (teamGoals === oppGoals) return 'draw';
    return 'loss';
  };

  const getOpponent = (match, team) => {
    return match.casa === team ? match.ospiti : match.casa;
  };

  return (
    <div className="card" style={{padding: '12px'}}>
      <h4 style={{color: getChampColor(teamName), marginBottom:'12px'}}>📋 {teamName}</h4>
      <div className="standings-table-wrap">
        <table className="standings-table history-table">
          <thead>
            <tr>
              <th>Data</th>
              <th>Avversario</th>
              <th>Risultato</th>
            </tr>
          </thead>
          <tbody>
            {teamMatches.map(m => {
              const result = getResult(m, teamName);
              const opponent = getOpponent(m, teamName);
              const rowClass = result === 'win' ? 'result-win' : result === 'draw' ? 'result-draw' : 'result-loss';
              return (
                <tr key={m.id} className={rowClass}>
                  <td>{formatDateEU(m.data)}</td>
                  <td>{opponent}</td>
                  <td>{m.golCasa} - {m.golOspite}</td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
};

const WebScraping = ({ setChampionships, setMatches, championships, matches, showAlert }) => {
  const [url, setUrl] = useState('');
  const [proxyUrl, setProxyUrl] = useState('https://api.allorigins.win/raw?url=');
  const [userAgent, setUserAgent] = useState('Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36');
  const [selectors, setSelectors] = useState({
    container: '#sched_all tbody tr',
    data: 'td[data-stat="date"]',
    ora: 'td[data-stat="time"]',
    casa: 'td[data-stat="home_team"] a',
    ospite: 'td[data-stat="away_team"] a',
    risultato: 'td[data-stat="score"]',
    campionato: 'h1[itemprop="name"]'
  });
  const [scrapedMatches, setScrapedMatches] = useState([]);
  const [loading, setLoading] = useState(false);
  const [champName, setChampName] = useState('');
  const [htmlContent, setHtmlContent] = useState(null);

  const processHtml = (html) => {
    const parser = new DOMParser();
    const doc = parser.parseFromString(html, 'text/html');

    const champEl = doc.querySelector(selectors.campionato);
    const detectedChamp = champEl ? champEl.textContent.trim() : 'Scraped League';
    setChampName(detectedChamp);

    const rows = doc.querySelectorAll(selectors.container);
    if (rows.length === 0) {
      showAlert('error', 'Nessuna partita trovata. Verifica i selettori.');
      return;
    }

    const matchesData = [];
    rows.forEach(row => {
      const dataEl = row.querySelector(selectors.data);
      const oraEl = row.querySelector(selectors.ora);
      const casaEl = row.querySelector(selectors.casa);
      const ospiteEl = row.querySelector(selectors.ospite);
      const risultatoEl = row.querySelector(selectors.risultato);

      const data = dataEl ? dataEl.textContent.trim() : '';
      const ora = oraEl ? oraEl.textContent.trim() : '';
      const casa = casaEl ? casaEl.textContent.trim() : '';
      const ospite = ospiteEl ? ospiteEl.textContent.trim() : '';
      const risultato = risultatoEl ? risultatoEl.textContent.trim() : '';

      if (!casa || !ospite) return;

      let golCasa = 0, golOspite = 0, stato = 'Futura';
      if (risultato && risultato.includes('-')) {
        const parts = risultato.split('-');
        if (parts.length === 2) {
          golCasa = parseInt(parts[0].trim()) || 0;
          golOspite = parseInt(parts[1].trim()) || 0;
          stato = 'Giocata';
        }
      }

      let dataStr = '';
      if (data) {
        const d = new Date(data);
        if (!isNaN(d.getTime())) {
          dataStr = d.toISOString().slice(0, 10);
        } else {
          const parts = data.split('/');
          if (parts.length === 3) {
            const day = parseInt(parts[0]), month = parseInt(parts[1])-1, year = parseInt(parts[2]);
            if (!isNaN(day) && !isNaN(month) && !isNaN(year)) {
              const d2 = new Date(year, month, day);
              if (!isNaN(d2.getTime())) dataStr = d2.toISOString().slice(0, 10);
            }
          }
        }
      }

      matchesData.push({
        id: Math.random().toString(36).slice(2),
        campionato: detectedChamp,
        round: 'N/A',
        data: dataStr || new Date().toISOString().slice(0, 10),
        ora: ora || 'TBD',
        casa,
        ospiti: ospite,
        stato,
        golCasa,
        golOspite
      });
    });

    if (matchesData.length === 0) {
      showAlert('error', 'Nessuna partita valida estratta. Verifica i selettori.');
      return;
    }

    setScrapedMatches(matchesData);
    showAlert('success', `✅ Estratte ${matchesData.length} partite. Controlla l'anteprima.`);
  };

  const handleFileUpload = (event) => {
    const file = event.target.files[0];
    if (!file) return;
    setLoading(true);
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const html = e.target.result;
        setHtmlContent(html);
        processHtml(html);
      } catch (err) {
        showAlert('error', 'Errore nella lettura del file: ' + err.message);
      }
      setLoading(false);
    };
    reader.onerror = () => {
      showAlert('error', 'Errore nella lettura del file.');
      setLoading(false);
    };
    reader.readAsText(file);
  };

  const scrapeMatches = async () => {
    if (!url) {
      showAlert('error', 'Inserisci un URL valido per lo scraping online. In alternativa, usa il caricamento file locale.');
      return;
    }
    setLoading(true);
    setScrapedMatches([]);
    setChampName('');

    try {
      const fullUrl = `${proxyUrl}${encodeURIComponent(url)}`;
      const response = await fetch(fullUrl, {
        headers: { 'User-Agent': userAgent }
      });
      
      if (!response.ok) {
        let msg = `HTTP error! status: ${response.status}`;
        if (response.status === 520) {
          msg += ' - Il proxy non riesce a contattare il sito. Prova a cambiare proxy o carica il file HTML manualmente.';
        } else if (response.status === 403) {
          msg += ' - Il sito blocca l\'accesso. Prova a cambiare User-Agent o usa il caricamento file locale.';
        }
        throw new Error(msg);
      }

      const html = await response.text();
      setHtmlContent(html);
      processHtml(html);
    } catch (e) {
      console.error(e);
      showAlert('error', 'Errore durante lo scraping: ' + e.message);
    }
    setLoading(false);
  };

  const importScrapedMatches = () => {
    if (scrapedMatches.length === 0) {
      showAlert('error', 'Nessuna partita da importare.');
      return;
    }

    const champExists = championships.some(c => c.name === champName);
    if (!champExists) {
      setChampionships(prev => [...prev, { name: champName, importedAt: new Date().toISOString() }]);
    }

    const existingKeys = new Set(matches.map(m => `${m.campionato}|${m.data}|${m.ora}|${m.casa}|${m.ospiti}`));
    const newMatches = scrapedMatches.filter(m => {
      const key = `${m.campionato}|${m.data}|${m.ora}|${m.casa}|${m.ospiti}`;
      return !existingKeys.has(key);
    });

    if (newMatches.length === 0) {
      showAlert('info', 'ℹ️ Tutte le partite sono già presenti.');
      return;
    }

    setMatches(prev => [...prev, ...newMatches]);
    showAlert('success', `✅ Importate ${newMatches.length} nuove partite da ${champName}`);
    setScrapedMatches([]);
    setUrl('');
    setHtmlContent(null);
  };

  const proxyPresets = [
    { label: 'AllOrigins (raw)', value: 'https://api.allorigins.win/raw?url=' },
    { label: 'CORS Proxy.io', value: 'https://corsproxy.io/?' },
    { label: 'CORS Anywhere (potrebbe chiedere attivazione)', value: 'https://cors-anywhere.herokuapp.com/' },
  ];

  return (
    <div>
      <h3 style={{marginBottom:'12px'}}>🌐 Web Scraping - Importa partite da siti web o file HTML</h3>
      <div className="card">
        <div className="alert alert-info">
          <b>💡 Suggerimento:</b> Se il sito blocca i proxy (es. FBref), puoi salvare la pagina web come file HTML e caricarla qui sotto.
          <br/>I selettori preimpostati sono ottimizzati per <b>FBref</b>.
        </div>

        <div style={{marginBottom:'16px', padding:'12px', background:'var(--surface)', borderRadius:'8px', border:'1px solid var(--border)'}}>
          <label style={{fontWeight:'bold', display:'block', marginBottom:'6px'}}>📂 Carica file HTML locale</label>
          <input
            type="file"
            accept=".html,.htm"
            onChange={handleFileUpload}
            style={{padding:'6px'}}
          />
          <span style={{fontSize:'12px', color:'var(--text-muted)', marginLeft:'8px'}}>
            Seleziona il file scaricato da FBref (es. K League 1 Scores & Fixtures _ FBref.com.html)
          </span>
        </div>

        <hr style={{borderColor:'var(--border)', margin:'12px 0'}}/>

        <div className="form-group">
          <label>URL della pagina (alternativa)</label>
          <input
            type="url"
            value={url}
            onChange={e => setUrl(e.target.value)}
            placeholder="https://www.worldfootball.net/schedule/ita-serie-a-2025-2026/"
          />
        </div>

        <div className="form-group">
          <label>Proxy CORS (cambia se il default non funziona)</label>
          <select value={proxyUrl} onChange={e => setProxyUrl(e.target.value)} style={{marginBottom:'6px'}}>
            {proxyPresets.map(p => (
              <option key={p.value} value={p.value}>{p.label}</option>
            ))}
            <option value="custom">Personalizzato</option>
          </select>
          {proxyUrl === 'custom' && (
            <input
              type="text"
              value={proxyUrl}
              onChange={e => setProxyUrl(e.target.value)}
              placeholder="https://mio-proxy.com/?url="
            />
          )}
        </div>

        <div className="form-group">
          <label>User-Agent (personalizzabile)</label>
          <input
            type="text"
            value={userAgent}
            onChange={e => setUserAgent(e.target.value)}
            placeholder="Mozilla/5.0 ..."
          />
        </div>

        <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'12px'}}>
          <div className="form-group">
            <label>Container (selettore righe)</label>
            <input
              value={selectors.container}
              onChange={e => setSelectors({...selectors, container: e.target.value})}
              placeholder="#sched_all tbody tr"
            />
          </div>
          <div className="form-group">
            <label>Campionato (selettore titolo)</label>
            <input
              value={selectors.campionato}
              onChange={e => setSelectors({...selectors, campionato: e.target.value})}
              placeholder="h1[itemprop='name']"
            />
          </div>
          <div className="form-group">
            <label>Data</label>
            <input
              value={selectors.data}
              onChange={e => setSelectors({...selectors, data: e.target.value})}
              placeholder="td[data-stat='date']"
            />
          </div>
          <div className="form-group">
            <label>Ora</label>
            <input
              value={selectors.ora}
              onChange={e => setSelectors({...selectors, ora: e.target.value})}
              placeholder="td[data-stat='time']"
            />
          </div>
          <div className="form-group">
            <label>Casa</label>
            <input
              value={selectors.casa}
              onChange={e => setSelectors({...selectors, casa: e.target.value})}
              placeholder="td[data-stat='home_team'] a"
            />
          </div>
          <div className="form-group">
            <label>Ospite</label>
            <input
              value={selectors.ospite}
              onChange={e => setSelectors({...selectors, ospite: e.target.value})}
              placeholder="td[data-stat='away_team'] a"
            />
          </div>
          <div className="form-group">
            <label>Risultato (opzionale, es. "2-1")</label>
            <input
              value={selectors.risultato}
              onChange={e => setSelectors({...selectors, risultato: e.target.value})}
              placeholder="td[data-stat='score']"
            />
          </div>
        </div>

        <button className="btn" onClick={scrapeMatches} disabled={loading}>
          {loading ? '⏳ Caricamento...' : '🔍 Estrai da URL'}
        </button>
      </div>

      {scrapedMatches.length > 0 && (
        <div className="card">
          <h4 style={{marginBottom:'8px'}}>📋 Anteprima partite trovate ({scrapedMatches.length})</h4>
          <p style={{fontSize:'13px', color:'var(--text-muted)', marginBottom:'8px'}}>
            Campionato rilevato: <b>{champName}</b>
          </p>
          <div className="standings-table-wrap">
            <table className="scraped-matches-table">
              <thead>
                <tr>
                  <th>Data</th>
                  <th>Ora</th>
                  <th>Casa</th>
                  <th>Ospite</th>
                  <th>Risultato</th>
                  <th>Stato</th>
                </tr>
              </thead>
              <tbody>
                {scrapedMatches.map(m => (
                  <tr key={m.id}>
                    <td>{formatDateEU(m.data)}</td>
                    <td>{m.ora}</td>
                    <td>{m.casa}</td>
                    <td>{m.ospiti}</td>
                    <td>{m.stato === 'Giocata' ? `${m.golCasa}-${m.golOspite}` : '-'}</td>
                    <td>{m.stato}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          <div style={{marginTop:'12px', display:'flex', gap:'8px'}}>
            <button className="btn" onClick={importScrapedMatches}>📥 Importa nel database</button>
            <button className="btn btn-secondary" onClick={() => setScrapedMatches([])}>🗑️ Cancella anteprima</button>
          </div>
        </div>
      )}
    </div>
  );
};

const askGroq = async (prompt, key) => {
  if (!key) {
    throw new Error('🔑 API GROQ non configurata. Vai nel tab API KEY per configurarla.');
  }
  try {
    const r = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type':'application/json', 'Authorization': `Bearer ${key}` },
      body: JSON.stringify({
        model: 'llama-3.3-70b-versatile',
        messages: [{ role:'system', content:'Sei un esperto data scientist e analista tattico di calcio. Rispondi ESCLUSIVAMENTE in formato JSON valido, senza testo prima o dopo.' }, { role:'user', content: prompt }]
      })
    });
    if (!r.ok) {
      const errorText = await r.text();
      throw new Error(`Errore API GROQ: ${r.status} - ${errorText}`);
    }
    const d = await r.json();
    const content = d.choices?.[0]?.message?.content;
    if (!content) {
      throw new Error('Groq non ha restituito una risposta valida.');
    }
    return content;
  } catch(e) {
    throw new Error(e.message || 'Errore durante la richiesta a Groq.');
  }
};

const fetchFootballData = async (endpoint, key) => {
  if (!key) return null;
  try {
    const r = await fetch(`https://api.football-data.org/v4/${endpoint}`, {
      headers: { 'X-Auth-Token': key }
    });
    return await r.json();
  } catch(e) { return null; }
};

const downloadAllFootballDataCompetitions = async (apiKey, setMatches, setChampionships, showAlert, championships, matches) => {
  if (!apiKey) {
    showAlert('error', '❌ API Key Football-data.org non configurata!');
    return;
  }
  
  showAlert('info', '📥 Scarico tutti i campionati da Football-data.org...');
  
  try {
    const competitionsData = await fetchFootballData('competitions', apiKey);
    if (!competitionsData || !competitionsData.competitions) {
      showAlert('error', '❌ Errore nel recupero dei campionati');
      return;
    }

    const competitions = competitionsData.competitions;
    const newChampionships = [];
    const newMatches = [];
    const existingChampNames = new Set(championships.map(c => c.name));

    const worldCupExists = competitions.some(c => c.code === 'WC') || 
                           championships.some(c => c.name === 'FIFA World Cup 2026');

    if (!worldCupExists) {
      competitions.push({
        id: 'WC',
        name: 'FIFA World Cup 2026',
        code: 'WC',
        type: 'CUP',
        area: { name: 'World' }
      });
    }

    for (const comp of competitions) {
      if (existingChampNames.has(comp.name)) {
        console.log(`⏭️ Campionato "${comp.name}" già presente, salto.`);
        continue;
      }

      const compId = comp.code === 'WC' ? 'WC' : comp.id;

      try {
        const matchesData = await fetchFootballData(`competitions/${compId}/matches`, apiKey);
        if (!matchesData || !matchesData.matches) {
          console.warn(`⚠️ Nessuna partita per ${comp.name}`);
          continue;
        }

        const futureMatches = matchesData.matches.filter(m => 
          m.status === 'SCHEDULED' || m.status === 'TIMED' || m.status === 'LIVE' || m.status === 'IN_PLAY'
        );

        if (futureMatches.length === 0) {
          console.log(`ℹ️ Nessuna partita futura per ${comp.name}`);
          continue;
        }

        newChampionships.push({
          name: comp.name,
          code: comp.code,
          importedAt: new Date().toISOString()
        });

        const existingMatchKeys = new Set(matches.map(m => 
          `${m.campionato}|${m.data}|${m.ora}|${m.casa}|${m.ospiti}`
        ));

        futureMatches.forEach(m => {
          const homeTeam = m.homeTeam?.name || m.homeTeam?.shortName || 'Home';
          const awayTeam = m.awayTeam?.name || m.awayTeam?.shortName || 'Away';
          const matchDate = new Date(m.utcDate);
          const dataStr = matchDate.toISOString().slice(0, 10);
          const oraStr = matchDate.toTimeString().slice(0, 5);

          const key = `${comp.name}|${dataStr}|${oraStr}|${homeTeam}|${awayTeam}`;
          if (existingMatchKeys.has(key)) return;
          existingMatchKeys.add(key);

          newMatches.push({
            id: Math.random().toString(36).slice(2),
            campionato: comp.name,
            round: m.matchday || 'N/A',
            data: dataStr,
            ora: oraStr,
            casa: homeTeam,
            ospiti: awayTeam,
            stato: 'Futura',
            golCasa: m.score?.fullTime?.home ?? 0,
            golOspite: m.score?.fullTime?.away ?? 0,
            citta: getCittaFromChampionship(comp.name)
          });
        });

        await new Promise(resolve => setTimeout(resolve, 500));
      } catch (err) {
        console.warn(`Errore campionato ${comp.name}:`, err);
      }
    }

    if (newChampionships.length === 0 && newMatches.length === 0) {
      showAlert('success', '✅ Nessun nuovo campionato o partita da aggiungere.');
      return;
    }

    setChampionships(prev => [...prev, ...newChampionships]);
    setMatches(prev => [...prev, ...newMatches]);

    showAlert('success', `✅ Scaricati ${newMatches.length} nuove partite da ${newChampionships.length} nuovi campionati!`);

  } catch (e) {
    showAlert('error', '❌ Errore download Football-data.org: ' + e.message);
  }
};

  const generateSchedina = () => {
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    const maxDate = new Date(today);
    maxDate.setDate(maxDate.getDate() + daysRange);
    
    let filtered = matches.filter(m => {
      if (m.stato !== 'Futura') return false;
      if (!m.data) return false;
      const matchDate = new Date(m.data);
      if (isNaN(matchDate.getTime())) return false;
      matchDate.setHours(0, 0, 0, 0);
      return matchDate >= today && matchDate <= maxDate;
    });
    
    if (schedinaChamp !== 'Tutti') {
      filtered = filtered.filter(m => m.campionato === schedinaChamp);
    }
    
    if (filtered.length === 0) {
      setUsedMatchIds(new Set());
      showAlert('info', '🔄 Nessuna partita disponibile. CARD ricalcolate automaticamente.');
      generateSchedina();
      return;
    }
    
    let available = filtered.filter(m => !usedMatchIds.has(m.id));
    
    if (available.length === 0) {
      setUsedMatchIds(new Set());
      showAlert('info', '🔄 Tutte le partite sono state consumate. CARD ricalcolate automaticamente.');
      generateSchedina();
      return;
    }
    
    const scoredMatches = available.map(m => {
      const homeMG = getTeamMultigolV2(matches, m.casa);
      const awayMG = getTeamMultigolV2(matches, m.ospiti);
      const homeUO = getTeamUnderOver(matches, m.casa);
      const awayUO = getTeamUnderOver(matches, m.ospiti);
      const pct12Under45 = get12Under45(matches, m.casa, m.ospiti);
      
      const homeRange = getMostFrequentGoalRange(m.casa, matches);
      const awayRange = getMostFrequentGoalRange(m.ospiti, matches);
      
      const stats = computeMatchStats(m, matches);
      let freeCombo = { label: 'N/A', pct: 0 };
      if (!stats.error) {
        freeCombo = getBestFreeCombo(stats, stats.homeMG, stats.awayMG, stats.mgTot);
      }
      
      const allUO = { ...homeUO, ...awayUO };
      let bestPct = 0;
      let bestBet = '';
      Object.entries(allUO).forEach(([key, val]) => {
        if (val > bestPct) {
          bestPct = val;
          bestBet = key;
        }
      });
      
      const score = Math.round((pct12Under45 + homeRange.pct + awayRange.pct + freeCombo.pct) / 4);
      return { ...m, score, homeRange, awayRange, pct12Under45, bestBet, bestPct, freeCombo };
    });
    
    scoredMatches.sort((a, b) => b.score - a.score);
    const selected = scoredMatches.slice(0, numMatches);
    
    const newUsed = new Set(usedMatchIds);
    selected.forEach(m => newUsed.add(m.id));
    setUsedMatchIds(newUsed);
    
    setSchedinaMatches(selected);
    setSchedinaSelections({});
  };

  const importXLSX = async (file) => {
    setLoading(true);
    setDebugColumns(null);
    try {
      const buffer = await file.arrayBuffer();
      const wb = XLSX.read(buffer, { type:'array' });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, { header: 1 });
      
      if (rows.length < 2) {
        showAlert('error', ' Il file è vuoto o non contiene dati validi');
        setLoading(false);
        return;
      }
      
      const headers = rows[0].map(h => String(h).trim());
      setDebugColumns(headers);
      
      const colMap = {};
      headers.forEach((h, idx) => {
        const normalized = h.toLowerCase().replace(/\s+/g, '');
        colMap[normalized] = idx;
      });
      
      const requiredCols = ['campionato', 'casa', 'ospite'];
      const missing = requiredCols.filter(c => !(c in colMap));
      
      if (missing.length > 0) {
        showAlert('error', `❌ Colonne mancanti: ${missing.join(', ')}. Colonne trovate: ${headers.join(', ')}`);
        setLoading(false);
        return;
      }
      
      const newMatches = [];
      const champSet = new Set(championships.map(c => c.name));
      
      for (let i = 1; i < rows.length; i++) {
        const row = rows[i];
        if (!row || row.length === 0) continue;
        
        const getCol = (names) => {
          for (const name of names) {
            const normalized = name.toLowerCase().replace(/\s+/g, '');
            if (colMap[normalized] !== undefined && row[colMap[normalized]] !== undefined && row[colMap[normalized]] !== '') {
              return row[colMap[normalized]];
            }
          }
          return null;
        };
        
        const campionato = getCol(['Campionato', 'campionato']);
        const round = getCol(['Round', 'round', 'Giornata', 'giornata']) || 'N/A';
        const data = getCol(['Data', 'data']);
        const ora = getCol(['Ora', 'ora', 'Time', 'time']);
        const casa = getCol(['Casa', 'casa', 'Home', 'home']);
        const ospiti = getCol(['Ospite', 'ospite', 'Ospiti', 'ospiti', 'Away', 'away']);
        const statoRaw = getCol(['Stato', 'stato', 'Status', 'status']) || 'Futura';
        const golCasaRaw = getCol(['GolCasa', 'golcasa']);
        const golOspiteRaw = getCol(['GolOspite', 'golospite']);
        const citta = getCol(['Città', 'citta', 'City', 'city']);
        
        if (!campionato || !casa || !ospiti) continue;
        
        const stato = String(statoRaw).toLowerCase().includes('gioc') ? 'Giocata' : 'Futura';
        
        let golCasa = 0, golOspite = 0;
        if (stato === 'Giocata') {
          golCasa = parseInt(golCasaRaw) || 0;
          golOspite = parseInt(golOspiteRaw) || 0;
        }
        
        let dataStr = '';
        if (data instanceof Date) {
          dataStr = data.toISOString().slice(0, 10);
        } else if (data) {
          const dataString = String(data).trim();
          if (dataString.match(/^\d{4}-\d{2}-\d{2}/)) {
            dataStr = dataString.slice(0, 10);
          } else if (dataString.match(/^\d{2}\/\d{2}\/\d{4}/)) {
            const [d, m, y] = dataString.split('/');
            dataStr = `${y}-${m}-${d}`;
          } else {
            dataStr = new Date(dataString).toISOString().slice(0, 10);
          }
        } else {
          continue;
        }
        
        let oraStr = 'TBD';
        if (ora) {
          const oraString = String(ora);
          oraStr = oraString.split('(')[0].trim().slice(0, 5);
          if (!oraStr.match(/^\d{2}:\d{2}$/)) oraStr = 'TBD';
        }
        
        champSet.add(campionato);
        
        newMatches.push({
          id: Math.random().toString(36).slice(2),
          campionato, round, data: dataStr, ora: oraStr,
          casa, ospiti, stato, golCasa, golOspite,
          citta: citta || getCittaFromChampionship(campionato)
        });
      }
      
      if (newMatches.length === 0) {
        showAlert('error', `❌ Nessuna partita valida trovata. Colonne rilevate: ${headers.join(', ')}`);
        setLoading(false);
        return;
      }
      
      const newChamps = [...championships];
      champSet.forEach(name => {
        if (!newChamps.find(c => c.name === name)) newChamps.push({ name, importedAt: new Date().toISOString() });
      });
      
      setChampionships(newChamps);
      const allMatches = [...matches, ...newMatches];
      setMatches(allMatches);
      showAlert('success', `✅ Caricate ${newMatches.length} partite!`);
      
      setDebugColumns(null);
    } catch(e) {
      console.error('Errore importazione:', e);
      showAlert('error', '❌ Errore: ' + e.message);
    }
    setLoading(false);
  };

Multigol Casa: 0-1=${Math.round(stats.homeMG['0-1'])}% 0-2=${Math.round(stats.homeMG['0-2'])}% 1-3=${Math.round(stats.homeMG['1-3'])}% Over 1,5=${Math.round(stats.homeMG['2-4'])}%

Multigol Totale: 1-4=${Math.round(stats.mgTot['1-4'])}% Over 1,5=${Math.round(stats.mgTot['2-4'])}% 2-5=${Math.round(stats.mgTot['2-5'])}% 3-6=${Math.round(stats.mgTot['3-6'])}%`;

        "tipo": "singola",

        "tipo": "combinata",
        "giocata": "2 + Under 4.5",
        "percentuale": 55
      },
      {
        "tipo": "libera",
        "giocata": "1X+Over1.5",
        "percentuale": 72
      }

    "analisi_breve": "Breve analisi della partita (max 2 righe)"
  }
]

Per il consiglio "libera", usa UNA delle seguenti tipologie (scegli la migliore in base ai dati):

- Under 3.5

- DC + Under 3.5

- Multigol Totale (1-4, Over 1,5, 2-5, 3-6)
- Multigol Casa (0-1, 0-2, 1-3, Over 1,5)
