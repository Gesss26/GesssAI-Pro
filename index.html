const SportsAPIProManager = ({ apiKeys, matches, setMatches, championships, setChampionships }) => {
  const [leagueName, setLeagueName] = useState('');
  const [leagueId, setLeagueId] = useState('');
  const [loading, setLoading] = useState(false);
  const [statusMessage, setStatusMessage] = useState(null);
  const [importedLeagues, setImportedLeagues] = useState([]);
  const [season, setSeason] = useState('2026');
  const [searchQuery, setSearchQuery] = useState('');
  const [searchResults, setSearchResults] = useState([]);
  const [searching, setSearching] = useState(false);

  useEffect(() => {
    const saved = JSON.parse(localStorage.getItem('ft_sportsapipro_imported') || '[]');
    setImportedLeagues(saved);
  }, []);

  const testApiKey = async () => {
    const key = apiKeys['SportsAPIPro'];
    if (!key) {
      setStatusMessage({ type: 'error', text: '❌ Inserisci prima la API Key!' });
      return;
    }
    setLoading(true);
    setStatusMessage({ type: 'info', text: '🔄 Test della chiave API in corso...' });
    try {
      const r = await fetch('https://api.sportsapipro.com/v1/sports', {
        headers: { 'X-API-Key': key, 'Content-Type': 'application/json' }
      });
      
      if (r.status === 200) {
        setStatusMessage({ type: 'success', text: `✅ API Key valida! Connessione stabilita con SportsAPIPro.` });
      } else if (r.status === 401) {
        setStatusMessage({ type: 'error', text: '❌ API Key non valida! Verifica la chiave inserita.' });
      } else if (r.status === 429) {
        setStatusMessage({ type: 'error', text: '⚠️ Limite richieste raggiunto! Attendi qualche minuto.' });
      } else {
        setStatusMessage({ type: 'error', text: `❌ Errore ${r.status}: ${r.statusText}` });
      }
    } catch (e) {
      setStatusMessage({ type: 'error', text: `❌ Errore di connessione: ${e.message}` });
    }
    setLoading(false);
  };

  const searchLeague = async () => {
    if (!searchQuery.trim()) {
      setStatusMessage({ type: 'error', text: '❌ Inserisci un termine di ricerca.' });
      return;
    }
    const key = apiKeys['SportsAPIPro'];
    if (!key) {
      setStatusMessage({ type: 'error', text: '❌ Configura prima la API Key di SportsAPIPro!' });
      return;
    }
    setSearching(true);
    setStatusMessage({ type: 'info', text: '🔍 Ricerca in corso...' });
    setSearchResults([]);
    try {
      const r = await fetch(
        `https://api.sportsapipro.com/v1/competitions?search=${encodeURIComponent(searchQuery)}`,
        { headers: { 'X-API-Key': key } }
      );
      
      if (!r.ok) {
        if (r.status === 404) {
          setStatusMessage({ type: 'error', text: `❌ Nessun campionato trovato per "${searchQuery}".` });
          setSearching(false);
          return;
        }
        throw new Error(`HTTP ${r.status}`);
      }
      
      const data = await r.json();
      let results = data.data || data.results || data.competitions || [];
      
      if (results.length > 0) {
        setSearchResults(results);
        setStatusMessage({ type: 'success', text: `✅ Trovati ${results.length} campionati per "${searchQuery}".` });
      } else {
        const id = parseInt(searchQuery);
        if (!isNaN(id) && id > 0) {
          const idR = await fetch(
            `https://api.sportsapipro.com/v1/competitions/${id}`,
            { headers: { 'X-API-Key': key } }
          );
          if (idR.ok) {
            const idData = await idR.json();
            const comp = idData.data || idData.competition;
            if (comp) {
              setSearchResults([comp]);
              setStatusMessage({ type: 'success', text: `✅ Trovato campionato con ID ${id}: ${comp.name || comp.title || 'Sconosciuto'}` });
              setSearching(false);
              return;
            }
          }
        }
        setStatusMessage({ type: 'error', text: `❌ Nessun campionato trovato per "${searchQuery}".` });
      }
    } catch (e) {
      console.error('Errore ricerca:', e);
      setStatusMessage({ type: 'error', text: `❌ Errore durante la ricerca: ${e.message}` });
    }
    setSearching(false);
  };

  const addAndImportLeague = async () => {
    if (!leagueName.trim() || !leagueId.trim()) {
      setStatusMessage({ type: 'error', text: '❌ Inserisci sia il Nome che l\'ID del campionato!' });
      return;
    }
    const id = parseInt(leagueId);
    if (isNaN(id) || id <= 0) {
      setStatusMessage({ type: 'error', text: '❌ L\'ID deve essere un numero positivo!' });
      return;
    }
    const key = apiKeys['SportsAPIPro'];
    if (!key) {
      setStatusMessage({ type: 'error', text: '❌ Configura prima la API Key di SportsAPIPro!' });
      return;
    }
    if (importedLeagues.some(l => l.id === id || l.name.toLowerCase() === leagueName.toLowerCase())) {
      setStatusMessage({ type: 'info', text: `ℹ️ "${leagueName}" è già stato importato.` });
      return;
    }
    setLoading(true);
    setStatusMessage({ type: 'info', text: `🔍 Controllo partite per "${leagueName}" (ID: ${id})...` });
    try {
      const checkResponse = await fetch(
        `https://api.sportsapipro.com/v1/fixtures?competition_id=${id}&season=${season}`,
        { headers: { 'X-API-Key': key } }
      );
      
      if (!checkResponse.ok) {
        if (checkResponse.status === 404) {
          setStatusMessage({ type: 'error', text: `❌ Campionato "${leagueName}" (ID: ${id}) non trovato.` });
          setLoading(false);
          return;
        }
        throw new Error(`HTTP ${checkResponse.status}`);
      }
      
      const checkData = await checkResponse.json();
      const matchesData = checkData.data || checkData.fixtures || checkData.matches || [];
      
      if (!matchesData || matchesData.length === 0) {
        setStatusMessage({ type: 'error', text: `❌ Nessuna partita trovata per "${leagueName}" (ID: ${id}) nella stagione ${season}.` });
        setLoading(false);
        return;
      }
      
      setStatusMessage({ type: 'info', text: `📥 Importando ${leagueName} (stagione ${season})...` });
      
      const newMatches = matchesData.map(m => {
        const isFinished = m.status === 'FT' || m.status === 'FINISHED' || m.status === 'Finished';
        const homeScore = isFinished ? (m.home_score || m.score?.home || m.goals?.home || 0) : 0;
        const awayScore = isFinished ? (m.away_score || m.score?.away || m.goals?.away || 0) : 0;
        const matchDate = new Date(m.date || m.utcDate || m.datetime || Date.now());
        const dataStr = matchDate.toISOString().slice(0, 10);
        const oraStr = matchDate.toTimeString().slice(0, 5);
        return {
          id: `sp_${m.id || Math.random().toString(36).slice(2)}`,
          campionato: leagueName,
          round: m.round || m.matchday || 'N/A',
          data: dataStr,
          ora: oraStr,
          casa: m.home_team || m.homeTeam || m.team_home || 'Home',
          ospiti: m.away_team || m.awayTeam || m.team_away || 'Away',
          stato: isFinished ? 'Giocata' : 'Futura',
          golCasa: homeScore,
          golOspite: awayScore,
          citta: null,
          source: 'sportsapipro'
        };
      });
      
      const updatedImported = [...importedLeagues, { 
        id: id, 
        name: leagueName, 
        season: season,
        importedAt: new Date().toISOString(),
        matchCount: newMatches.length 
      }];
      localStorage.setItem('ft_sportsapipro_imported', JSON.stringify(updatedImported));
      setImportedLeagues(updatedImported);
      
      setMatches(prev => {
        const existingIds = new Set(prev.map(m => m.id));
        const filteredNew = newMatches.filter(m => !existingIds.has(m.id));
        return [...prev, ...filteredNew];
      });
      
      const champExists = championships.some(c => c.name === leagueName);
      if (!champExists) {
        setChampionships(prev => [...prev, { 
          name: leagueName, 
          importedAt: new Date().toISOString(), 
          source: 'sportsapipro' 
        }]);
      }
      
      setStatusMessage({ type: 'success', text: `✅ Importate ${newMatches.length} partite da "${leagueName}" (stagione ${season})!` });
      setLeagueName('');
      setLeagueId('');
    } catch (e) {
      console.error('Errore importazione SportsAPIPro:', e);
      setStatusMessage({ type: 'error', text: `❌ Errore durante l'importazione: ${e.message}` });
    }
    setLoading(false);
  };

  const removeImportedLeague = (leagueId) => {
    const league = importedLeagues.find(l => l.id === leagueId);
    if (!league) return;
    if (confirm(`⚠️ Rimuovere "${league.name}" e tutte le sue partite importate?`)) {
      const updated = importedLeagues.filter(l => l.id !== leagueId);
      localStorage.setItem('ft_sportsapipro_imported', JSON.stringify(updated));
      setImportedLeagues(updated);
      setMatches(prev => prev.filter(m => m.campionato !== league.name || m.source !== 'sportsapipro'));
      setChampionships(prev => prev.filter(c => c.name !== league.name || c.source !== 'sportsapipro'));
      setStatusMessage({ type: 'success', text: `🗑️ "${league.name}" rimosso dalla lista.` });
    }
  };

  const getStatusColor = () => {
    if (!statusMessage) return 'transparent';
    if (statusMessage.type === 'success') return 'var(--win)';
    if (statusMessage.type === 'error') return 'var(--lose)';
    return 'var(--draw)';
  };

  return (
    <div className="card" style={{borderLeft: '4px solid #8b5cf6'}}>
      <h4 style={{display: 'flex', alignItems: 'center', gap: '8px', color: '#8b5cf6'}}>
        🏟️ SportsAPIPro
      </h4>
      {statusMessage && (
        <div style={{
          padding: '10px 14px',
          borderRadius: '8px',
          marginBottom: '12px',
          background: getStatusColor(),
          color: getStatusColor() === 'var(--win)' ? '#000' : '#fff',
          fontSize: '13px',
          fontWeight: 'bold'
        }}>
          {statusMessage.text}
        </div>
      )}
      <div style={{marginBottom: '12px'}}>
        <label style={{display: 'block', marginBottom: '4px', fontSize: '13px', color: 'var(--text-muted)'}}>
          🔑 API Key
        </label>
        <div style={{display: 'flex', gap: '8px', flexWrap: 'wrap'}}>
          <input type="password" value={apiKeys['SportsAPIPro'] || ''} onChange={(e) => {
            const newKeys = { ...apiKeys, 'SportsAPIPro': e.target.value };
            localStorage.setItem('ft_apikeys', JSON.stringify(newKeys));
            if (window.updateApiKeys) window.updateApiKeys(newKeys);
          }} placeholder="Inserisci la tua API Key SportsAPIPro" style={{flex: 1, minWidth: '200px'}} />
          <button className="btn btn-secondary" onClick={testApiKey} disabled={loading} style={{fontSize: '13px', padding: '8px 16px'}}>
            {loading ? '⏳...' : '🧪 Test'}
          </button>
        </div>
        <div style={{fontSize: '11px', color: 'var(--text-muted)', marginTop: '4px'}}>
          💡 Ottieni la chiave su: <a href="https://sportsapipro.com" target="_blank" style={{color: 'var(--accent)'}}>sportsapipro.com</a>
        </div>
      </div>
      <div style={{marginBottom: '12px', borderTop: '1px solid var(--border)', paddingTop: '12px'}}>
        <label style={{display: 'block', marginBottom: '4px', fontSize: '13px', color: 'var(--text-muted)'}}>
          🔍 Cerca Campionato
        </label>
        <div style={{display: 'flex', gap: '8px', flexWrap: 'wrap'}}>
          <input type="text" value={searchQuery} onChange={e => setSearchQuery(e.target.value)} placeholder="Cerca campionato (es. Veikkausliiga, Premier League...)" style={{flex: 2, minWidth: '150px'}} onKeyDown={e => e.key === 'Enter' && searchLeague()} />
          <button className="btn btn-secondary" onClick={searchLeague} disabled={searching || loading} style={{fontSize: '13px', padding: '8px 16px'}}>
            {searching ? '⏳...' : '🔍 Cerca'}
          </button>
        </div>
        {searchResults.length > 0 && (
          <div style={{marginTop: '8px', maxHeight: '200px', overflowY: 'auto', background: 'var(--surface)', borderRadius: '6px', padding: '6px'}}>
            {searchResults.map((league, idx) => (
              <div key={idx} style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '6px 10px', borderBottom: '1px solid var(--border)', cursor: 'pointer'}} onClick={() => {
                setLeagueName(league.name || league.league_name || league.title || 'Unknown');
                setLeagueId(String(league.id || league.league_id));
                setSearchResults([]);
                setTimeout(() => addAndImportLeague(), 300);
              }}>
                <div>
                  <span style={{fontWeight: 'bold', color: '#8b5cf6'}}>{league.name || league.league_name || league.title || 'Unknown'}</span>
                  <span style={{fontSize: '11px', color: 'var(--text-muted)', marginLeft: '8px'}}>ID: {league.id || league.league_id}</span>
                </div>
                <button className="btn btn-secondary" style={{fontSize: '11px', padding: '2px 12px'}}>➕ Aggiungi</button>
              </div>
            ))}
          </div>
        )}
      </div>
      <div style={{borderTop: '1px solid var(--border)', paddingTop: '12px'}}>
        <label style={{display: 'block', marginBottom: '4px', fontSize: '13px', color: 'var(--text-muted)'}}>
          ➕ Aggiungi Manualmente
        </label>
        <div style={{display: 'flex', gap: '8px', flexWrap: 'wrap', alignItems: 'flex-end'}}>
          <div style={{flex: 2, minWidth: '150px'}}>
            <input type="text" value={leagueName} onChange={e => setLeagueName(e.target.value)} placeholder="Nome campionato (es. Veikkausliiga)" style={{width: '100%'}} />
          </div>
          <div style={{flex: 1, minWidth: '80px'}}>
            <input type="number" value={leagueId} onChange={e => setLeagueId(e.target.value)} placeholder="ID" style={{width: '100%'}} />
          </div>
          <div style={{flex: 1, minWidth: '100px'}}>
            <select value={season} onChange={e => setSeason(e.target.value)} style={{padding: '8px 12px', borderRadius: '6px', border: '1px solid var(--border)', background: 'var(--surface)', color: 'var(--text)', width: '100%'}}>
              <option value="2026">2026</option><option value="2025">2025</option><option value="2024">2024</option>
            </select>
          </div>
          <div style={{flex: 1, minWidth: '100px'}}>
            <button className="btn" onClick={addAndImportLeague} disabled={loading || !leagueName.trim() || !leagueId.trim()} style={{width: '100%', background: '#8b5cf6', color: '#fff'}}>
              {loading ? '⏳ Importando...' : '📥 Aggiungi'}
            </button>
          </div>
        </div>
        <div style={{fontSize: '10px', color: 'var(--text-muted)', marginTop: '4px'}}>
          💡 ID utili: Veikkausliiga (41), Allsvenskan (40), Eliteserien (42)
        </div>
      </div>
      {importedLeagues.length > 0 && (
        <div style={{marginTop: '12px', borderTop: '1px solid var(--border)', paddingTop: '12px'}}>
          <h5 style={{color: 'var(--text-muted)', fontSize: '13px', marginBottom: '8px'}}>
            📋 Campionati importati da SportsAPIPro ({importedLeagues.length})
          </h5>
          <div style={{maxHeight: '150px', overflowY: 'auto'}}>
            {importedLeagues.map(league => {
              const matchCount = matches ? matches.filter(m => m.campionato === league.name && m.source === 'sportsapipro').length : 0;
              return (
                <div key={league.id} style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '6px 10px', borderBottom: '1px solid var(--border)', fontSize: '13px'}}>

                  <button className="btn btn-danger" style={{fontSize: '10px', padding: '2px 10px'}} onClick={() => removeImportedLeague(league.id)}>✖</button>
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
};

const loadState = () => {
  try {
    return {
      championships: JSON.parse(localStorage.getItem('ft_champs') || '[]'),
      matches: JSON.parse(localStorage.getItem('ft_matches') || '[]'),
      apiKeys: JSON.parse(localStorage.getItem('ft_apikeys') || '{}'),
      theme: JSON.parse(localStorage.getItem('ft_theme') || '"Scuro Blu Notte"'),
      customTheme: JSON.parse(localStorage.getItem('ft_custom_theme') || 'null'),
      schedineHistory: JSON.parse(localStorage.getItem('ft_schedine_history') || '[]'),
    };
  } catch(e) { return { championships:[], matches:[], apiKeys:{}, theme:'Scuro Blu Notte', customTheme:null, schedineHistory:[] }; }
};

const saveState = (data) => {
  localStorage.setItem('ft_champs', JSON.stringify(data.championships));
  localStorage.setItem('ft_matches', JSON.stringify(data.matches));
  localStorage.setItem('ft_apikeys', JSON.stringify(data.apiKeys));
  localStorage.setItem('ft_theme', JSON.stringify(data.theme));
  localStorage.setItem('ft_custom_theme', JSON.stringify(data.customTheme));
  localStorage.setItem('ft_schedine_history', JSON.stringify(data.schedineHistory || []));
};

  const [error, setError] = useState(null);
  const [weatherData, setWeatherData] = useState(null);
  const [isRefreshing, setIsRefreshing] = useState(false);
  const [tacticsData, setTacticsData] = useState(null);
  const [injuriesData, setInjuriesData] = useState(null);
  const [activeApi, setActiveApi] = useState(null);

  const getWeatherEmoji = (weatherDesc) => {

    try {

      if (!r.ok) return null;
      const data = await r.json();
      const matchDay = new Date(matchDate);
      matchDay.setHours(0,0,0,0);
      const forecasts = data.list.filter(item => {
        const dt = new Date(item.dt * 1000);
        dt.setHours(0,0,0,0);
        return dt.getTime() === matchDay.getTime();
      });
      if (forecasts.length === 0) return null;
      const forecast = forecasts[0];
      return {
        temp: forecast.main.temp,
        temp_min: forecast.main.temp_min,
        temp_max: forecast.main.temp_max,
        weather: forecast.weather[0].description,
        weather_icon: forecast.weather[0].icon,
        wind_speed: forecast.wind.speed,
        rain: forecast.rain ? forecast.rain['3h'] : 0,

      const searchAway = await fetch(
        `https://v3.football.api-sports.io/teams?search=${encodeURIComponent(awayTeam)}`,
        { headers: { 'x-apisports-key': apiKey } }
      );

      if (!searchHome.ok || !searchAway.ok) return null;

      const awayData = await searchAway.json();

      const homeId = homeData.response?.[0]?.team?.id;
      const awayId = awayData.response?.[0]?.team?.id;

        `https://v3.football.api-sports.io/fixtures/lineups?fixture=${fixture.fixture.id}`,
        { headers: { 'x-apisports-key': apiKey } }
      );

            name: p.player.name

  const resetCards = () => { setUsedMatchIds(new Set()); generateSchedina(); showAlert('info', '🔄 CARD ricalcolate!'); };
  
  const generateSchedina = () => {
    const today = new Date(); today.setHours(0, 0, 0, 0);
    const maxDate = new Date(today); maxDate.setDate(maxDate.getDate() + daysRange);
    let filtered = matches.filter(m => {
      if (m.stato !== 'Futura') return false;
      if (!m.data) return false;
      const matchDate = parseDate(m.data);
      if (isNaN(matchDate.getTime())) return false;
      matchDate.setHours(0, 0, 0, 0);
      return matchDate >= today && matchDate <= maxDate;
    });
    if (schedinaChamp !== 'Tutti') filtered = filtered.filter(m => m.campionato === schedinaChamp);
    if (filtered.length === 0) {
      setUsedMatchIds(new Set());
      const allFiltered = matches.filter(m => { if (m.stato !== 'Futura') return false; if (!m.data) return false; const matchDate = parseDate(m.data); if (isNaN(matchDate.getTime())) return false; matchDate.setHours(0, 0, 0, 0); return matchDate >= today; });
      if (allFiltered.length === 0) { showAlert('error', '❌ Nessuna partita futura disponibile.'); setSchedinaMatches([]); return; }
      filtered = allFiltered;
    }
    let available = filtered.filter(m => !usedMatchIds.has(m.id));
    if (available.length === 0) { setUsedMatchIds(new Set()); available = filtered; }
    const scoredMatches = available.map(m => {
      const pct12Under45 = get12Under45(matches, m.casa, m.ospiti);
      const homeRange = getMultigolRange(m.casa, matches);
      const awayRange = getMultigolRange(m.ospiti, matches);

      const score = Math.round((pct12Under45 + homeRange.pct + awayRange.pct + freeCombo.pct) / 4);
      return { ...m, score, homeRange, awayRange, pct12Under45, freeCombo };
    });
    scoredMatches.sort((a, b) => b.score - a.score);
    const selected = scoredMatches.slice(0, numMatches);
    const newUsed = new Set(usedMatchIds);

Struttura JSON richiesta (array di oggetti, uno per partita):
[

  }
]

Dati:
${matchData}`;

                  <p style={{marginBottom:'12px'}}>I dati vengono salvati automaticamente in localStorage.</p>
                  <button className="btn" onClick={saveLocal} style={{marginRight:'8px'}}>💾 Scarica Backup JSON</button>
                  <hr style={{margin:'14px 0', borderColor:'var(--border)'}}/>
                  <label style={{display:'block', marginBottom:'6px'}}>📂 Carica Backup JSON</label>
                  <input type="file" accept=".json" onChange={e => e.target.files[0] && loadLocal(e.target.files[0])} />
                  <hr style={{margin:'14px 0', borderColor:'var(--border)'}}/>
                  <button className="btn btn-danger" onClick={() => {
                    if (confirm('Vuoi davvero resettare TUTTI i dati?')) {
                      localStorage.clear();
                      saveBlacklist([]);
                      saveCustomSofaLeagues([]);
                      localStorage.removeItem('ft_football_data_imported');
                      localStorage.removeItem('ft_sportsapipro_imported');
                      setChampionships([]); setMatches([]); setApiKeys({}); setTempKeys({}); setSchedineHistory([]);
                      showAlert('success', '🗑️ Dati resettati completamente.');
                    }
                  }}>🗑️ Reset Completo</button>
                </div>
              </div>
            )}

            {settingsTab === 'Importa Campionato' && (
              <div>
                <h3 style={{marginBottom:'12px'}}>📥 Importa Campionato</h3>
                <SofaScoreManager onImport={importFromSofaScore} loading={loading} matches={matches} setMatches={setMatches} />
                <hr style={{borderColor:'var(--border)', margin:'20px 0'}}/>
                <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', margin:'20px 0 12px', flexWrap:'wrap', gap:'10px'}}>
                  <h3 style={{margin:0}}>📋 Campionati Importati</h3>
                  <div style={{display:'flex', gap:'8px', flexWrap:'wrap'}}>
                    <button className="btn" style={{background: 'var(--accent)', color: '#000'}} onClick={importAllFromSofaScore} disabled={loading}>📥 Importa Tutti</button>
                    <button className="btn btn-danger btn-sm" onClick={clearAllChampionships}>🗑️ Elimina Tutti</button>
                  </div>
                </div>
                {championships.length === 0 ? <div className="empty-state">Nessun campionato importato.</div> : (
                  <div className="champ-list">
                    {championships.map(c => {
                      const totalMatches = matches.filter(m => m.campionato === c.name).length;
                      const futureMatches = matches.filter(m => m.campionato === c.name && m.stato === 'Futura').length;
                      const playedMatches = matches.filter(m => m.campionato === c.name && m.stato === 'Giocata').length;
                      return (
                        <div key={c.name} className="champ-item" style={{borderLeft: `4px solid ${getChampColor(c.name)}`, paddingLeft:'12px'}}>
                          <div><b>{c.name}</b><div style={{fontSize:'11px', color:'var(--text-muted)'}}>{totalMatches} partite ({futureMatches} future, {playedMatches} giocate) <span style={{marginLeft:'8px', fontSize:'10px', color:'var(--text-muted)'}}>📅 {new Date(c.importedAt).toLocaleDateString()}</span></div></div>
                          <button className="btn btn-danger btn-sm" onClick={() => { if (confirm(`Eliminare ${c.name} e tutte le sue partite?`)) { setChampionships(championships.filter(x => x.name !== c.name)); setMatches(matches.filter(m => m.campionato !== c.name)); } }}>🗑️ Elimina</button>
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            )}

            {settingsTab === 'Grandezza Caratteri' && (
              <div>
                <div className="card">
                  <h3 style={{marginBottom: '12px'}}>📏 Grandezza Caratteri</h3>
                  
                  <div style={{
                    display: 'flex',
                    alignItems: 'center',
                    gap: '16px',
                    flexWrap: 'wrap'
                  }}>
                    <button 
                      className="btn btn-secondary"
                      onClick={() => setFontSize(prev => Math.max(70, prev - 5))}
                      style={{
                        fontSize: '18px',
                        fontWeight: 'bold',
                        padding: '8px 16px',
                        minWidth: '44px',
                        minHeight: '44px',
                        borderRadius: '8px',
                        border: '1px solid var(--border)',
                        background: 'var(--surface)',
                        color: 'var(--text)',
                        cursor: 'pointer'
                      }}
                    >
                      −
                    </button>

                    <div style={{flex: 1, minWidth: '150px'}}>
                      <input
                        type="range"
                        min="70"
                        max="150"
                        step="5"
                        value={fontSize}
                        onChange={(e) => setFontSize(parseInt(e.target.value))}
                        style={{
                          width: '100%',
                          accentColor: 'var(--accent)',
                          height: '6px',
                          borderRadius: '3px',
                          background: 'var(--surface)',
                          cursor: 'pointer'
                        }}
                      />
                      <div style={{
                        display: 'flex',
                        justifyContent: 'space-between',
                        fontSize: '11px',
                        color: 'var(--text-muted)',
                        marginTop: '2px'
                      }}>
                        <span>70%</span>
                        <span style={{fontWeight: 'bold', color: 'var(--accent)'}}>
                          {fontSize}%
                        </span>
                        <span>150%</span>
                      </div>
                    </div>

                    <button 
                      className="btn btn-secondary"
                      onClick={() => setFontSize(prev => Math.min(150, prev + 5))}
                      style={{
                        fontSize: '18px',
                        fontWeight: 'bold',
                        padding: '8px 16px',
                        minWidth: '44px',
                        minHeight: '44px',
                        borderRadius: '8px',
                        border: '1px solid var(--border)',
                        background: 'var(--surface)',
                        color: 'var(--text)',
                        cursor: 'pointer'
                      }}
                    >
                      +
                    </button>

                    <button 
                      className="btn btn-secondary"
                      onClick={() => setFontSize(100)}
                      style={{
                        fontSize: '12px',
                        padding: '8px 16px',
                        borderRadius: '8px',
                        border: '1px solid var(--border)',
                        background: 'var(--surface)',
                        color: 'var(--text)',
                        cursor: 'pointer'
                      }}
                    >
                      🔄 Reset (100%)
                    </button>
                  </div>

                  <div style={{
                    marginTop: '12px',
                    fontSize: '12px',
                    color: 'var(--text-muted)',
                    borderTop: '1px solid var(--border)',
                    paddingTop: '10px'
                  }}>
                    <div style={{display: 'flex', gap: '16px', flexWrap: 'wrap'}}>
                      <span>📱 <b>Consigliato:</b> 100% (PC) / 110-120% (Mobile)</span>
                      <span>💡 La modifica si applica immediatamente a tutta l'app</span>
                    </div>
                    <div style={{
                      marginTop: '6px',
                      padding: '8px 12px',
                      borderRadius: '6px',
                      background: 'var(--surface)',
                      border: '1px solid var(--border)',
                      fontSize: `${fontSize}%`,
                      transition: 'font-size 0.2s'
                    }}>
                      <span style={{fontWeight: 'bold'}}>Anteprima:</span> Questo è un testo di esempio alla dimensione <b>{fontSize}%</b>
                    </div>
                  </div>
                </div>
              </div>
            )}
          </div>
        )}

        {/* ANALISI CUSTOM */}
        {tab === 'Analisi Custom' && (
          <div>
            <h2 style={{marginBottom: '14px'}}>🔍 Analisi Partita Custom</h2>
            <p style={{color: 'var(--text-muted)', marginBottom: '16px'}}>Inserisci l'ID SofaScore di un campionato, seleziona due squadre e genera un'analisi professionale con i 3 consigli delle CARD.</p>
            <div className="card">
              <div style={{display: 'flex', gap: '12px', flexWrap: 'wrap', alignItems: 'flex-end'}}>
                <div style={{flex: 2, minWidth: '150px'}}>
                  <label>🏆 ID Campionato SofaScore</label>
                  <input type="number" placeholder="Es. 41 per Veikkausliiga" style={{width: '100%'}} />
                </div>
                <div style={{flex: 1, minWidth: '100px'}}>
                  <label>📅 Stagione</label>
                  <select style={{width: '100%', padding: '8px 12px'}}>
                    <option value="26/27">26/27</option><option value="25/26">25/26</option><option value="24/25">24/25</option>
                  </select>
                </div>
                <div><button className="btn" style={{marginBottom: '0'}}>🔍 Verifica</button></div>
              </div>
              <div style={{fontSize: '11px', color: 'var(--text-muted)', marginTop: '6px'}}>💡 ID utili: Veikkausliiga (41), Allsvenskan (40), Eliteserien (20), Premier League (17), Serie A (23)</div>
            </div>
          </div>
        )}

        <div style={{textAlign:'center', padding:'20px', color:'var(--text-muted)', fontSize:'12px'}}>
          GesssAI-Pro v3.0 - 2026 • Dati: {matches.length} partite in {championships.length} campionati • Schedine: {schedineHistory.length}
        </div>
      </div>
    </div>
  );
}

// ============================================================
// MOUNT
// ============================================================

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
