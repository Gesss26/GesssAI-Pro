<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<title>GesssAI-Pro v3.0 - Football Trader</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root {
    --bg: #0f1419;
    --surface: #1a2028;
    --card: #232b36;
    --banner: #2c3642;
    --text: #e6edf3;
    --text-muted: #ffff00;
    --accent: #f39c12;
    --accent2: #e67e22;
    --border: #30363d;
    --win: #6fcf97;
    --draw: #f2c94c;
    --lose: #eb5757;
    --tab-active: #f39c12;
    
    --pct-rosso: #eb5757;
    --pct-neutro: #8b949e;
    --pct-verde: #6fcf97;
    --pct-oro: #f39c12;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }
  body { background: var(--bg); color: var(--text); min-height: 100vh; }
  
  .pct-rosso { color: var(--pct-rosso) !important; font-weight: bold; }
  .pct-neutro { color: var(--pct-neutro) !important; font-weight: bold; }
  .pct-verde { color: var(--pct-verde) !important; font-weight: bold; }
  .pct-oro { color: var(--pct-oro) !important; font-weight: bold; text-shadow: 0 0 10px rgba(243, 156, 18, 0.3); }

  .multigol-badge {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: bold;
    color: #000;
    margin: 0 2px;
  }
  .multigol-badge.range-01 { background: #8b949e; }
  .multigol-badge.range-02 { background: #f2c94c; }
  .multigol-badge.range-13 { background: #6fcf97; }
  .multigol-badge.range-24 { background: #f39c12; }
  .multigol-badge.range-25 { background: #e67e22; }
  .multigol-badge.range-36 { background: #eb5757; }
  .multigol-badge.range-default { background: var(--accent); }

  .header { 
    background: var(--banner); 
    padding: 16px 24px; 
    border-bottom: 2px solid var(--accent); 
    display: flex; 
    align-items: center; 
    justify-content: center;
    gap: 16px; 
    position: relative;
  }
  .header .header-left {
    position: absolute;
    left: 24px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .header .header-center {
    text-align: center;
  }
  .header .header-center .app-name {
    font-size: 28px;
    font-weight: bold;
    letter-spacing: 2px;
  }
  .header .header-center .app-name span {
    display: inline-block;
  }
  .header .header-center .subtitle {
    font-size: 12px;
    color: var(--text-muted);
  }
  .clock {
    position: absolute;
    right: 24px;
    background: var(--surface);
    padding: 8px 16px;
    border-radius: 8px;
    border: 1px solid var(--border);
    font-family: 'Courier New', monospace;
    font-size: 14px;
    font-weight: bold;
    color: var(--accent);
    min-width: 200px;
    text-align: right;
  }
  .clock-date { font-size: 12px; color: var(--text-muted); }
  .clock-time { font-size: 16px; color: var(--accent); }
  .tabs-nav { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); overflow-x: auto; }
  .tabs-nav button {
    flex: 1; min-width: 120px; padding: 14px 12px; background: transparent;
    color: var(--text-muted); border: none; cursor: pointer; font-size: 14px;
    border-bottom: 3px solid transparent; transition: all 0.2s;
    font-weight: 600; white-space: nowrap;
  }
  .tabs-nav button:hover { color: var(--text); background: var(--card); }
  .tabs-nav button.active { color: var(--accent); border-bottom-color: var(--tab-active); background: var(--card); }
  .container { padding: 20px; max-width: 1400px; margin: 0 auto; }
  .card {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    padding: 18px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }
  .matches-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 18px;
    justify-content: flex-start;
  }
  .match-tab {
    background: var(--card);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 0;
    border: 1px solid var(--border);
    border-left-width: 6px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.4);
    flex: 1;
    min-width: 300px;
    max-width: 420px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    position: relative;
  }
  .match-tab:hover {
    transform: translateY(-3px);
    box-shadow: 0 6px 16px rgba(0,0,0,0.6);
  }
  .match-tab .score-badge {
    position: absolute;
    top: 10px;
    right: 12px;
    background: var(--accent);
    color: #000;
    font-weight: bold;
    font-size: 18px;
    padding: 2px 10px;
    border-radius: 20px;
    border: 2px solid var(--accent2);
  }
  .match-tab-history {
    background: var(--card);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 0;
    border: 1px solid var(--border);
    border-left-width: 6px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.4);
    flex: 1;
    min-width: 300px;
    max-width: 420px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .match-tab-history:hover {
    transform: translateY(-3px);
    box-shadow: 0 6px 16px rgba(0,0,0,0.6);
  }
  .match-tab-history .teams-row {
    display: flex;
    justify-content: space-around;
    align-items: center;
    padding: 4px 0;
  }
  .match-tab-history .score {
    font-size: 24px;
    font-weight: bold;
    padding: 0px 12px;
  }
  .match-tab-history .score-win { color: var(--win); }
  .match-tab-history .score-draw { color: var(--draw); }
  .match-tab-history .score-loss { color: var(--lose); }
  
  .teams-row { 
    display: flex; 
    justify-content: space-around; 
    align-items: center; 
    padding: 8px 0; 
  }
  .team { 
    display: flex; 
    flex-direction: column; 
    align-items: center; 
    gap: 4px; 
    flex: 1;
  }
  .team-name { 
    font-weight: bold; 
    font-size: 20px;
    text-align: center;
  }
  .vs { 
    font-size: 18px; 
    color: var(--accent); 
    font-weight: bold; 
    padding: 0 8px;
  }
  .form-row-compact {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 10px;
    margin-bottom: 6px;
  }
  .form-block-compact { 
    text-align: center;
    padding: 8px 6px;
    background: var(--surface);
    border-radius: 6px;
  }
  .form-block-compact .form-label { 
    font-size: 10px; 
    color: var(--text-muted); 
    margin-bottom: 4px;
    text-transform: uppercase;
    font-weight: 600;
  }
  .form-squares {
    display: flex;
    justify-content: center;
    gap: 3px;
    margin-bottom: 4px;
    min-height: 20px;
  }
  .form-square {
    width: 22px;
    height: 22px;
    border-radius: 3px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    font-size: 12px;
    color: #000;
  }
  .form-square-V { background: var(--win); }
  .form-square-P { background: var(--draw); }
  .form-square-S { background: var(--lose); }
  .form-pct-compact {
    font-size: 22px;
    font-weight: bold;
    color: var(--accent);
    line-height: 1;
  }
  .form-bar { 
    height: 6px; 
    background: var(--card); 
    border-radius: 3px; 
    overflow: hidden; 
    margin-top: 4px;
  }
  .form-bar-fill { 
    height: 100%; 
    background: linear-gradient(90deg, var(--win), var(--accent)); 
    transition: width 0.3s; 
  }
  .form-diff {
    text-align: center;
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 4px;
  }
  .form-diff span {
    font-weight: bold;
    color: var(--accent);
  }
  .bet-row {
    display: flex;
    justify-content: space-around;
    gap: 6px;
    margin-top: 8px;
    flex-wrap: wrap;
  }
  .bet-item {
    background: var(--surface);
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 12px;
    border: 1px solid var(--border);
    text-align: center;
    flex: 1;
    min-width: 70px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .bet-item:hover { background: var(--card); }
  .bet-item .bet-label {
    font-size: 10px;
    text-transform: uppercase;
    font-weight: 600;
    letter-spacing: 0.3px;
  }
  .bet-item .bet-value {
    font-weight: bold;
    font-size: 14px;
  }
  
  .tab-header { 
    padding: 4px 12px; 
    border-radius: 6px; 
    margin-bottom: 6px; 
    text-align: center; 
    color: #fff; 
    font-weight: bold; 
    font-size: 13px; 
    display: inline-block;
  }
  .match-info { 
    text-align: center; 
    color: var(--text-muted); 
    font-size: 12px; 
    margin-bottom: 6px; 
  }
  
  .standings-table-wrap { overflow-x: auto; }
  .standings-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    min-width: 600px;
  }
  .standings-table th {
    background: var(--surface);
    color: var(--text-muted);
    padding: 8px 6px;
    text-align: left;
    border-bottom: 2px solid var(--border);
    font-weight: 600;
    text-transform: uppercase;
    font-size: 11px;
    white-space: nowrap;
  }
  .standings-table td {
    padding: 6px 6px;
    border-bottom: 1px solid var(--border);
  }
  .standings-table tr.highlighted td {
    background: var(--accent) !important;
    color: #000 !important;
    font-weight: bold;
  }
  .standings-table tr:hover td { background: var(--card); }
  .standings-table .pos {
    font-weight: bold;
    color: var(--accent);
    text-align: center;
  }
  .standings-table .team-name { font-weight: bold; }
  .standings-table .num { text-align: center; }
  .standings-table .points {
    font-weight: bold;
    color: var(--accent);
    text-align: center;
  }
  
  .sub-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .sub-tabs button {
    padding: 8px 16px;
    background: var(--surface);
    color: var(--text-muted);
    border: 1px solid var(--border);
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
  }
  .sub-tabs button.active {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
  }
  
  .detail-section { margin-bottom: 20px; }
  .detail-section h4 {
    color: var(--accent);
    margin-bottom: 10px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 6px;
    font-size: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .detail-stat-box {
    padding: 8px 12px;
    border-radius: 8px;
    text-align: center;
    border: 1px solid var(--border);
    background: var(--surface);
    transition: background 0.2s, transform 0.1s;
    min-width: 60px;
    flex: 1;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .detail-stat-box:hover { transform: scale(1.02); }
  .detail-stat-box .label {
    display: block;
    font-size: 14px;
    font-weight: 600;
    color: #ffff00;
    margin-bottom: 2px;
  }
  .detail-stat-box .value {
    display: block;
    font-size: 20px;
    font-weight: bold;
  }
  .detail-stat-box .bomb-icon {
    display: inline-block;
    font-size: 20px;
    animation: bomb-bounce 0.8s infinite ease-in-out;
    transform-origin: center;
    margin-left: 4px;
  }
  .detail-stat-box.flag-red { background: var(--lose); }
  .detail-stat-box.flag-red .value { color: #000; }
  .detail-stat-box.flag-neutral { background: var(--pct-neutro); }
  .detail-stat-box.flag-neutral .value { color: #000; }
  .detail-stat-box.flag-green { background: var(--win); }
  .detail-stat-box.flag-green .value { color: #000; }
  .detail-stat-box.flag-gold { background: var(--accent); }
  .detail-stat-box.flag-gold .value { color: #000; }
  .detail-stat-box.flag-bomb { 
    background: var(--accent); 
    animation: bomb-glow 1s infinite alternate;
  }
  .detail-stat-box.flag-bomb .value { color: #000; }
  
  @keyframes bomb-bounce {
    0% { transform: scale(1) rotate(0deg); }
    50% { transform: scale(1.3) rotate(10deg); }
    100% { transform: scale(1) rotate(0deg); }
  }
  @keyframes bomb-glow {
    0% { box-shadow: 0 0 8px var(--accent); }
    100% { box-shadow: 0 0 30px #ffaa00; }
  }
  .detail-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 6px;
  }
  .detail-row .detail-stat-box { flex: 1; min-width: 60px; }
  
  .opponents-row {
    display: flex;
    flex-wrap: wrap;
    justify-content: space-between;
    gap: 12px;
    margin: 8px 0;
  }
  .opponents-col {
    flex: 1;
    min-width: 120px;
    background: var(--surface);
    padding: 8px;
    border-radius: 6px;
  }
  .opponents-col .opp-item {
    font-size: 12px;
    padding: 2px 0;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .opponents-col .opp-item:last-child { border-bottom: none; }
  .opp-result-indicator {
    display: inline-block;
    width: 14px;
    height: 14px;
    border-radius: 3px;
    margin-right: 4px;
    vertical-align: middle;
  }
  .opp-result-indicator.win { background: var(--win); }
  .opp-result-indicator.draw { background: var(--draw); }
  .opp-result-indicator.loss { background: var(--lose); }
  .opp-form-pct {
    font-size: 24px;
    font-weight: bold;
    color: var(--accent);
    text-align: center;
    margin-top: 6px;
  }
  .opp-form-bar {
    height: 8px;
    background: var(--card);
    border-radius: 4px;
    overflow: hidden;
    margin-top: 4px;
  }
  .opp-form-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--win), var(--accent));
    transition: width 0.3s;
  }
  
  .stats-two-col {
    display: grid;
    grid-template-columns: 1fr 1.2fr;
    gap: 20px;
  }
  @media (max-width: 768px) { .stats-two-col { grid-template-columns: 1fr; } }
  
  .stats-placeholder {
    text-align: center;
    padding: 40px;
    color: var(--text-muted);
    font-size: 16px;
  }
  
  /* Meteo nell'analisi AI */
.ai-analysis-box .weather-display {
  background: var(--card);
  border-radius: 8px;
  padding: 12px 16px;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 8px;
  border: 1px solid var(--border);
}

.ai-analysis-box .weather-display .weather-main {
  display: flex;
  align-items: center;
  gap: 12px;
}

.ai-analysis-box .weather-display .weather-icon {
  font-size: 32px;
}

.ai-analysis-box .weather-display .weather-temp {
  font-size: 24px;
  font-weight: bold;
  color: var(--accent);
}

.ai-analysis-box .weather-display .weather-desc {
  font-size: 13px;
  color: var(--text-muted);
}

.ai-analysis-box .weather-display .weather-details {
  display: flex;
  gap: 16px;
  font-size: 12px;
  color: var(--text-muted);
}

@media (max-width: 768px) {
  .ai-analysis-box .weather-display {
    flex-direction: column;
    align-items: flex-start;
  }
  .ai-analysis-box .weather-display .weather-details {
    flex-wrap: wrap;
    gap: 8px;
  }
}
  
  .ai-analysis-loading {
    text-align: center;
    padding: 20px;
    color: var(--text-muted);
    font-size: 14px;
  }
  .ai-analysis-error {
    background: var(--surface);
    padding: 14px 16px;
    border-radius: 8px;
    margin-top: 16px;
    border-left: 4px solid var(--lose);
    text-align: center;
  }
  .ai-analysis-error .btn-go-key {
    margin-top: 8px;
    background: var(--accent);
    border: none;
    padding: 6px 16px;
    border-radius: 6px;
    color: #000;
    font-weight: bold;
    cursor: pointer;
  }
  .ai-analysis-error .btn-go-key:hover { background: var(--accent2); }
  
  /* Risultati Frequenti - Caratteri più grandi */
.freq-table-wrap {
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  margin: 0 -8px;
  padding: 0 8px;
}

.freq-table {
  width: 100%;
  min-width: 400px;
  border-collapse: collapse;
  font-size: 16px;
}

.freq-table th {
  background: var(--surface);
  color: var(--text-muted);
  padding: 10px 12px;
  text-align: center;
  border-bottom: 2px solid var(--border);
  font-weight: 700;
  font-size: 14px;
  text-transform: uppercase;
  white-space: nowrap;
}

.freq-table td {
  padding: 10px 12px;
  text-align: center;
  border-bottom: 1px solid var(--border);
  font-size: 16px;
}

.freq-table td:first-child {
  font-size: 17px;
  font-weight: bold;
  color: var(--accent);
}

.freq-table td:nth-child(2) {
  font-size: 22px;
  font-weight: bold;
}

.freq-table td:nth-child(3) {
  font-size: 17px;
  font-weight: bold;
}

.freq-table td:nth-child(4) {
  font-size: 17px;
  font-weight: bold;
}

.freq-table td:nth-child(4) .form-bar {
  height: 8px;
  width: 60px;
}

.freq-result-badge {
  display: inline-block;
  padding: 5px 14px;
  border-radius: 14px;
  font-size: 14px;
  font-weight: bold;
}
.freq-result-badge.win { background: var(--win); color: #000; }
.freq-result-badge.draw { background: var(--draw); color: #000; }
.freq-result-badge.loss { background: var(--lose); color: #fff; }

/* Card header più grande */
.card:has(.freq-table) h4,
.card:has(.freq-table-wrap) h4 {
  font-size: 18px !important;
}

/* Responsive per mobile */
@media (max-width: 768px) {
  .freq-table {
    font-size: 14px;
    min-width: 350px;
  }
  .freq-table th {
    font-size: 12px;
    padding: 6px 6px;
  }
  .freq-table td {
    font-size: 14px;
    padding: 6px 6px;
  }
  .freq-table td:first-child {
    font-size: 15px;
  }
  .freq-table td:nth-child(2) {
    font-size: 19px;
  }
  .freq-table td:nth-child(3) {
    font-size: 15px;
  }
  .freq-table td:nth-child(4) {
    font-size: 15px;
  }
  .freq-table td:nth-child(4) .form-bar {
    height: 6px;
    width: 40px;
  }
}

@media (max-width: 480px) {
  .freq-table {
    font-size: 12px;
    min-width: 280px;
  }
  .freq-table th {
    font-size: 10px;
    padding: 4px 4px;
  }
  .freq-table td {
    font-size: 12px;
    padding: 4px 4px;
  }
  .freq-table td:first-child {
    font-size: 13px;
  }
  .freq-table td:nth-child(2) {
    font-size: 16px;
  }
  .freq-table td:nth-child(3) {
    font-size: 13px;
  }
  .freq-table td:nth-child(4) {
    font-size: 13px;
  }
  .freq-table td:nth-child(4) .form-bar {
    height: 5px;
    width: 30px;
  }
}
  
  /* Intervalli */
  .intervalli-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 12px;
    margin-top: 8px;
  }
  .interval-item {
    background: var(--surface);
    padding: 12px;
    border-radius: 8px;
    text-align: center;
    border: 1px solid var(--border);
  }
  
  /* Weather */
  .weather-impact-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
    margin-top: 8px;
  }
  .weather-stat {
    background: var(--surface);
    padding: 12px;
    border-radius: 8px;
    text-align: center;
    border: 1px solid var(--border);
  }
  .weather-stat .weather-icon { font-size: 28px; }
  .weather-stat .weather-label { 
    font-size: 12px; 
    font-weight: bold;
    text-transform: capitalize;
    margin: 4px 0;
  }
  .weather-stat .weather-pct { font-size: 11px; margin: 4px 0; }
  .weather-stat .weather-count { font-size: 10px; color: var(--text-muted); margin-top: 4px; }
  
  /* Schedina */
  .schedina-controls {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: center;

    .map(([name, id]) => ({ name, id, isDefault: true }));
  const custom = customLeagues.filter(l => !blacklist.includes(l.id)).map(l => ({ ...l, isDefault: false }));
  return [...defaultLeagues, ...custom];
};

const fetchSofaScoreMatches = async (leagueId, seasonYear) => {
  try {
    const seasonsRes = await fetch(`https://api.sofascore.com/api/v1/unique-tournament/${leagueId}/seasons`);
    if (!seasonsRes.ok) throw new Error('Errore nel recupero stagioni');
    const seasonsData = await seasonsRes.json();
    let targetSeasonId = null;
    if (seasonsData.seasons) {
      for (const season of seasonsData.seasons) {
        const seasonName = season.name || '';
        if (seasonYear === '26/27' && seasonName.includes('2026/2027')) { targetSeasonId = season.id; break; }
        if (seasonYear === '25/26' && seasonName.includes('2025/2026')) { targetSeasonId = season.id; break; }
        if (seasonYear === '24/25' && seasonName.includes('2024/2025')) { targetSeasonId = season.id; break; }
        if (seasonYear === '23/24' && seasonName.includes('2023/2024')) { targetSeasonId = season.id; break; }
      }
    }
    if (!targetSeasonId && seasonsData.seasons && seasonsData.seasons.length > 0) {
      targetSeasonId = seasonsData.seasons[0].id;
    }
    if (!targetSeasonId) throw new Error('Nessuna stagione disponibile');
    let allEvents = [];
    let round = 1;
    let hasMore = true;
    while (hasMore && round <= 40) {
      try {
        const url = `https://api.sofascore.com/api/v1/unique-tournament/${leagueId}/season/${targetSeasonId}/events/round/${round}`;
        const res = await fetch(url);
        if (!res.ok) { if (res.status === 404) { hasMore = false; break; } throw new Error(`HTTP ${res.status}`); }
        const data = await res.json();
        if (data.events && data.events.length > 0) allEvents = [...allEvents, ...data.events];
        round++;
        await new Promise(r => setTimeout(r, 100));
      } catch (e) { hasMore = false; }
    }
    return allEvents;
  } catch (e) { console.error('Errore fetch SofaScore:', e); return []; }
};

const parseDate = (dateStr, timeStr = '00:00') => {
  if (!dateStr) return new Date(0);
  
  if (dateStr.match(/^\d{4}-\d{2}-\d{2}/)) {
    return new Date(dateStr + 'T' + (timeStr || '00:00') + ':00');
  }
  
  if (dateStr.match(/^\d{2}\/\d{2}\/\d{4}/)) {
    const parts = dateStr.split('/');
    const day = parseInt(parts[0], 10);
    const month = parseInt(parts[1], 10) - 1;
    const year = parseInt(parts[2], 10);
    
    let hours = 0, minutes = 0;
    if (timeStr && timeStr !== 'TBD' && timeStr !== 'N/D') {
      const timeParts = timeStr.split(':');
      if (timeParts.length >= 2) {
        hours = parseInt(timeParts[0], 10) || 0;
        minutes = parseInt(timeParts[1], 10) || 0;
      }
    }
    
    return new Date(year, month, day, hours, minutes);
  }
  
  try {
    return new Date(dateStr + ' ' + (timeStr || '00:00'));
  } catch(e) {
    return new Date(0);
  }
};

const calcFormAndStats = (matches, teamName) => {
  const played = matches
    .filter(m => m.stato === 'Giocata' && (m.casa === teamName || m.ospiti === teamName))
    .sort((a, b) => {
      const dateA = parseDate(a.data, a.ora);
      const dateB = parseDate(b.data, b.ora);
      return dateB - dateA;
    })
    .slice(0, 5);
  
  let form = '', points = 0;
  let golFatti = 0, golSubiti = 0;
  
  played.forEach(m => {
    const isHome = m.casa === teamName;
    const teamGoals = isHome ? m.golCasa : m.golOspite;
    const oppGoals = isHome ? m.golOspite : m.golCasa;
    
    golFatti += teamGoals;
    golSubiti += oppGoals;
    
    if (teamGoals > oppGoals) {
      form += 'V';
      points += 3;
    } else if (teamGoals === oppGoals) {
      form += 'P';
      points += 1;
    } else {
      form += 'S';
    }
  });
  
  return {
    form: form || '-----',
    pct: played.length ? Math.round((points / (played.length * 3)) * 100) : 50,
    golFatti,
    golSubiti,
    mediaGolFatti: played.length ? (golFatti / played.length).toFixed(1) : 0,
    mediaGolSubiti: played.length ? (golSubiti / played.length).toFixed(1) : 0,
    partite: played.length
  };
};

const computeMatchStats = (match, allMatches) => {
  const homeTeam = match.casa;
  const awayTeam = match.ospiti;
  
  const homeGames = allMatches.filter(m => m.stato === 'Giocata' && (m.casa === homeTeam || m.ospiti === homeTeam));
  const awayGames = allMatches.filter(m => m.stato === 'Giocata' && (m.casa === awayTeam || m.ospiti === awayTeam));
  
  const allGamesMap = new Map();
  [...homeGames, ...awayGames].forEach(g => {
    if (!allGamesMap.has(g.id)) {
      allGamesMap.set(g.id, g);
    }
  });
  const allGames = Array.from(allGamesMap.values());
  const totalGames = allGames.length;
  
  if (totalGames === 0) return { error: 'Nessuna partita giocata per queste squadre.' };
  
  // Statistiche casa
  let homeWins = 0, homeDraws = 0, homeLosses = 0;
  let homeGoalsScored = 0, homeGoalsConceded = 0;
  
  homeGames.forEach(g => {
    const isHome = g.casa === homeTeam;
    const teamGoals = isHome ? g.golCasa : g.golOspite;
    const oppGoals = isHome ? g.golOspite : g.golCasa;
    
    homeGoalsScored += teamGoals;
    homeGoalsConceded += oppGoals;
    
    if (teamGoals > oppGoals) homeWins++;
    else if (teamGoals === oppGoals) homeDraws++;
    else homeLosses++;
  });
  
  // Statistiche ospite
  let awayWins = 0, awayDraws = 0, awayLosses = 0;
  let awayGoalsScored = 0, awayGoalsConceded = 0;
  
  awayGames.forEach(g => {
    const isHome = g.casa === awayTeam;
    const teamGoals = isHome ? g.golCasa : g.golOspite;
    const oppGoals = isHome ? g.golOspite : g.golCasa;
    
    awayGoalsScored += teamGoals;
    awayGoalsConceded += oppGoals;
    
    if (teamGoals > oppGoals) awayWins++;
    else if (teamGoals === oppGoals) awayDraws++;
    else awayLosses++;
  });
  
  // FISSE - secondo la formula corretta
  const p1 = totalGames > 0 ? ((homeWins + awayLosses) / totalGames) * 100 : 0;
  const pX = totalGames > 0 ? ((homeDraws + awayDraws) / totalGames) * 100 : 0;
  const p2 = totalGames > 0 ? ((homeLosses + awayWins) / totalGames) * 100 : 0;
  
  // DOPPIA CHANCE - secondo la formula corretta
  const p1X = totalGames > 0 ? ((homeWins + homeDraws) / totalGames) * 100 : 0;
  const p12 = totalGames > 0 ? ((homeWins + awayWins) / totalGames) * 100 : 0;
  const pX2 = totalGames > 0 ? ((homeLosses + awayWins) / totalGames) * 100 : 0;
  
  // UNDER / OVER
  const allGamesForGoals = [...homeGames, ...awayGames];
  const goalTotals = allGamesForGoals.map(g => g.golCasa + g.golOspite);
  const thresholds = [1.5, 2.5, 3.5, 4.5];
  const underOver = thresholds.map(t => {
    const over = goalTotals.filter(gt => gt > t).length / goalTotals.length * 100;
    const under = 100 - over;
    return { threshold: t, under, over };
  });
  
  // MULTIGOL
  const getMultigolV2 = (team, games) => {
    const goals = games.map(g => (g.casa === team) ? g.golCasa : g.golOspite);
    const total = goals.length;
    if (total === 0) return { '0-1': 0, '0-2': 0, '1-3': 0, '2-4': 0 };
    
    const count = (pred) => goals.filter(pred).length / total * 100;
    return {
      '0-1': count(g => g <= 1),
      '0-2': count(g => g <= 2),
      '1-3': count(g => g >= 1 && g <= 3),
      '2-4': count(g => g >= 2 && g <= 4)
    };
  };
  
  const homeMG = getMultigolV2(homeTeam, homeGames);
  const awayMG = getMultigolV2(awayTeam, awayGames);
  
  const totalGoals = allGamesForGoals.map(g => g.golCasa + g.golOspite);
  const mgTot = {
    '1-4': totalGoals.filter(g => g >= 1 && g <= 4).length / totalGoals.length * 100,
    '2-4': totalGoals.filter(g => g >= 2 && g <= 4).length / totalGoals.length * 100,
    '2-5': totalGoals.filter(g => g >= 2 && g <= 5).length / totalGoals.length * 100,
    '3-6': totalGoals.filter(g => g >= 3 && g <= 6).length / totalGoals.length * 100,
  };
  
  return {
    p1, pX, p2,
    p1X, p12, pX2,
    underOver,
    homeMG, awayMG, mgTot,
    homeGames, awayGames,
    homeStats: {
      wins: homeWins,
      draws: homeDraws,
      losses: homeLosses,
      goalsScored: homeGoalsScored,
      goalsConceded: homeGoalsConceded,
      played: homeGames.length
    },
    awayStats: {
      wins: awayWins,
      draws: awayDraws,
      losses: awayLosses,
      goalsScored: awayGoalsScored,
      goalsConceded: awayGoalsConceded,
      played: awayGames.length
    },
    totalGames
  };
};

const get12Under45 = (allMatches, homeTeam, awayTeam) => {
  const homeGames = allMatches.filter(m => m.stato === 'Giocata' && (m.casa === homeTeam || m.ospiti === homeTeam));
  const awayGames = allMatches.filter(m => m.stato === 'Giocata' && (m.casa === awayTeam || m.ospiti === awayTeam));
  const allGames = [...homeGames, ...awayGames];
  const uniqueGames = Array.from(new Map(allGames.map(g => [g.id, g])).values());
  
  if (!uniqueGames.length) return 0;
  
  const count = uniqueGames.filter(g => {
    const total = g.golCasa + g.golOspite;
    return g.golCasa !== g.golOspite && total < 4.5;
  }).length;
  
  return (count / uniqueGames.length) * 100;
};

const getMultigolRange = (teamName, allMatches) => {
  const matches = allMatches.filter(m => m.stato === 'Giocata' && (m.casa === teamName || m.ospiti === teamName));
  if (matches.length === 0) return { label: 'N/A', pct: 0, range: 'default', details: [] };
  
  const goals = matches.map(m => (m.casa === teamName) ? m.golCasa : m.golOspite);
  const total = goals.length;
  
  const range01 = goals.filter(g => g <= 1).length / total * 100;
  const range02 = goals.filter(g => g <= 2).length / total * 100;
  const range13 = goals.filter(g => g >= 1 && g <= 3).length / total * 100;
  const range24 = goals.filter(g => g >= 2 && g <= 4).length / total * 100;
  const range25 = goals.filter(g => g >= 2 && g <= 5).length / total * 100;
  const range36 = goals.filter(g => g >= 3 && g <= 6).length / total * 100;
  
  const ranges = [
    { label: '0-1', pct: range01, range: '01' },
    { label: '0-2', pct: range02, range: '02' },
    { label: '1-3', pct: range13, range: '13' },
    { label: '2-4', pct: range24, range: '24' },
    { label: '2-5', pct: range25, range: '25' },
    { label: '3-6', pct: range36, range: '36' },
  ];
  
  const best = ranges.reduce((a, b) => a.pct > b.pct ? a : b);
  return {
    label: best.label,
    pct: Math.round(best.pct),
    range: best.range,
    details: ranges.map(r => ({ ...r, pct: Math.round(r.pct) }))
  };
};

const getBestFreeCombo = (stats, homeMG, awayMG, mgTot) => {
  if (stats.error) return { label: 'N/A', pct: 0 };
  
  const { p1X, p12, pX2, underOver } = stats;
  const over15 = underOver[0].over;
  const under35 = underOver[2].under;
  
  const candidates = [];
  
  candidates.push({ label: '1X', pct: p1X });
  candidates.push({ label: '12', pct: p12 });
  candidates.push({ label: 'X2', pct: pX2 });
  candidates.push({ label: 'Over 1.5', pct: over15 });
  candidates.push({ label: 'Under 3.5', pct: under35 });
  
  for (const [label, pct] of Object.entries(mgTot)) {
    let displayLabel = label === '2-4' ? 'Over 1,5' : label;
    candidates.push({ label: `MG Tot ${displayLabel}`, pct });
  }
  
  for (const [label, pct] of Object.entries(homeMG)) {
    let displayLabel = label === '2-4' ? 'Over 1,5' : label;
    candidates.push({ label: `MG Casa ${displayLabel}`, pct });
  }
  
  for (const [label, pct] of Object.entries(awayMG)) {
    let displayLabel = label === '2-4' ? 'Over 1,5' : label;
    candidates.push({ label: `MG Ospite ${displayLabel}`, pct });
  }
  
  candidates.push({ label: '1X+Over1.5', pct: (p1X + over15) / 2 });
  candidates.push({ label: '12+Over1.5', pct: (p12 + over15) / 2 });
  candidates.push({ label: 'X2+Over1.5', pct: (pX2 + over15) / 2 });
  candidates.push({ label: '1X+Under3.5', pct: (p1X + under35) / 2 });
  candidates.push({ label: '12+Under3.5', pct: (p12 + under35) / 2 });
  candidates.push({ label: 'X2+Under3.5', pct: (pX2 + under35) / 2 });
  
  for (const [mgLabel, mgPct] of Object.entries(mgTot)) {
    let displayLabel = mgLabel === '2-4' ? 'Over 1,5' : mgLabel;
    candidates.push({ label: `1X+MG Tot ${displayLabel}`, pct: (p1X + mgPct) / 2 });
    candidates.push({ label: `12+MG Tot ${displayLabel}`, pct: (p12 + mgPct) / 2 });
    candidates.push({ label: `X2+MG Tot ${displayLabel}`, pct: (pX2 + mgPct) / 2 });
  }
  
  for (const [homeLabel, homePct] of Object.entries(homeMG)) {
    for (const [awayLabel, awayPct] of Object.entries(awayMG)) {
      let displayHome = homeLabel === '2-4' ? 'Over 1,5' : homeLabel;
      let displayAway = awayLabel === '2-4' ? 'Over 1,5' : awayLabel;
      candidates.push({
        label: `MG Casa ${displayHome} + MG Ospite ${displayAway}`,
        pct: (homePct + awayPct) / 2
      });
    }
  }
  
  let best = candidates.reduce((a, b) => a.pct > b.pct ? a : b);
  best.pct = Math.round(best.pct);
  return best;
};

const calcTeamMG = (matches, teamName) => {
  const played = matches.filter(m => m.stato === 'Giocata' && (m.casa === teamName || m.ospiti === teamName));
  if (!played.length) return '0.0-0.0';
  let scored = 0, conceded = 0;
  played.forEach(m => {
    if (m.casa === teamName) { scored += m.golCasa; conceded += m.golOspite; }
    else { scored += m.golOspite; conceded += m.golCasa; }
  });
  return `${(scored/played.length).toFixed(1)}-${(conceded/played.length).toFixed(1)}`;
};

const formatDateEU = (dateStr) => {
  if (!dateStr) return 'N/D';
  
  if (dateStr.match(/^\d{2}\/\d{2}\/\d{4}/)) {
    return dateStr;
  }
  
  if (dateStr.match(/^\d{4}-\d{2}-\d{2}/)) {
    const [y, m, d] = dateStr.split('-');
    return `${d}/${m}/${y}`;
  }
  
  try {
    const date = new Date(dateStr);
    if (!isNaN(date.getTime())) {
      return `${String(date.getDate()).padStart(2, '0')}/${String(date.getMonth() + 1).padStart(2, '0')}/${date.getFullYear()}`;
    }
  } catch(e) {}
  
  return 'N/D';
};

const getPercentualeClasse = (valore) => {
  if (valore < 33) return 'pct-rosso';
  if (valore < 66) return 'pct-neutro';
  if (valore < 90) return 'pct-verde';
  return 'pct-oro';
};

const getChampColor = (champName) => {
  if (!champName) return '#95a5a6';
  for (const [key, color] of Object.entries(CHAMPIONSHIP_COLORS)) {
    if (champName.toLowerCase().includes(key.toLowerCase()) || key.toLowerCase().includes(champName.toLowerCase())) {
      return color;
    }
  }
  let hash = 0;
  for (let i = 0; i < champName.length; i++) {
    hash = champName.charCodeAt(i) + ((hash << 5) - hash);
  }
  const hue = Math.abs(hash) % 360;
  return `hsl(${hue}, 65%, 50%)`;
};

const getCittaFromChampionship = (champName) => {
  if (!champName) return null;
  
  for (const [key, city] of Object.entries(CITTÀ_PER_CAMPIONATO)) {
    if (champName.toLowerCase().includes(key.toLowerCase()) || key.toLowerCase().includes(champName.toLowerCase())) {
      return city;
    }
  }
  return 'Stoccolma';
};

                </td>

            })}
          </tbody>
        </table>
      </div>
    </div>
  );
};

const RisultatiFrequenti = ({ teamName, allMatches }) => {
  const getFrequenti = (team) => {
    const matches = allMatches
      .filter(m => m.stato === 'Giocata' && (m.casa === team || m.ospiti === team))
      .sort((a,b) => {
        const dateA = parseDate(a.data, a.ora);
        const dateB = parseDate(b.data, b.ora);
        return dateB - dateA;
      });
    
    if (matches.length === 0) return [];
    
    const freq = {};
    matches.forEach(m => {
      const isHome = m.casa === team;
      const teamGoals = isHome ? m.golCasa : m.golOspite;
      const oppGoals = isHome ? m.golOspite : m.golCasa;
      
      let resultType = '';
      if (teamGoals > oppGoals) resultType = 'V';
      else if (teamGoals === oppGoals) resultType = 'P';
      else resultType = 'S';
      
      const key = `${teamGoals}-${oppGoals}`;
      if (!freq[key]) {
        freq[key] = { 
          risultato: key, 
          count: 0, 
          tipo: resultType,
          golFatti: teamGoals,
          golSubiti: oppGoals
        };
      }
      freq[key].count++;
    });
    
    return Object.values(freq)
      .sort((a, b) => b.count - a.count)
      .slice(0, 8);
  };

  const data = getFrequenti(teamName);
  if (data.length === 0) {
    return (
      <div className="card" style={{height: '100%', minHeight: '200px'}}>
        <h4>📊 Risultati Frequenti - {teamName}</h4>
        <div style={{textAlign: 'center', padding: '20px', color: 'var(--text-muted)'}}>
          Nessuna partita disponibile per {teamName}
        </div>
      </div>
    );
  }

  const totalMatches = data.reduce((sum, d) => sum + d.count, 0);
  
  const getResultColor = (tipo) => {
    if (tipo === 'V') return 'var(--win)';
    if (tipo === 'P') return 'var(--draw)';
    return 'var(--lose)';
  };

  return (
    <div className="card" style={{height: '100%', minHeight: '280px', overflow: 'hidden'}}>
      <h4 style={{fontSize: '14px', marginBottom: '4px'}}>📊 Risultati Frequenti - {teamName}</h4>
      <div style={{fontSize: '11px', color: 'var(--text-muted)', marginBottom: '6px'}}>
        📅 {totalMatches} partite giocate
      </div>
      <div className="freq-table-wrap">
        <table className="freq-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Risultato</th>
              <th>Freq.</th>
              <th>%</th>
            </tr>
          </thead>
          <tbody>
            {data.map((d, idx) => {
              const pct = Math.round((d.count / totalMatches) * 100);
              const color = getResultColor(d.tipo);
              
              return (
                <tr key={idx}>
                  <td style={{fontWeight: 'bold', color: 'var(--accent)'}}>#{idx + 1}</td>
                  <td>
                    <div style={{
                      display: 'flex',
                      alignItems: 'center',
                      gap: '8px',
                      justifyContent: 'center'
                    }}>
                      <span style={{
                        display: 'inline-block',
                        width: '24px',
                        height: '24px',
                        borderRadius: '4px',
                        backgroundColor: color,
                        border: '1px solid var(--border)',
                        flexShrink: 0
                      }} />
                      <span style={{
                        fontSize: '16px',
                        fontWeight: 'bold',
                        color: color
                      }}>
                        {d.risultato}
                      </span>
                    </div>
                  </td>
                  <td style={{fontWeight: 'bold'}}>{d.count}x</td>
                  <td>
                    <div style={{display: 'flex', alignItems: 'center', gap: '4px', justifyContent: 'center'}}>
                      <span style={{fontWeight: 'bold', color: color, fontSize: '13px'}}>{pct}%</span>
                      <div className="form-bar" style={{width: '40px', margin: '0'}}>
                        <div className="form-bar-fill" style={{
                          width: `${Math.min(pct, 100)}%`,
                          background: color
                        }} />
                      </div>
                    </div>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
};

const IndiceAffidabilita = ({ teamName, allMatches }) => {
  const teamMatches = allMatches.filter(m => m.stato === 'Giocata' && (m.casa === teamName || m.ospiti === teamName));
  const count = teamMatches.length;
  if (count === 0) return null;
  const affidabilita = Math.min(count / 20 * 100, 100);
  const results = teamMatches.map(m => {
    const isHome = m.casa === teamName;
    const teamGoals = isHome ? m.golCasa : m.golOspite;
    const oppGoals = isHome ? m.golOspite : m.golCasa;
    return teamGoals > oppGoals ? 3 : (teamGoals === oppGoals ? 1 : 0);
  });
  const media = results.reduce((s, r) => s + r, 0) / results.length;
  const varianza = results.reduce((s, r) => s + Math.pow(r - media, 2), 0) / results.length;
  const stabilita = Math.max(0, 100 - (varianza / 4 * 100));
  return (
    <div className="card">
      <h4>🎯 Indice di Affidabilità - {teamName}</h4>
      <div className="affidabilita-grid">
        <div className="affidabilita-item">
          <div className="affidabilita-value" style={{color: affidabilita > 70 ? 'var(--win)' : 'var(--draw)'}}>{Math.round(affidabilita)}%</div>
          <div className="affidabilita-label">Affidabilità</div>
          <div className="form-bar"><div className="form-bar-fill" style={{width: `${affidabilita}%`, background: affidabilita > 70 ? 'var(--win)' : 'var(--draw)'}} /></div>
        </div>
        <div className="affidabilita-item">
          <div className="affidabilita-value" style={{color: stabilita > 60 ? 'var(--win)' : 'var(--draw)'}}>{Math.round(stabilita)}%</div>
          <div className="affidabilita-label">Stabilità</div>
          <div className="form-bar"><div className="form-bar-fill" style={{width: `${stabilita}%`, background: stabilita > 60 ? 'var(--win)' : 'var(--draw)'}} /></div>
        </div>
        <div className="affidabilita-item">
          <div className="affidabilita-value">{count}</div>
          <div className="affidabilita-label">Partite analizzate</div>
          <div style={{fontSize: '11px', color: 'var(--text-muted)'}}>{count < 10 ? '⚠️ Poche partite' : '✅ Campione sufficiente'}</div>
        </div>
      </div>
    </div>
  );
};

const PrevisioneIntervallo = ({ match, allMatches }) => {
  const stats = computeMatchStats(match, allMatches);
  if (stats.error) return null;
  const homeGoals = allMatches.filter(m => m.stato === 'Giocata' && m.casa === match.casa).map(m => m.golCasa);
  const awayGoals = allMatches.filter(m => m.stato === 'Giocata' && m.ospiti === match.ospiti).map(m => m.golOspite);
  const allGoals = [...homeGoals, ...awayGoals];
  if (allGoals.length === 0) return null;
  const mean = allGoals.reduce((s, g) => s + g, 0) / allGoals.length;
  const std = Math.sqrt(allGoals.reduce((s, g) => s + Math.pow(g - mean, 2), 0) / allGoals.length);
  const intervals = [
    { label: '68%', min: Math.max(0, Math.round(mean - std)), max: Math.round(mean + std) },
    { label: '95%', min: Math.max(0, Math.round(mean - 2 * std)), max: Math.round(mean + 2 * std) },
  ];
  return (
    <div className="card">
      <h4>📊 Previsione Gol con Intervalli di Confidenza</h4>
      <div className="intervalli-grid">
        {intervals.map((interval, i) => (
          <div key={i} className="interval-item">
            <div style={{fontSize: '11px', color: 'var(--text-muted)'}}>{interval.label}</div>

          </div>
        ))}
      </div>
      <div style={{fontSize: '12px', color: 'var(--text-muted)', marginTop: '8px', textAlign: 'center'}}>
        ⚽ Media gol: {mean.toFixed(2)} | Deviazione std: {std.toFixed(2)} | Basato su {allGoals.length} partite
      </div>
    </div>
  );
};

const AnalisiMeteo = ({ matches, weatherCache }) => {
  const analyzeWeatherImpact = () => {
    const analysis = {
      pioggia: { totale: 0, over25: 0, gol: 0, over35: 0 },
      sole: { totale: 0, over25: 0, gol: 0, over35: 0 },
      vento: { totale: 0, over25: 0, gol: 0, over35: 0 },
      freddo: { totale: 0, over25: 0, gol: 0, over35: 0 },
    };
    matches.filter(m => m.stato === 'Giocata').forEach(m => {
      const weather = weatherCache[`${m.campionato}_${m.data}`];
      if (!weather) return;
      const total = m.golCasa + m.golOspite;
      const isOver25 = total > 2.5;
      const isOver35 = total > 3.5;
      const isGol = m.golCasa > 0 && m.golOspite > 0;
      let condition = 'sole';
      if (weather.rain > 1) condition = 'pioggia';
      else if (weather.wind_speed > 5) condition = 'vento';
      else if (weather.temp < 5) condition = 'freddo';
      analysis[condition].totale++;
      if (isOver25) analysis[condition].over25++;
      if (isOver35) analysis[condition].over35++;
      if (isGol) analysis[condition].gol++;
    });
    return analysis;
  };
  const data = analyzeWeatherImpact();
  const entries = Object.entries(data);
  if (entries.every(([_, s]) => s.totale === 0)) return null;
  return (
    <div className="card">
      <h4>🌤️ Impatto Meteo sui Risultati</h4>
      <div className="weather-impact-grid">
        {entries.map(([condition, stats]) => {
          const pctOver25 = stats.totale ? Math.round((stats.over25 / stats.totale) * 100) : 0;
          const pctOver35 = stats.totale ? Math.round((stats.over35 / stats.totale) * 100) : 0;
          const pctGol = stats.totale ? Math.round((stats.gol / stats.totale) * 100) : 0;
          const emoji = condition === 'pioggia' ? '🌧️' : (condition === 'vento' ? '💨' : (condition === 'freddo' ? '❄️' : '☀️'));
          return (
            <div key={condition} className="weather-stat">
              <div className="weather-icon">{emoji}</div>
              <div className="weather-label">{condition}</div>
              <div className="weather-pct">
                <span>Over 2.5: {pctOver25}%</span>
                <div className="form-bar"><div className="form-bar-fill" style={{width: `${pctOver25}%`, background: pctOver25 > 60 ? 'var(--win)' : 'var(--draw)'}} /></div>
              </div>
              <div className="weather-pct">
                <span>Over 3.5: {pctOver35}%</span>
                <div className="form-bar"><div className="form-bar-fill" style={{width: `${pctOver35}%`, background: pctOver35 > 40 ? 'var(--win)' : 'var(--draw)'}} /></div>
              </div>
              <div className="weather-pct">
                <span>Gol (GG): {pctGol}%</span>
                <div className="form-bar"><div className="form-bar-fill" style={{width: `${pctGol}%`, background: pctGol > 60 ? 'var(--win)' : 'var(--draw)'}} /></div>
              </div>
              <div className="weather-count">📊 {stats.totale} partite</div>
            </div>
          );
        })}
      </div>
    </div>
  );
};

// ============================================================

const askGroq = async (prompt, key) => {
  if (!key) throw new Error('🔑 API GROQ non configurata.');
  try {
    const r = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type':'application/json', 'Authorization': `Bearer ${key}` },
      body: JSON.stringify({
        model: 'llama-3.3-70b-versatile',
        messages: [{ role:'system', content:'Sei un esperto data scientist e analista tattico di calcio. Rispondi ESCLUSIVAMENTE in formato JSON valido.' }, { role:'user', content: prompt }]
      })
    });
    if (!r.ok) { const errorText = await r.text(); throw new Error(`Errore API GROQ: ${r.status} - ${errorText}`); }
    const d = await r.json();
    const content = d.choices?.[0]?.message?.content;
    if (!content) throw new Error('Groq non ha restituito una risposta valida.');
    return content;
  } catch(e) { throw new Error(e.message || 'Errore durante la richiesta a Groq.'); }
};

const TeamMatchesHistory = ({ teamName, championship, allMatches }) => {
  const teamMatches = allMatches
    .filter(m => m.campionato === championship && m.stato === 'Giocata' && (m.casa === teamName || m.ospiti === teamName))
    .sort((a, b) => {
      const dateA = parseDate(a.data, a.ora);
      const dateB = parseDate(b.data, b.ora);
      return dateB - dateA;
    });
  if (teamMatches.length === 0) return <div className="card" style={{padding: '12px', textAlign:'center'}}><p style={{color:'var(--text-muted)'}}>Nessuna partita giocata per {teamName} in questo campionato.</p></div>;
  const getResult = (match, team) => {
    const isHome = match.casa === team;
    const teamGoals = isHome ? match.golCasa : match.golOspite;
    const oppGoals = isHome ? match.golOspite : match.golCasa;
    if (teamGoals > oppGoals) return 'win';
    if (teamGoals === oppGoals) return 'draw';
    return 'loss';
  };
  const getOpponent = (match, team) => match.casa === team ? match.ospiti : match.casa;
  const getResultColor = (result) => result === 'win' ? 'var(--win)' : (result === 'draw' ? 'var(--draw)' : 'var(--lose)');
  return (
    <div className="card" style={{padding: '12px'}}>
      <h4 style={{color: getChampColor(teamName), marginBottom:'12px'}}>📋 {teamName}</h4>
      <div className="standings-table-wrap">
        <table className="standings-table history-table">
          <thead><tr><th>Data</th><th>Avversario</th><th style={{textAlign:'center'}}>Risultato</th></tr></thead>
          <tbody>
            {teamMatches.map(m => {
              const result = getResult(m, teamName);
              const opponent = getOpponent(m, teamName);
              const resultColor = getResultColor(result);
              return <tr key={m.id}><td style={{color: 'var(--text)'}}>{formatDateEU(m.data)}</td><td style={{color: 'var(--text)'}}>{opponent}</td><td style={{textAlign: 'center'}}><span style={{display: 'inline-block', backgroundColor: resultColor, color: '#000', fontWeight: 'bold', padding: '2px 12px', borderRadius: '4px', minWidth: '60px', textAlign: 'center', fontSize: '14px'}}>{m.golCasa} - {m.golOspite}</span></td></tr>;
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
};

const HeatmapGiocate = ({ matches, onSelectChampionship }) => {
  const [filterChamp, setFilterChamp] = useState('Tutti');
  
  const analyzeChampionships = () => {
    const champs = {};
    matches.filter(m => m.stato === 'Giocata').forEach(m => {
      if (!champs[m.campionato]) {
        champs[m.campionato] = {
          over15: { total: 0, successi: 0 },
          '12under45': { total: 0, successi: 0 },
          multigolCasa13: { total: 0, successi: 0 },
          multigolOspite13: { total: 0, successi: 0 }
        };
      }
      const total = m.golCasa + m.golOspite;
      const ch = champs[m.campionato];
      
      ch.over15.total++;
      if (total > 1.5) ch.over15.successi++;
      
      ch['12under45'].total++;
      if (m.golCasa !== m.golOspite && total < 4.5) ch['12under45'].successi++;
      
      ch.multigolCasa13.total++;
      if (m.golCasa >= 1 && m.golCasa <= 3) ch.multigolCasa13.successi++;
      
      ch.multigolOspite13.total++;
      if (m.golOspite >= 1 && m.golOspite <= 3) ch.multigolOspite13.successi++;
    });
    return champs;
  };
  
  const data = analyzeChampionships();
  let entries = Object.entries(data);
  
  if (filterChamp !== 'Tutti') {
    entries = entries.filter(([champ]) => champ === filterChamp);
  }
  
  const allChamps = Object.keys(data).sort();
  
  if (entries.length === 0) {
    return (
      <div className="card">
        <h4>🔥 Heatmap Giocate per Campionato</h4>

          <p>Nessun dato disponibile. Importa partite giocate per vedere le statistiche.</p>
        </div>
      </div>
    );
  }
  
  const getPct = (stat) => stat.total ? Math.round((stat.successi / stat.total) * 100) : 0;
  const getColor = (pct) => {
    if (pct >= 70) return 'var(--win)';
    if (pct >= 50) return 'var(--draw)';
    return 'var(--lose)';

  const getEmoji = (pct) => {
    if (pct >= 70) return '🟢';
    if (pct >= 50) return '🟡';
    return '🔴';

  return (
    <div className="card">
      <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexWrap: 'wrap', gap: '8px'}}>
        <h4 style={{margin: 0}}>🔥 Heatmap Giocate per Campionato</h4>

          <span style={{fontSize: '12px', color: 'var(--text-muted)'}}>Filtra:</span>

            style={{padding: '4px 8px', fontSize: '12px', borderRadius: '6px', border: '1px solid var(--border)', background: 'var(--surface)', color: 'var(--text)', minWidth: '120px'}}
          >
            <option value="Tutti">Tutti i campionati</option>
            {allChamps.map(c => <option key={c} value={c}>{c}</option>)}

        </div>
      </div>
      <div style={{fontSize: '12px', color: 'var(--text-muted)', marginBottom: '8px'}}>
        📊 Percentuali di successo per le 4 giocate selezionate

      <div className="standings-table-wrap">
        <table className="heatmap-table">
          <thead>
            <tr>
              <th>Campionato</th>
              <th>Over 1.5</th>
              <th>12+Under 4.5</th>
              <th>MG Casa 1-3</th>
              <th>MG Ospite 1-3</th>
              <th style={{fontSize: '10px'}}>Partite</th>
            </tr>
          </thead>
          <tbody>
            {entries.map(([champ, stats]) => {
              const pctOver15 = getPct(stats.over15);
              const pct12under45 = getPct(stats['12under45']);
              const pctMGHome = getPct(stats.multigolCasa13);
              const pctMGAway = getPct(stats.multigolOspite13);
              const totalGames = stats.over15.total;
              
              return (
                <tr 
                  key={champ}

const HeatmapDetailModal = ({ championship, matches, onClose }) => {
  if (!championship) return null;
  
  const champMatches = matches.filter(m => m.campionato === championship && m.stato === 'Giocata');
  
  const stats = {
    over15: { total: 0, successi: 0 },
    '12under45': { total: 0, successi: 0 },
    multigolCasa13: { total: 0, successi: 0 },
    multigolOspite13: { total: 0, successi: 0 }
  };
  
  champMatches.forEach(m => {
    const total = m.golCasa + m.golOspite;
    stats.over15.total++;
    if (total > 1.5) stats.over15.successi++;
    stats['12under45'].total++;
    if (m.golCasa !== m.golOspite && total < 4.5) stats['12under45'].successi++;
    stats.multigolCasa13.total++;
    if (m.golCasa >= 1 && m.golCasa <= 3) stats.multigolCasa13.successi++;
    stats.multigolOspite13.total++;
    if (m.golOspite >= 1 && m.golOspite <= 3) stats.multigolOspite13.successi++;
  });
  
  const getPct = (stat) => stat.total ? Math.round((stat.successi / stat.total) * 100) : 0;
  const getColor = (pct) => {
    if (pct >= 70) return 'var(--win)';
    if (pct >= 50) return 'var(--draw)';
    return 'var(--lose)';
  };
  
  return (
    <div className="heatmap-detail-overlay" onClick={onClose}>
      <div className="heatmap-detail-modal" onClick={e => e.stopPropagation()}>
        <button className="close-btn" onClick={onClose}>✖</button>
        <h2 style={{color: getChampColor(championship)}}>📊 {championship}</h2>
        <p style={{color: 'var(--text-muted)', marginBottom: '12px'}}>
          {champMatches.length} partite giocate analizzate
        </p>
        
        <div className="perf-grid" style={{gridTemplateColumns: '1fr 1fr'}}>
          <div className="perf-card">
            <div className="perf-value" style={{color: getColor(getPct(stats.over15))}}>
              {getPct(stats.over15)}%
            </div>
            <div className="perf-label">Over 1.5</div>
            <div className="form-bar"><div className="form-bar-fill" style={{width: `${getPct(stats.over15)}%`, background: getColor(getPct(stats.over15))}} /></div>
          </div>
          <div className="perf-card">
            <div className="perf-value" style={{color: getColor(getPct(stats['12under45']))}}>
              {getPct(stats['12under45'])}%
            </div>
            <div className="perf-label">12+Under 4.5</div>
            <div className="form-bar"><div className="form-bar-fill" style={{width: `${getPct(stats['12under45'])}%`, background: getColor(getPct(stats['12under45']))}} /></div>
          </div>
          <div className="perf-card">
            <div className="perf-value" style={{color: getColor(getPct(stats.multigolCasa13))}}>
              {getPct(stats.multigolCasa13)}%
            </div>
            <div className="perf-label">MG Casa 1-3</div>
            <div className="form-bar"><div className="form-bar-fill" style={{width: `${getPct(stats.multigolCasa13)}%`, background: getColor(getPct(stats.multigolCasa13))}} /></div>
          </div>
          <div className="perf-card">
            <div className="perf-value" style={{color: getColor(getPct(stats.multigolOspite13))}}>
              {getPct(stats.multigolOspite13)}%
            </div>
            <div className="perf-label">MG Ospite 1-3</div>
            <div className="form-bar"><div className="form-bar-fill" style={{width: `${getPct(stats.multigolOspite13)}%`, background: getColor(getPct(stats.multigolOspite13))}} /></div>
          </div>
        </div>
        
        <div style={{marginTop: '12px'}}>
          <h4 style={{color: 'var(--accent)', marginBottom: '8px'}}>📋 Ultime partite</h4>
          <div style={{maxHeight: '200px', overflowY: 'auto'}}>
            {champMatches.slice(-10).reverse().map(m => {
              return (
                <div key={m.id} style={{display: 'flex', justifyContent: 'space-between', padding: '4px 8px', borderBottom: '1px solid var(--border)', fontSize: '13px'}}>
                  <span>{m.casa} vs {m.ospiti}</span>
                  <span style={{fontWeight: 'bold'}}>{m.golCasa}-{m.golOspite}</span>
                  <span style={{fontSize: '11px', color: 'var(--text-muted)'}}>{formatDateEU(m.data)}</span>

  );
};

const SofaScoreManager = ({ onImport, loading, matches, setMatches }) => {
  const [customLeagues, setCustomLeagues] = useState(getCustomSofaLeagues);
  const [newLeagueName, setNewLeagueName] = useState('');
  const [newLeagueId, setNewLeagueId] = useState('');
  const [selectedSeason, setSelectedSeason] = useState('26/27');
  const [searchQuery, setSearchQuery] = useState('');
  const [searchResults, setSearchResults] = useState([]);
  const [searching, setSearching] = useState(false);
  const [selectedTab, setSelectedTab] = useState('lista');
  const [isChecking, setIsChecking] = useState(false);

  const saveLeagues = (leagues) => { setCustomLeagues(leagues); saveCustomSofaLeagues(leagues); };
  const removeLeague = (id, name) => {
    const isDefault = Object.values(SOFASCORE_LEAGUE_IDS).includes(id);
    const matchCount = matches ? matches.filter(m => m.campionato === name).length : 0;
    if (matchCount > 0 && !confirm(`⚠️ Il campionato "${name}" ha ${matchCount} partite importate. Eliminarlo cancellerà anche le partite. Continuare?`)) return;
    if (matchCount > 0) setMatches(prev => prev.filter(m => m.campionato !== name));
    if (isDefault) { const blacklist = getBlacklist(); if (!blacklist.includes(id)) { blacklist.push(id); saveBlacklist(blacklist); } }
    else { saveLeagues(customLeagues.filter(l => l.id !== id)); }
  };

  const checkLeagueHasMatches = async (leagueId, seasonYear) => {
    try { const events = await fetchSofaScoreMatches(leagueId, seasonYear); return { hasMatches: events.length > 0, count: events.length }; }
    catch (e) { return { hasMatches: false, count: 0, error: e.message }; }
  };

  const addAndImportLeague = async () => {
    if (!newLeagueName.trim() || !newLeagueId.trim()) { alert('Inserisci sia il nome che l\'ID del campionato.'); return; }
    const id = parseInt(newLeagueId);
    if (isNaN(id) || id <= 0) { alert('L\'ID deve essere un numero positivo.'); return; }
    const allLeagues = getVisibleLeagues(customLeagues);
    if (allLeagues.some(l => l.id === id || l.name.toLowerCase() === newLeagueName.toLowerCase())) { alert('⚠️ Questo campionato o ID è già presente nella lista.'); return; }
    setIsChecking(true);
    const leagueName = newLeagueName.trim();
    try {
      const checkResult = await checkLeagueHasMatches(id, selectedSeason);
      if (checkResult.error) { alert(`❌ Errore nel controllo: ${checkResult.error}`); setIsChecking(false); return; }
      if (!checkResult.hasMatches) { alert(`❌ Nessuna partita trovata per "${leagueName}" (ID: ${id}) nella stagione ${selectedSeason}.`); setIsChecking(false); return; }
      saveLeagues([...customLeagues, { name: leagueName, id: id }]);
      await onImport(leagueName, selectedSeason);
      setNewLeagueName(''); setNewLeagueId('');
    } catch (e) { console.error('Errore:', e); alert(`❌ Errore durante l'aggiunta: ${e.message}`); }
    setIsChecking(false);
  };

  const searchSofaLeagues = async () => {
    if (!searchQuery.trim()) { alert('Inserisci un termine di ricerca.'); return; }
    setSearching(true); setSearchResults([]);
    try {
      const response = await fetch(`https://api.sofascore.com/api/v1/search?q=${encodeURIComponent(searchQuery)}&type=tournament`);
      if (!response.ok) throw new Error('Errore nella ricerca');
      const data = await response.json();
      if (data.results && data.results.length > 0) {
        const footballTournaments = data.results.filter(r => r.sport?.id === 1 || r.sport?.slug === 'football');
        setSearchResults(footballTournaments);
        if (footballTournaments.length === 0) alert('Nessun campionato di calcio trovato.');
      } else alert('Nessun risultato trovato.');
    } catch (e) { console.error('Errore ricerca:', e); alert('Errore durante la ricerca.'); }
    setSearching(false);
  };

  const addFromSearch = async (tournament) => {
    const name = tournament.name, id = tournament.id;
    const allLeagues = getVisibleLeagues(customLeagues);
    if (allLeagues.some(l => l.id === id || l.name.toLowerCase() === name.toLowerCase())) { alert('⚠️ Questo campionato è già nella tua lista.'); return; }
    setIsChecking(true);
    try {
      const checkResult = await checkLeagueHasMatches(id, selectedSeason);
      if (checkResult.error) { alert(`❌ Errore nel controllo: ${checkResult.error}`); setIsChecking(false); return; }
      if (!checkResult.hasMatches) { alert(`❌ Nessuna partita trovata per "${name}" (ID: ${id}) nella stagione ${selectedSeason}.`); setIsChecking(false); return; }
      saveLeagues([...customLeagues, { name, id }]);
      await onImport(name, selectedSeason);
      setSearchResults(searchResults.filter(r => r.id !== id));
    } catch (e) { console.error('Errore:', e); alert(`❌ Errore durante l'aggiunta: ${e.message}`); }
    setIsChecking(false);
  };

  const allLeagues = getVisibleLeagues(customLeagues);

  return (
    <div className="card">
      <h4 style={{marginBottom:'12px'}}>🌐 Gestione Campionati SofaScore</h4>
      <div className="sub-tabs" style={{marginBottom:'12px'}}>
        <button className={selectedTab === 'lista' ? 'active' : ''} onClick={() => setSelectedTab('lista')}>📋 Lista campionati ({allLeagues.length})</button>
        <button className={selectedTab === 'cerca' ? 'active' : ''} onClick={() => setSelectedTab('cerca')}>🔍 Cerca e aggiungi</button>
      </div>
      {selectedTab === 'lista' && (
        <div>
          <div style={{display:'flex', gap:'8px', flexWrap:'wrap', marginBottom:'12px'}}>
            <input type="text" value={newLeagueName} onChange={e => setNewLeagueName(e.target.value)} placeholder="Nome campionato" style={{flex:1, minWidth:'150px'}} />
            <input type="number" value={newLeagueId} onChange={e => setNewLeagueId(e.target.value)} placeholder="ID SofaScore" style={{width:'120px'}} />
            <select value={selectedSeason} onChange={e => setSelectedSeason(e.target.value)} style={{width:'120px', padding:'8px'}}>
              <option value="26/27">26/27</option><option value="25/26">25/26</option><option value="24/25">24/25</option><option value="23/24">23/24</option>
            </select>
            <button className="btn" onClick={addAndImportLeague} disabled={isChecking || loading}>{isChecking ? '⏳ Controllo...' : '➕ Aggiungi e Importa'}</button>
          </div>
          <div style={{maxHeight:'300px', overflowY:'auto'}}>
            {allLeagues.length === 0 ? <p style={{color:'var(--text-muted)', textAlign:'center', padding:'20px'}}>Nessun campionato configurato.</p> : (
              <table className="standings-table" style={{fontSize:'13px'}}>
                <thead><tr><th>Campionato</th><th style={{textAlign:'center'}}>ID</th><th style={{textAlign:'center'}}>Tipo</th><th style={{textAlign:'center'}}>Partite</th><th style={{textAlign:'center'}}>Azioni</th></tr></thead>
                <tbody>
                  {allLeagues.map(league => {
                    const matchCount = matches ? matches.filter(m => m.campionato === league.name).length : 0;
                    return <tr key={league.id} style={{borderBottom:'1px solid var(--border)'}}>
                      <td style={{padding:'6px 8px'}}><span style={{color: league.isDefault ? 'var(--text)' : 'var(--accent)'}}>{league.isDefault ? '📌 ' : '⭐ '}{league.name}</span></td>
                      <td style={{textAlign:'center', padding:'6px 8px'}}>{league.id}</td>
                      <td style={{textAlign:'center', padding:'6px 8px'}}><span style={{fontSize:'10px', padding:'2px 8px', borderRadius:'10px', background: league.isDefault ? 'var(--surface)' : 'var(--accent)', color: league.isDefault ? 'var(--text-muted)' : '#000'}}>{league.isDefault ? 'Predefinito' : 'Personalizzato'}</span></td>
                      <td style={{textAlign:'center', padding:'6px 8px'}}>{matchCount > 0 ? <span style={{color:'var(--win)', fontWeight:'bold'}}>{matchCount}</span> : <span style={{color:'var(--text-muted)'}}>0</span>}</td>
                      <td style={{textAlign:'center', padding:'6px 8px'}}>
                        <select value={selectedSeason} onChange={e => setSelectedSeason(e.target.value)} style={{width:'80px', padding:'2px 4px', fontSize:'11px', marginRight:'4px'}}><option value="26/27">26/27</option><option value="25/26">25/26</option><option value="24/25">24/25</option><option value="23/24">23/24</option></select>
                        <button className="btn btn-secondary" style={{fontSize:'11px', padding:'2px 8px', marginRight:'4px'}} onClick={() => onImport(league.name, selectedSeason)} disabled={loading}>📥 Importa</button>
                        <button className="btn btn-danger" style={{fontSize:'11px', padding:'2px 8px'}} onClick={() => removeLeague(league.id, league.name)}>✖</button>
                      </td>
                    </tr>;
                  })}
                </tbody>
              </table>
            )}
          </div>
        </div>
      )}
      {selectedTab === 'cerca' && (
        <div>
          <div style={{display:'flex', gap:'8px', marginBottom:'12px'}}>
            <input type="text" value={searchQuery} onChange={e => setSearchQuery(e.target.value)} placeholder="Cerca campionato" style={{flex:1}} onKeyDown={e => e.key === 'Enter' && searchSofaLeagues()} />
            <button className="btn" onClick={searchSofaLeagues} disabled={searching || isChecking}>{searching ? '⏳ Cercando...' : '🔍 Cerca'}</button>
          </div>
          {searchResults.length > 0 && (
            <div style={{maxHeight:'300px', overflowY:'auto'}}>
              <table className="standings-table" style={{fontSize:'13px'}}>
                <thead><tr><th>Campionato</th><th style={{textAlign:'center'}}>ID</th><th style={{textAlign:'center'}}>Categoria</th><th style={{textAlign:'center'}}>Azioni</th></tr></thead>
                <tbody>
                  {searchResults.map(t => {
                    const allLeaguesList = getVisibleLeagues(customLeagues);
                    const isAdded = allLeaguesList.some(l => l.id === t.id);
                    return <tr key={t.id} style={{borderBottom:'1px solid var(--border)'}}>
                      <td style={{padding:'6px 8px'}}>{t.name}</td><td style={{textAlign:'center', padding:'6px 8px'}}>{t.id}</td>
                      <td style={{textAlign:'center', padding:'6px 8px'}}>{t.category?.name || 'N/A'}</td>
                      <td style={{textAlign:'center', padding:'6px 8px'}}>{isAdded ? <span style={{color:'var(--win)'}}>✅ Già aggiunto</span> : <button className="btn btn-secondary" style={{fontSize:'11px', padding:'2px 10px'}} onClick={() => addFromSearch(t)} disabled={isChecking}>{isChecking ? '⏳...' : '➕ Aggiungi e Importa'}</button>}</td>
                    </tr>;
                  })}
                </tbody>
              </table>
            </div>
          )}
        </div>
      )}
    </div>
  );
};

const FootballDataManager = ({ apiKeys, matches, setMatches }) => {
  const [selectedLeague, setSelectedLeague] = useState('');
  const [loading, setLoading] = useState(false);
  const [leagues, setLeagues] = useState([]);
  const [importedLeagues, setImportedLeagues] = useState([]);
  const [statusMessage, setStatusMessage] = useState(null);
  const [season, setSeason] = useState('2026');

  useEffect(() => {
    const leaguesList = Object.entries(FOOTBALL_DATA_LEAGUES).map(([name, id]) => ({
      name,
      id,
      isImported: false
    }));
    setLeagues(leaguesList);
    
    const saved = JSON.parse(localStorage.getItem('ft_football_data_imported') || '[]');
    setImportedLeagues(saved);
  }, []);

  const testApiKey = async () => {
    const key = apiKeys['Football-data.org'];
    if (!key) {
      setStatusMessage({ type: 'error', text: '❌ Inserisci prima la API Key!' });
      return;
    }
    setLoading(true);
    setStatusMessage({ type: 'info', text: '🔄 Test della chiave API in corso...' });
    try {
      const r = await fetch('https://api.football-data.org/v4/competitions', {
        headers: { 'X-Auth-Token': key }
      });
      if (r.status === 200) {
        const data = await r.json();
        setStatusMessage({ type: 'success', text: `✅ API Key valida! Trovati ${data.competitions?.length || 0} campionati disponibili.` });
      } else if (r.status === 401) {
        setStatusMessage({ type: 'error', text: '❌ API Key non valida! Verifica la chiave inserita.' });
      } else if (r.status === 429) {
        setStatusMessage({ type: 'error', text: '⚠️ Troppe richieste! Attendi qualche secondo.' });
      } else {
        setStatusMessage({ type: 'error', text: `❌ Errore ${r.status}: ${r.statusText}` });
      }
    } catch (e) {
      setStatusMessage({ type: 'error', text: `❌ Errore di connessione: ${e.message}` });
    }
    setLoading(false);
  };

  const importLeague = async () => {
    if (!selectedLeague) {
      setStatusMessage({ type: 'error', text: '❌ Seleziona un campionato dal menù a tendina!' });
      return;
    }
    const key = apiKeys['Football-data.org'];
    if (!key) {
      setStatusMessage({ type: 'error', text: '❌ Configura prima la API Key di Football-data.org!' });
      return;
    }
    const league = leagues.find(l => l.id === parseInt(selectedLeague));
    if (!league) return;
    if (importedLeagues.some(l => l.id === league.id)) {
      setStatusMessage({ type: 'info', text: `ℹ️ "${league.name}" è già stato importato.` });
      return;
    }
    setLoading(true);
    setStatusMessage({ type: 'info', text: `📥 Importando ${league.name} (stagione ${season})...` });
    try {
      const response = await fetch(
        `https://api.football-data.org/v4/competitions/${league.id}/matches?season=${season}`,
        { headers: { 'X-Auth-Token': key } }
      );
      if (!response.ok) {
        if (response.status === 401) {
          setStatusMessage({ type: 'error', text: '❌ API Key non valida! Verifica la chiave.' });
          setLoading(false);
          return;
        }
        if (response.status === 404) {
          setStatusMessage({ type: 'error', text: `❌ Campionato "${league.name}" non trovato per la stagione ${season}.` });
          setLoading(false);
          return;
        }
        throw new Error(`HTTP ${response.status}`);
      }
      const data = await response.json();
      if (!data.matches || data.matches.length === 0) {
        setStatusMessage({ type: 'error', text: `❌ Nessuna partita trovata per "${league.name}" nella stagione ${season}.` });
        setLoading(false);
        return;
      }
      const newMatches = data.matches.map(m => {
        const isFinished = m.status === 'FINISHED';
        const homeScore = isFinished ? m.score?.fullTime?.home || 0 : 0;
        const awayScore = isFinished ? m.score?.fullTime?.away || 0 : 0;
        const matchDate = new Date(m.utcDate);
        const dataStr = matchDate.toISOString().slice(0, 10);
        const oraStr = matchDate.toTimeString().slice(0, 5);
        return {
          id: `fd_${m.id}`,
          campionato: league.name,
          round: m.matchday || 'N/A',
          data: dataStr,
          ora: oraStr,
          casa: m.homeTeam?.name || 'Home',
          ospiti: m.awayTeam?.name || 'Away',
          stato: isFinished ? 'Giocata' : 'Futura',
          golCasa: homeScore,
          golOspite: awayScore,
          citta: null,
          source: 'football-data.org'
        };
      });
      const updatedImported = [...importedLeagues, { 
        id: league.id, 
        name: league.name, 
        season: season,
        importedAt: new Date().toISOString(),
        matchCount: newMatches.length 
      }];
      localStorage.setItem('ft_football_data_imported', JSON.stringify(updatedImported));
      setImportedLeagues(updatedImported);
      setMatches(prev => {
        const existingIds = new Set(prev.map(m => m.id));
        const filteredNew = newMatches.filter(m => !existingIds.has(m.id));
        return [...prev, ...filteredNew];
      });
      const champExists = JSON.parse(localStorage.getItem('ft_champs') || '[]')
        .some(c => c.name === league.name);
      if (!champExists) {
        const champs = JSON.parse(localStorage.getItem('ft_champs') || '[]');
        champs.push({ name: league.name, importedAt: new Date().toISOString(), source: 'football-data.org' });
        localStorage.setItem('ft_champs', JSON.stringify(champs));
      }
      setStatusMessage({ type: 'success', text: `✅ Importate ${newMatches.length} partite da "${league.name}" (stagione ${season})!` });
    } catch (e) {
      console.error('Errore importazione Football-data.org:', e);
      setStatusMessage({ type: 'error', text: `❌ Errore durante l'importazione: ${e.message}` });
    }
    setLoading(false);
  };

  const removeImportedLeague = (leagueId) => {
    const league = importedLeagues.find(l => l.id === leagueId);
    if (!league) return;
    if (confirm(`⚠️ Rimuovere "${league.name}" e tutte le sue partite importate?`)) {
      const updated = importedLeagues.filter(l => l.id !== leagueId);
      localStorage.setItem('ft_football_data_imported', JSON.stringify(updated));
      setImportedLeagues(updated);
      setMatches(prev => prev.filter(m => m.campionato !== league.name || m.source !== 'football-data.org'));
      setStatusMessage({ type: 'success', text: `🗑️ "${league.name}" rimosso dalla lista.` });
    }
  };

  const getStatusColor = () => {
    if (!statusMessage) return 'transparent';
    if (statusMessage.type === 'success') return 'var(--win)';
    if (statusMessage.type === 'error') return 'var(--lose)';
    return 'var(--draw)';
  };

  return (
